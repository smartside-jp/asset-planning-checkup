  const simLabel = `▶ クリックしてシミュレーションしてみる（毎月の余り${man(al.monthlySurplus)}万円を積み立てたら？）`;
  const simBtn = (al.reserveOK && al.monthlySurplus >= 10000 && al.simOK)
    ? `<div class="fill sim"><button type="button" id="surplusSimBtn" class="sim-btn" data-label="${simLabel}" aria-pressed="false" onclick="toggleSurplusSim()">${simLabel}</button><br>`
      + `<span style="display:block;margin-top:7px;font-size:11px;color:var(--muted)">見本のシミュレーションです。特定商品の推奨ではありません。前提は出口の地図の標準シナリオ（株式 実質 5%）と同じ。<b>毎月の余りを全額そのまま投資に回し続けた場合</b>の単純な試算で、NISAの非課税枠の上限や、手元に残しておく現金の余裕までは細かく見ていません（あくまで「ただ置く」場合との差を眺めるための線です）。押すと上の「生涯キャッシュフロー」グラフに点線で重なります（もう一度押すと消えます）。</span></div>`
    : '';

  // 見直しカード（NISA hi → 暗号 red → 銀行窓販 red）。empty世帯は NISA hi のみ
  const cardsHTML = al.cards.map(c => {
    const amt = c.amtYen > 0 ? `<span class="amt">${man(c.amtYen)}万円</span>` : '';
    const cls = c.kind === 'hi' ? 'hi' : c.kind === 'red' ? 'red' : '';
    return `<div class="inv-card ${cls}">`
      + `<div class="ic-ttl"><span class="lvl">${c.lvl}</span> ${c.title}${amt}</div>`
      + `<div class="ic-find">${c.find}</div>`
      + `<div class="ic-alt"><span class="lead">一般的には</span>　${c.alt}</div>`
      + `</div>`;
  }).join('');

  // ===== empty（まだ投資していない）：順序案内＋目安だけ薄く＋NISA入口＋守りへ（Q2①） =====
  if (al.state === 'empty'){
    const verdict = `<div class="verdict info"><div class="em">🌱</div><div class="big">まだ投資の配分は描けていません。<br><span class="sub" style="color:var(--muted)">順序としては「いざという時の備え（現金の土台）」が先。土台ができたら、余ったお金を年齢別の目安に沿って投資へ——という形が一般的です。</span></div></div>`;
    const chart = `<div class="sec"><h3>始めるなら、どんな形？（めやす）</h3>`
      + `<div class="chartbox"><canvas id="allocChart"></canvas></div>`
      + `<p class="note">※ これは「めやすの形」の一例です。現金の土台（あなたの健診で出た“いざという時の備え” 約${man(al.reserveYen)}万円）を確保したうえで、余ったお金を年齢的な目安（${al.phaseLabel}＝株式比率の目安 ${al.refEquityPct}%）で投資に回した姿。<b>「これだけ投資しろ」という意味ではありません</b>。</p></div>`;
    const cardSec = cardsHTML ? `<div class="sec"><h3>はじめの一歩</h3><div class="inv-list">${cardsHTML}</div></div>` : '';
    // あかりFB①（2026-06-11）：守りが既に足りている人を「守りへ」に戻すと永遠ループ。
    // 足りている場合は前へ進める＝黒字の活かし方＋プロ相談の出口を出す。薄い場合だけ従来どおり守りへ。
    let emptyNext;
    if (al.reserveOK){
      // FB③：相談カードは共通ヘルパーへ集約＋持ち家系の世帯だけ次の駅（住まい）も案内
      emptyNext = `<div class="fill"><span class="big">守りの土台は足りています ── 次は「余りを活かす」番</span><br><span style="color:var(--muted);font-size:12px">いざという時の備えは確保済み。${al.monthlySurplus > 0 ? `毎月の黒字 ${man(al.monthlySurplus)}万円の一部をNISAで、年齢別の目安（${al.phaseLabel}）に沿って積み立てていく、という形が一般的です。` : `余裕ができたら、年齢別の目安（${al.phaseLabel}）に沿って少額から、という形が一般的です。`}</span></div>`
        + simBtn + consultCard;
    } else {
      emptyNext = `<div class="fill defense"><span class="big">まず「守りの土台」から</span><br><span style="color:var(--muted);font-size:12px">投資より先に、いざという時の備え（生活費の数ヶ月分）が手元にあるかが土台です。→ <a class="lnk" onclick="gotoArea('defense')">守りをくわしく見る →</a></span></div>`;
    }
    const next = `<div class="sec"><h3>次の一手</h3>` + emptyNext
      + `<p class="note">※ 投資判断は提供しません。一般的な選択肢を示すだけです。</p></div>`;
    return verdict + chart + cardSec + next;
  }

  // ===== filled / attention：今の配分 vs めやすの形 を比較 =====
  const isAtt = al.state === 'attention';
  const verdict = isAtt
    ? `<div class="verdict warn"><div class="em">🟡</div><div class="big">投資はしているけれど、<b>配分に見直し余地</b>があります。<br><span class="sub" style="color:var(--muted)">下で①今の配分と年齢別の目安、②具体的な見直し点、を順に見ていきます。</span></div></div>`
    : `<div class="verdict good"><div class="em">🟢</div><div class="big">株式 <b>${al.nowPct.stocks}%</b> ／ 現金 ${al.nowPct.cash}%${al.nowPct.bonds>0?` ／ 個人国債 ${al.nowPct.bonds}%`:''}${al.nowPct.crypto>0?` ／ 暗号資産 ${al.nowPct.crypto}%`:''}（${al.phaseLabel}）。<br><span class="sub" style="color:var(--muted)">大きな偏りは見当たりません。下で年齢別の目安と見比べ、活かせる制度がないかを確認します。</span></div></div>`;

  // ② 今の配分 vs めやすの形（横並び2本の積み上げ横棒）
  // W-7：「現役期100%」の目安と「株式に寄りすぎ」が矛盾に読めるので理由を接続（目安は土台を現金確保した上で残りを株式に回す形＝土台未充足だと寄りすぎ判定になる）
  const gapText = al.gap === 'low' ? '今は現金に厚めで、目安より株式は控えめ。'
    : al.gap === 'high' ? '今は目安より株式に寄っています。<span style="color:var(--muted)">（目安は“いざという時の備え”を先に現金で確保し、残りを年齢の目安で株式に回す形です。土台がまだ埋まっていないうちは、株式の比率が相対的に高いと判定されます。）</span>'
    : 'ほぼ目安どおりのバランスです。';
  // J-3a：株式・投資に黙って合算されている iDeCo/企業DC を可視化（60歳まで引き出せない＝守りの現金には数えない）
  //   残高1万以上なら「約◯万が含まれる」／残高ゼロでも積立中なら「育っていく」を出す（約0万・積立中の取りこぼし回避）
  const dcHasBal = al.dcYen >= 10000;                              // 1万未満は「約0万」になるので注記しない
  const dcHasMon = al.dcMonthlyYen > 0;
  const dcLock = 'これは<b>原則60歳まで引き出せない</b>老後専用のお金で、いざという時の備え（現金）には数えられません。';
  const dcNote = dcHasBal
    ? `<p class="note">※ 上の「株式・投資」には <b>iDeCo・企業型DC 約${man(al.dcYen)}万</b> が含まれます${dcHasMon ? '（いまも毎月積立中）' : ''}。${dcLock}</p>`
    : dcHasMon
      ? `<p class="note">※ <b>iDeCo・企業型DC に毎月積み立て中</b>です（積み立てた分は上の「株式・投資」に育っていきます）。${dcLock}</p>`
      : '';
  const chart = `<div class="sec"><h3>今の配分と、ひとつのバランスの目安</h3>`
    + `<div class="chartbox"><canvas id="allocChart"></canvas></div>`
    + `<div class="legend"><span><span class="swatch" style="background:var(--seg-cash)"></span>現金（いざという時の備え＋待機）</span><span><span class="swatch" style="background:var(--seg-stock)"></span>株式・投資</span>${(al.now.bonds||0)>0?`<span><span class="swatch" style="background:var(--seg-bond)"></span>個人国債（変動10年）</span>`:''}<span><span class="swatch" style="background:var(--seg-crypto)"></span>暗号資産</span></div>`
    + `<div class="gap-call"><b>目安とのズレ：</b>${gapText}下の「めやすの形」は、<b>あなたの“いざという時の備え”（健診で出た 約${man(al.reserveYen)}万円）を現金で確保したうえで、残りを年齢的な目安で株式に</b>回した一例です。<span style="color:var(--muted)">※どちらが正解という話ではありません。「何円動かす」までは示しません。</span></div>`
    + `<p class="note">※ <b>「めやすの形」の中身は2層です</b>　㋐ 現金の土台＝あなたの健診で出た“いざという時の備え”（約${man(al.reserveYen)}万円）。「一般的に◯万」ではなく<b>あなた専用の数字</b>（守りパネルと同じ）。　㋑ 残りのお金の株式比率＝年齢的な一般目安（${al.phaseLabel}＝${al.refEquityPct}%。年齢が上がるほど株式を減らし現金・債券を厚くしていくグライド）。</p>${dcNote}</div>`;

  // ③ 配分の見直しと、活かせる制度
  const cardSec = cardsHTML
    ? `<div class="sec"><h3>配分の見直しと、活かせる制度</h3><div class="inv-list">${cardsHTML}</div><p class="note">※ 健診の回答から「まだ活かせていない制度」「偏り・コストの大きいもの」を拾って表示しています。特定商品の解約・売却をすすめるものではありません。</p></div>`
    : `<div class="sec"><h3>配分の見直しと、活かせる制度</h3><p class="note">大きな偏り・コストの高い商品・使えていない制度は見当たりませんでした。</p></div>`;

  // ④ 次の一手（土台が薄い→守りが先／株寄り→売らずに現金で近づける／足りていて黒字→積立橋渡し／それ以外→年1見直し）
  // 社長FB#5 ③（2026-06-15 社長承認）：「安全側に寄せたら損する」と煽る点線は出さない（生活防衛資金を崩しに行くリスクを生む）。
  //   代わりに、守り充足×株寄りの世帯には「投資はそのまま続けて、これからの貯蓄を現金に回して“めやすの形”に近づける」
  //   というFP王道（買い増しリバランス）のアドバイスを出す。NISA非課税枠も含み益も壊さず、無理なく整える方法。
  let nextParts;
  if (!al.reserveOK){
    nextParts = `<div class="fill defense"><span class="big">その前に「守りの土台」は足りている？</span><br><span style="color:var(--muted);font-size:12px">投資より先に、いざという時の備え（生活費の数ヶ月分）が手元にあるかが土台です。ここが薄いなら、積立より先に土台を。→ <a class="lnk" onclick="gotoArea('defense')">守りをくわしく見る →</a></span></div>`;
  } else if (al.gap === 'high'){
    // G1-d（2026-06-22）：Q5 A案 処方箋3本化。社長FB#5 ③（売らずにリバランス）の精神を維持しつつ、具体的選択肢を3本提示。
    //   ①個人国債（変動10年）を検討 ②これからの積立先を株式以外に振る ③配当・分配金を現金に
    nextParts = `<div class="fill"><span class="big">めやすの形に近づける ── 売らずに、徐々に整える</span><br><span style="color:var(--muted);font-size:12px">いまの投資をそのまま続けたまま、時間をかけて「めやすの形」に近づけていく選択肢として：<br>① <b>個人向け国債（変動10年）を検討</b>（元本割れしにくく、半年ごとに金利が見直される）<br>② <b>これからの積立先を株式以外（債券・現金）に振る</b>（NISAの非課税枠も含み益も壊さない）<br>③ <b>配当・分配金を再投資せず現金に回す</b>（時間をかけてバランスを整える）<br>一気に売って入れ替える必要はありません。最終判断はご家庭で（必要なら有資格者へ）。</span></div>`;
  } else if (al.monthlySurplus > 0){
    // FB③：守り充足の人を家計CFへ戻さない（黒字額は本文に明記済み）→ 次の駅 or 相談を主導線に
    nextParts = `<div class="fill"><span class="big">毎月の黒字 ${man(al.monthlySurplus)}万円 ── 一部を積立に回す手も</span><br><span style="color:var(--muted);font-size:12px">いざという時の備えは足りています。毎月の黒字の一部をNISAで、年齢別の目安（${al.phaseLabel}）に沿って積み立てていく、という形が一般的です。</span></div>`;
  } else {
    nextParts = `<div class="fill"><span class="big">年に1度、目安と見比べを</span><br><span style="color:var(--muted);font-size:12px">大きな偏りはありません。年齢が上がると目安の株式比率は下がります。年1回ほど、今の配分と目安を見比べてみましょう。</span></div>`;
  }
  if (al.reserveOK) nextParts += simBtn + consultCard;   // FB②（2026-06-15）：housingNext削除＝次の駅誘導はスポークフッターに集約
  const next = `<div class="sec"><h3>次の一手</h3>${nextParts}<p class="note">※ 「これを買え／売れ」という指示ではありません。一般的な選択肢を示すだけで、最終判断はご家庭で（必要なら有資格者へ）。投資判断は提供しません。</p></div>`;

  return verdict + chart + cardSec + next;
}

function drawAllocChart(al){
  const ctx = document.getElementById('allocChart');
  if (!ctx || !al) return;
  if (allocChartInst) { allocChartInst.destroy(); allocChartInst = null; }
  const ink = cssVar('--ink'), muted = cssVar('--muted'), line = cssVar('--line');
  const cCash = cssVar('--seg-cash'), cStock = cssVar('--seg-stock'), cBond = cssVar('--seg-bond'), cCrypto = cssVar('--seg-crypto');
  const m = (yen) => Math.round((yen||0)/10000);   // 万・整数
  const empty = al.state === 'empty';
  // empty＝「めやすの形」1本だけ薄く／それ以外＝今のあなた vs めやすの形 の2本
  const labels     = empty ? ['めやすの形（例）']     : ['今のあなた','めやすの形（例）'];
  const cashData   = empty ? [m(al.tgt.cash)]         : [m(al.now.cash),   m(al.tgt.cash)];
  const stockData  = empty ? [m(al.tgt.stocks)]       : [m(al.now.stocks), m(al.tgt.stocks)];
  // G1-a（2026-06-22）：bonds（個人国債）を datasets に追加。tgt.bonds=0 なので「めやすの形」は据置。kojinKokusaiBalance=0 のペルソナは bondData=[0,0]/[0] で見た目据置。
  const bondData   = empty ? [m(al.tgt.bonds||0)]     : [m(al.now.bonds||0), m(al.tgt.bonds||0)];
  const cryptoData = empty ? [m(al.tgt.crypto)]       : [m(al.now.crypto), m(al.tgt.crypto)];
  allocChartInst = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[
      { label:'現金（備え＋待機）', data:cashData,   backgroundColor:cCash,   borderWidth:0, stack:'s', borderRadius:4 },
      { label:'株式・投資',         data:stockData,  backgroundColor:cStock,  borderWidth:0, stack:'s', borderRadius:4 },
      { label:'個人国債（変動10年）', data:bondData, backgroundColor:cBond,   borderWidth:0, stack:'s', borderRadius:4 },
      { label:'暗号資産',           data:cryptoData, backgroundColor:cCrypto, borderWidth:0, stack:'s', borderRadius:4 },
    ]},
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
      animation: reduceMotion ? false : { duration:600 },
      interaction:{ mode:'index', axis:'y', intersect:false },   // ④判別性：行(y)で束ねて1行ぶん全部ハイライト
      plugins:{ legend:{ display:true, labels:{ boxWidth:14, font:{size:11}, color:ink } },   // ④投資の型も凡例を常時表示（他チャートと統一）
        // code-review HIGH-1（G1-a tooltip）：0万円セグメント（bonds=0 などの空dataset）はツールチップから除外
        tooltip:{ callbacks:{ title:(it)=> it[0] ? it[0].label : '', label:(c)=> c.parsed.x===0 ? null : `${c.dataset.label}：${c.parsed.x.toLocaleString()}万円` } } },
      scales:{
        x:{ stacked:true, title:{display:true,text:'万円（金融資産の合計の内訳）',color:muted,font:{size:10}}, grid:{color:line}, ticks:{color:muted,font:{size:10}}, beginAtZero:true },
        y:{ stacked:true, grid:{display:false}, ticks:{color:ink, font:{size:12, weight:'700'}} }
      }
    }
  });
}

function afterRenderAllocation(model){
  const canvas0 = document.getElementById('allocChart');
  if (!model.allocation || !canvas0) return;
  // 再レンダリング(boot/visibilitychange/storage/import)で canvas が作り直されたら旧 Chart を破棄（F1再発防止）。
  if (allocChartInst && allocChartInst.canvas !== canvas0) { allocChartInst.destroy(); allocChartInst = null; }
  // 描画。閉/未レイアウトは後で再試行。全幅(grid-column:1/-1)リフロー前に狭く焼き付いたら実寸で描き直す（F2再発防止）。
  const draw = () => {
    const c = document.getElementById('allocChart');
    if (!c || c.clientWidth <= 0) return false;
    const box = c.parentElement;
    if (allocChartInst && allocChartInst.canvas === c && box && allocChartInst.width >= box.clientWidth - 8) return true;
    drawAllocChart(model.allocation);
    return true;
  };
  draw();
  setTimeout(draw, 80);
  setTimeout(draw, 320);
  const det = document.querySelector('details.area.allocation-area');
  if (det && !det._allocToggleBound) {
    det._allocToggleBound = true;
    det.addEventListener('toggle', () => { if (det.open) { requestAnimationFrame(draw); setTimeout(draw, 80); } });
  }
}

/* ===== 住まい 詳細パネル：HTML生成・タイムライン描画（計算は buildHousingData 済み） ===== */
let housingChartInst = null;
function housingPanelHTML(h){
  if (!h) return '<p class="note">データを準備中です。</p>';
  const man = (yen) => man0(Math.round((yen||0)/10000));   // 万円・整数

  // 気づきカード（loan/owned）。rent は読み物（別ブロック）
  const cardsHTML = h.cards.map(c => {
    const cls = c.cls ? ` ${c.cls}` : '';
    const amt = c.amt ? c.amt : '';
    return `<div class="inv-card${cls}">`
      + `<div class="ic-ttl"><span class="lvl">${c.lvl}</span> ${c.title}${amt}</div>`
      + `<div class="ic-find">${c.find}</div>`
      + `<div class="ic-alt"><span class="lead">一般的には</span>　${c.alt}</div>`
      + `</div>`;
  }).join('');

  // ① 結論バナー（状態で出し分け）
  let verdict;
  if (h.state === 'loan'){
    if (h.retireLeftover > 0){
      verdict = `<div class="verdict warn"><div class="em">🟡</div><div class="big">完済は <b>${h.payoffAge}歳</b>の見込み。<b>リタイア（${h.retireAge}歳）より${h.retireLeftover}年あと</b>に終わる計算です。<br><span class="sub" style="color:var(--muted)">退職後も毎月の返済が続く形。下のタイムラインで「いつまで・何が」続くかと、見直しの目安を見ていきます。</span></div></div>`;
    } else if (h.ratioPct > 35){
      verdict = `<div class="verdict warn"><div class="em">🟡</div><div class="big">今の<b>返済比率は ${h.ratioPct}%</b>とやや高めです。<br><span class="sub" style="color:var(--muted)">完済はリタイア前の見込み。下で返済の重さと、見直しの目安を見ていきます。</span></div></div>`;
    } else {
      verdict = `<div class="verdict good"><div class="em">🟢</div><div class="big">完済は <b>${h.payoffAge}歳</b>の見込みで、<b>リタイア（${h.retireAge}歳）前に完済</b>できる計算です。<br><span class="sub" style="color:var(--muted)">返済ペースは順調。下で住居コストの全体像と、長く持つ家の備えを確認します。</span></div></div>`;
    }
  } else if (h.state === 'owned'){
    verdict = `<div class="verdict good"><div class="em">🟢</div><div class="big">ローンの返済は<b>なし</b>。住居費の大きな山は越えています。<br><span class="sub" style="color:var(--muted)">ただし固定資産税・修繕・火災保険などの<b>維持費は完済後もずっと</b>続きます。そこだけ家計に織り込めているかを確認します。</span></div></div>`;
  } else if (h.state === 'family'){
    verdict = `<div class="verdict info"><div class="em">🌱</div><div class="big">今は<b>実家・社宅</b>。住居費の負担が軽い、恵まれた状態です。<br><span class="sub" style="color:var(--muted)">将来「自分の住まい」を持つときに向けて、家賃・購入どちらの道もあります。今は守りの土台づくりに集中できる時期です。</span></div></div>`;
  } else {
    verdict = `<div class="verdict info"><div class="em">🌱</div><div class="big">今は<b>賃貸</b>。住まいは「買うのが正解」という話ではありません。<br><span class="sub" style="color:var(--muted)">家賃は退職後もずっと続くお金。下に「90歳までに家賃がいくらになるか」と、もし購入を考えるときに見るポイントを、結論を出さずに並べます。</span></div></div>`;
  }

  // ② 主役：90歳までの住居コスト・タイムライン
  const chartTtl = (h.state === 'rent' || h.state === 'family') ? '90歳までに払う「家賃」の地図' : '90歳までの「住まいにかかるお金」の地図';
  let legend, tlCall, facts;
  if (h.state === 'loan'){
    legend = `<span><span class="swatch" style="background:var(--seg-pre)"></span>返済（リタイア前）</span><span><span class="swatch" style="background:var(--seg-post)"></span>返済（リタイア後も残る）</span><span><span class="swatch" style="background:var(--seg-maint)"></span>維持費（90歳までずっと）</span>`;
    tlCall = h.retireLeftover > 0
      ? `<b>読み解き：</b>ローンの返済は <b>${h.payoffAge}歳</b>で終わりますが、<b style="color:var(--bad)">${h.retireAge}〜${h.payoffAge}歳（赤）はリタイア後も残る返済</b>です。さらに <b>維持費（グレー）は完済しても90歳までずっと</b>続きます。「ローンが終わる＝住居費ゼロ」ではない、がこの図のポイントです。`
      : `<b>読み解き：</b>ローンの返済は <b>${h.payoffAge}歳</b>で、リタイア（${h.retireAge}歳）前に完済できる見込みです。ただし <b>維持費（グレー）は完済後も90歳までずっと</b>続きます。「ローンが終わる＝住居費ゼロ」ではない点だけ覚えておきましょう。`;
    facts = `<div class="fact"><div class="k">完済の見込み</div><div class="v${h.retireLeftover>0?' warn':''}">${h.payoffAge}歳</div></div><div class="fact"><div class="k">リタイアまで</div><div class="v">${h.retireAge}歳</div></div><div class="fact"><div class="k">維持費（年）</div><div class="v">約${man(h.maintAnnual)}万</div></div>`;
  } else if (h.state === 'owned'){
    legend = `<span><span class="swatch" style="background:var(--seg-maint)"></span>維持費（固定資産税・修繕・保険／90歳までずっと）</span>`;
    tlCall = `<b>読み解き：</b>返済は終わっていても、<b>維持費（年 約${man(h.maintAnnual)}万）は90歳までずっと</b>かかります。総額にすると <b>約${man(h.maintTotal)}万</b>。日々の維持費は家計に入っているはず。気にしておきたいのは、たまに来る大規模修繕への備えです。`;
    facts = `<div class="fact"><div class="k">ローン</div><div class="v ok">完済済み</div></div><div class="fact"><div class="k">維持費（年）</div><div class="v">約${man(h.maintAnnual)}万</div></div><div class="fact"><div class="k">90歳までの維持費</div><div class="v">約${man(h.maintTotal)}万</div></div>`;
  } else {
    legend = `<span><span class="swatch" style="background:var(--seg-rent)"></span>家賃（リタイア前）</span><span><span class="swatch" style="background:rgba(194,104,58,.42)"></span>家賃（リタイア後もずっと）</span>`;
    if (h.rentMonthly > 0){
      // B-8：家賃の月額は1桁表示（m1）。整数丸め(man)だと「7万×62年」で検算が合わず約150万ズレて見えた（実値72,000円→総額は7.2万基準）。
      const rentM = m1(h.rentMonthly/10000);
      tlCall = `<b>読み解き：</b>家賃は退職後も止まりません。今の家賃（月${rentM}万）が90歳まで続くと、総額は <b>約${man(h.rentTotal)}万</b>。これは「だから買え」という意味ではなく、<b>賃貸の自由さ・身軽さの裏にあるコスト</b>を数字で見ておくためのものです。`;
      facts = `<div class="fact"><div class="k">今の家賃（月）</div><div class="v">${rentM}万</div></div><div class="fact"><div class="k">あと払う年数</div><div class="v">${h.yearsLeft}年</div></div><div class="fact"><div class="k">90歳までの家賃</div><div class="v">約${man(h.rentTotal)}万</div></div>`;
    } else {
      tlCall = `<b>読み解き：</b>今は住居費の負担が軽い状態です。将来「自分の住まい」を持つと、家賃でも購入でも住居費は90歳までずっと続くお金になります。今のうちに守りの土台を厚くしておくと、将来の選択肢が広がります。`;
      facts = `<div class="fact"><div class="k">今の住居費</div><div class="v ok">軽め</div></div>`;
    }
  }
  const chartSec = `<div class="sec"><h3>${chartTtl}</h3>`
    + `<div class="chartbox"><canvas id="houseChart"></canvas></div>`
    + `<div class="legend">${legend}</div>`
    + `<div class="tl-call">${tlCall}</div>`
    + `<div class="facts">${facts}</div>`
    + `<p class="note">※ 維持費・家賃は「90歳まで払い続ける」前提で引いています（人生100年の手前の現実的な目安）。持ち家でもローン完済後ずっと維持費はかかり、賃貸も同じく家賃が続きます。</p></div>`;

  // ③ 気づきカード（loan/owned）／ 読み物（rent・family）
  let cardSec;
  if (h.state === 'loan' || h.state === 'owned'){
    // B-3：住み替え・リフォーム等の予定を入力済みなら、パネルでも1行ふれる（ライフイベントの山と世界観をそろえる＝完済でも予定の山が立つ理由が分かる）
    const planNote = h.housingPlan > 0
      ? `<p class="note">🏠 <b>住み替え・リフォーム等の予定 ${man(h.housingPlan)}万</b>（${h.age + h.housingPlanYears}歳ごろ）を入力済みです。この予定は「ライフイベント」の出費の山にも反映されています（→ <a onclick="gotoArea('lifeevent')">ライフイベントで見る →</a>）。</p>`
      : '';
    cardSec = `<div class="sec"><h3>見落としチェック</h3><div class="inv-list">${cardsHTML}</div>${planNote}<p class="note">※ 健診の回答から「住まいで気をつけたい点」を拾って表示しています。特定の行動を強制するものではありません。</p></div>`;
  } else {
    const planLine = (h.housingPlan > 0)
      ? `<li><b>購入予定として ${man(h.housingPlan)}万</b>を入力済み。買うときは頭金で「いざという時の備え」まで使い切らないのが大前提です（→ <a onclick="gotoArea('defense')">守り</a>）</li>`
      : `<li><b>頭金と守りの土台</b>：頭金で「いざという時の備え」まで使い切らないこと（→ <a onclick="gotoArea('defense')">守り</a>と地続き）</li>`;
    cardSec = `<div class="sec"><h3>もし「買うかどうか」を考えるときに見るポイント</h3>`
      + `<div class="read">🔑 <b>賃貸は「身軽さ」を買っている状態です。</b>転勤・家族構成の変化に合わせて動きやすく、修繕や災害の負担も大家さん側。そのぶん家賃は資産にならず、退職後もずっと続きます。どちらが正解という話ではありません。`
      + `<b style="display:block;margin-top:9px">購入を考え始めたときに、結論の前に見ておくと良い点：</b>`
      + `<ul>${planLine}`
      + `<li><b>維持費</b>：購入後は家賃が消える代わりに、固定資産税・修繕・保険で<b>年1%前後</b>の維持費が乗る</li>`
      + `<li><b>住宅ローン控除・団信</b>：税の軽減や、万一のとき残債が消える保険が付く（保険パネルと関係）</li>`
      + `<li><b>動かしにくさ</b>：売るのに時間がかかる。転居の自由とのトレードオフ</li></ul>`
      + `<span style="display:block;margin-top:9px;color:var(--muted)">※ ここでは「賃貸 vs 購入どちらが得か」の結論は出しません。判断材料を並べるだけです。</span></div></div>`;
  }

  // ④ 次の一手（状態で出し分け・FB③：守りへの戻りリンクは出さない＝通過済みの駅。主導線は次の駅）
  // FB②（2026-06-15 社長承認）：次の駅誘導はスポーク下部フッターに集約＝nextStationFill('housing')は削除
  let nextParts;
  if (h.state === 'loan'){
    let p = '';
    if (h.retireLeftover > 0) p += `<div class="fill"><span class="big">退職後に残る返済 ── 「定年までに完済」に寄せる手</span><br><span style="color:var(--muted);font-size:12px">繰上返済や退職金での完済で、年金生活に固定費を持ち込まない形に寄せられます。ただし守りの土台を崩さない範囲で。</span></div>`;
    // R2：返済が重い＝前提未達のときだけ家計CFへ（ガード付きの戻りは維持）
    if (h.ratioPct > 35) p += `<div class="fill cf"><span class="big">まず返済の重さを家計の中で確かめる</span><br><span style="color:var(--muted)">返済比率が高めです。固定費の見直しで家計に余白を作るのが先決。→ <a class="lnk" onclick="gotoArea('cashflow')">家計CFで見る →</a></span></div>`;
    p += `<div class="fill defense"><span class="big">維持費は「守りの土台」とは別腹で確保</span><br><span style="color:var(--muted)">急な修繕に備える分は、いざという時の備え（前の駅「<a class="lnk" onclick="gotoAreaSafe('defense')">守り</a>」の数字）とは別に置いておくと安心です。</span></div>`;
    nextParts = p;
  } else if (h.state === 'owned'){
    nextParts = `<div class="fill"><span class="big">維持費は「年1回の点検」でOK</span><br><span style="color:var(--muted);font-size:12px">大きな住居費の山は越えています。あとは将来の大規模修繕に向けて、月いくらか積み立てる習慣があれば十分です。</span></div>`;
  } else if (h.state === 'family'){
    nextParts = `<div class="fill defense"><span class="big">住居費が軽い「今」が土台づくりのチャンス</span><br><span style="color:var(--muted);font-size:12px">家賃・ローンの負担が軽いうちに、いざという時の備えと投資の土台を厚くしておくと、将来の住まい選びが自由になります（備えの目安は前の駅「守り」で確認済み）。</span></div>`;
  } else {
    // R3：「もし買うなら守りから」は本文中の注釈リンクに最小化
    nextParts = `<div class="fill"><span class="big">今は無理に買わなくてOK</span><br><span style="color:var(--muted);font-size:12px">賃貸の身軽さには価値があります。購入は「家族構成が固まった」「長く住む場所が決まった」タイミングで考えれば十分です。買うときは、頭金で「いざという時の備え」（前の駅「<a class="lnk" onclick="gotoArea('defense')">守り</a>」の数字）を使い切らないことが大前提です。</span></div>`;
  }
  const next = `<div class="sec"><h3>次の一手</h3>${nextParts}<p class="note">※ 「こうしろ」という指示ではありません。一般的な選択肢を示すだけで、最終判断はご家庭で（必要なら有資格者へ）。</p></div>`;

  // 派生C：団信・ローン残高の追記（住まい＝単一真実源。保険パネルの必要保障額に反映）。ローンがある loan 状態のみ＋実世帯のみ
  let houseAddBox = '';
  if (h.state === 'loan' && detailAllowed()){
    const dv = h.danshin || 'unknown';
    const balVal = Math.round((h.loanBalance || 0) / 10000);   // 入力欄の初期値（円→万・カンマなし）
    const seg = (v, lbl) => `<button type="button" class="${dv===v?'on':''}" onclick="setDanshin('${v}')">${lbl}</button>`;
    houseAddBox = `<div class="addbox">`
      + `<span class="lbl">＋ もっと正確にする（地図から追記）</span>`
      + `<div class="intro">団信（団体信用生命保険）の有無で、万一のときに遺族へローンが残るかが変わります。設定すると保険パネルの「必要保障額」に反映されます。</div>`
      + `<div class="field"><div class="q">住宅ローンに団信は付いていますか？ <small>（多くの住宅ローンに付いています）</small></div>`
      + `<div class="arow"><div class="seg">${seg('unknown','わからない')}${seg('yes','付いている')}${seg('no','付いていない')}</div></div>`
      + `<div class="hint">団信が付いていれば、契約者の万一でローンが完済され、遺族にローンは残りません（その分、必要保障額が減ります）。</div>`
      + `<div class="sub-field${dv==='no'?'':' off'}"><div class="arow">いまのローン残高 <input type="number" min="0" inputmode="numeric" value="${balVal}" onchange="setLoanBalance(this)"> <span class="unit">万円</span></div>`
      + `<div class="hint">団信が付いていない場合、この残高がそのまま遺族の負担になる前提で必要保障額に足します。</div></div>`
      + `<div class="applied">${dv==='yes' ? '✓ ローン完済の前提で必要保障額を計算します' : dv==='no' && h.loanBalance>0 ? '✓ 残るローンを必要保障額に上乗せします' : ''}</div></div>`
      + `<div class="field"><div class="ref">🩹 設定した内容は <a class="lnk" onclick="gotoArea('coverage')">保険パネルの必要保障額 →</a> に反映されます。</div></div>`
      + `</div>`;
  }

  // 派生B：修繕積立金の追記（戸建て かつ 既存の積立0／未入力 のときだけ・実世帯のみ）。
  // 「これから備える額（月）」を入れると、その分を毎月の支出に織り込んで再計算（家計CF／出口へ波及）。
  let shuzenAddBox = '';
  if (h.isDetached && h.shuzenMiss && detailAllowed()){
    const planVal = Math.round((h.shuzenPlanMonthly || 0) / 10000);   // 入力欄の初期値（円→万・カンマなし）
    shuzenAddBox = `<div class="addbox">`
      + `<span class="lbl">＋ 将来に備える（地図から追記）</span>`
      + `<div class="intro">戸建ての大規模修繕に向けて、これから毎月いくら積み立てるかを入れると、その分を「毎月の支出」に織り込んで家計の見通しを引き直します。0 のままなら何も変わりません。</div>`
      + `<div class="field"><div class="q">これから毎月いくら備える想定で計算しますか？ <small>（目安は月1〜2万）</small></div>`
      + `<div class="arow">月 <input type="number" min="0" inputmode="numeric" value="${planVal}" onchange="setShuzenPlan(this)"> <span class="unit">万円</span></div>`
      + `<div class="hint">ここで入れた額は毎月の支出に足して計算します（家計CF・出口の見通しに反映）。実際に積み立て始めるかどうかは、いざという時の備え（守りの土台）とのバランスで。</div>`
      + `<div class="applied">${h.shuzenPlanMonthly > 0 ? '✓ 月' + man(h.shuzenPlanMonthly) + '万 を毎月の支出に織り込んで計算しています' : ''}</div></div>`
      + `<div class="field"><div class="ref">📊 反映先は <a class="lnk" onclick="gotoArea('cashflow')">家計CF →</a> ／ <a class="lnk" onclick="gotoArea('exit')">出口・取り崩し →</a> です。</div></div>`
      + `</div>`;
  }
  return verdict + chartSec + cardSec + houseAddBox + shuzenAddBox + next;
}

function drawHousingChart(h){
  const ctx = document.getElementById('houseChart');
  if (!ctx || !h) return;
  if (housingChartInst) { housingChartInst.destroy(); housingChartInst = null; }
  const ink = cssVar('--ink'), muted = cssVar('--muted'), line = cssVar('--line');
  const cPre = cssVar('--seg-pre'), cPost = cssVar('--seg-post'), cMaint = cssVar('--seg-maint'), cRent = cssVar('--seg-rent');
  const LIFE_END = h.LIFE_END, age = h.age, retireAge = h.retireAge;
  let labels, datasets;
  if (h.state === 'loan'){
    labels = ['住宅ローン返済','住まいの維持費'];
    const preEnd = Math.min(h.payoffAge, retireAge);   // リタイア前に返す分の終端
    datasets = [
      { label:'返済（リタイア前）',         data:[[age, preEnd], null],         backgroundColor:cPre,   borderWidth:0, borderRadius:4, barPercentage:0.62 },
      { label:'返済（リタイア後も残る）',     data:[[retireAge, h.payoffAge], null], backgroundColor:cPost, borderWidth:0, borderRadius:4, barPercentage:0.62 },
      { label:'維持費（固定資産税・修繕・保険）', data:[null, [age, LIFE_END]],     backgroundColor:cMaint, borderWidth:0, borderRadius:4, barPercentage:0.62 },
    ];
  } else if (h.state === 'owned'){
    labels = ['住まいの維持費'];
    datasets = [ { label:'維持費（固定資産税・修繕・保険）', data:[[age, LIFE_END]], backgroundColor:cMaint, borderWidth:0, borderRadius:4, barPercentage:0.5 } ];
  } else {
    labels = ['家賃'];
    datasets = [
      { label:'家賃（リタイア前）',       data:[[age, retireAge]],     backgroundColor:cRent, borderWidth:0, borderRadius:4, barPercentage:0.5 },
      { label:'家賃（リタイア後もずっと）', data:[[retireAge, LIFE_END]], backgroundColor:'rgba(194,104,58,.42)', borderWidth:0, borderRadius:4, barPercentage:0.5 },
    ];
  }
  const retireLine = { id:'housingRetireLine', afterDraw(c){
    const sx = c.scales.x; if (!sx) return;
    const x = sx.getPixelForValue(retireAge); const { top, bottom } = c.chartArea; const cx = c.ctx;
    cx.save(); cx.beginPath(); cx.setLineDash([5,4]); cx.moveTo(x, top); cx.lineTo(x, bottom);
    cx.lineWidth = 1.6; cx.strokeStyle = cssVar('--accent2'); cx.stroke();
    cx.setLineDash([]); cx.fillStyle = cssVar('--accent2'); cx.font = '700 10px sans-serif'; cx.textAlign = 'center';
    cx.fillText('リタイア ' + retireAge + '歳', x, top - 3); cx.restore();
  }};
  housingChartInst = new Chart(ctx, {
    type:'bar', data:{ labels, datasets },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
      animation: reduceMotion ? false : { duration:600 },
      layout:{ padding:{ top:14 } },
      interaction:{ mode:'nearest', intersect:true },
      plugins:{ legend:{ display:false },
        tooltip:{ callbacks:{ label:function(c){ const v = c.raw; if (!v) return ''; return c.dataset.label + '：' + v[0] + '歳 〜 ' + (v[1] >= LIFE_END ? LIFE_END + '歳〜' : v[1] + '歳'); } } } },
      scales:{
        x:{ min:age, max:LIFE_END, title:{ display:true, text:'年齢', color:muted, font:{ size:10 } }, grid:{ color:line }, ticks:{ color:muted, font:{ size:10 }, stepSize:5, callback:(v)=> v + '歳' } },
        y:{ grid:{ display:false }, ticks:{ color:ink, font:{ size:12, weight:'700' } } }
      }
    },
    plugins:[retireLine]
  });
}

function afterRenderHousing(model){
  const canvas0 = document.getElementById('houseChart');
  if (!model.housing || !canvas0) return;
  // 再レンダリング(boot/visibilitychange/storage/import)で canvas が作り直されたら旧 Chart を破棄（F1再発防止）。
  if (housingChartInst && housingChartInst.canvas !== canvas0) { housingChartInst.destroy(); housingChartInst = null; }
  // 描画。閉/未レイアウトは後で再試行。全幅(grid-column:1/-1)リフロー前に狭く焼き付いたら実寸で描き直す（F2再発防止）。
  const draw = () => {
    const c = document.getElementById('houseChart');
    if (!c || c.clientWidth <= 0) return false;
    const box = c.parentElement;
    if (housingChartInst && housingChartInst.canvas === c && box && housingChartInst.width >= box.clientWidth - 8) return true;
    drawHousingChart(model.housing);
    return true;
  };
  draw();
  setTimeout(draw, 80);
  setTimeout(draw, 320);

    const evs = le.extraEvents || [];
    const list = evs.length
      ? `<ul class="evlist">${evs.map((ev,i)=>`<li><span class="nm">${esc(ev.name)}</span><span class="amt">約${man0(Math.round((ev.amount||0)/10000))}万</span><span class="age">${esc(ev.age)}歳ごろ</span><button type="button" class="del" title="削除" onclick="removeMapEvent(${i})">🗑</button></li>`).join('')}</ul>`
      : `<p class="ev-empty">まだ追加した山はありません。</p>`;
    addSec = `<div class="sec"><h3>地図に山を足す</h3>`
      + `<div class="addbox">`
      + `<span class="lbl">＋ 山を足す（地図から追記）</span>`
      + `<div class="intro">車の買い替え・リフォーム・まとまった旅行など、<b>金額と時期が見えている予定</b>を足すと、この地図に「出費の山」として描かれます。</div>`
      + `<div class="field"><div class="q">足した山 <small>（行の 🗑 で削除）</small></div>${list}</div>`
      + `<div class="field"><div class="q">山を追加する</div>`
      + `<div class="arow"><input type="text" id="mapEvName" placeholder="例：車の買い替え" maxlength="40">`
      + `<input type="number" id="mapEvAmt" min="0" inputmode="numeric" placeholder="200"> <span class="unit">万円</span>`
      + `<input type="number" id="mapEvAge" min="0" max="110" inputmode="numeric" placeholder="${(le.age||0)+5}"> <span class="unit">歳ごろ</span>`
      + `<button type="button" class="addbtn" onclick="addMapEvent()">＋ 追加</button></div>`
      + `<div class="hint">金額は「今の値札」のままの目安でOK。物価の変化は地図側で別途扱います。</div>`
      + `<div class="applied" id="mapEvApplied"></div></div>`
      + `<div class="field"><div class="ref">📋 たくさんまとめて入れ直すなら → <a class="lnk" href="https://smartside-jp.github.io/asset-planning-checkup/" target="_blank" rel="noopener">健診で入力する →</a></div></div>`
      + `</div></div>`;
  }

  return verdict + chartSec + cardSec + readSec + addSec + next;
}

// リタイア縦線プラグイン（住まいの型・2チャート共用のためファクトリ化）
function lifeRetireLinePlugin(retireAge){
  return { id:'lifeRetireLine', afterDraw(c){
    const sx = c.scales.x; if (!sx) return;
    const x = sx.getPixelForValue(retireAge); const { top, bottom } = c.chartArea; const cx = c.ctx;
    cx.save(); cx.beginPath(); cx.setLineDash([5,4]); cx.moveTo(x, top); cx.lineTo(x, bottom);
    cx.lineWidth = 1.6; cx.strokeStyle = cssVar('--accent2'); cx.stroke();
    cx.setLineDash([]); cx.fillStyle = cssVar('--accent2'); cx.font = '700 10px sans-serif'; cx.textAlign = 'center';
    cx.fillText('リタイア ' + retireAge + '歳', x, top - 3); cx.restore();
  }};
}

// 上段：家族レーン式タイムライン（floating bar・1イベント＝1データセットでツールチップに説明を出す）
function drawLifeLaneChart(le){
  const ctx = document.getElementById('lifeLaneChart');
  if (!ctx || !le || le.state === 'empty') return;
  if (lifeLaneChartInst) { lifeLaneChartInst.destroy(); lifeLaneChartInst = null; }
  const ink = cssVar('--ink'), muted = cssVar('--muted'), line = cssVar('--line');
  const labels = le.lanes.map(l => l.label);
  const datasets = [];
  le.lanes.forEach((l, li) => l.events.forEach(ev => {
    datasets.push({ label: ev.tip, data: labels.map((_, i) => i === li ? [ev.s, ev.e] : null), icon: ev.icon,
      backgroundColor: cssVar(ev.colorVar), borderWidth:0, borderRadius:4,
      barPercentage:0.55, categoryPercentage:1, grouped:false });
  }));
  // イベントの絵文字をバー中央に描くプラグイン
  const evIcons = { id:'lifeEvIcons', afterDatasetsDraw(c){
    const cx = c.ctx;
    c.data.datasets.forEach((ds, i) => {
      const meta = c.getDatasetMeta(i); if (meta.hidden) return;
      meta.data.forEach((el, j) => {
        if (!ds.data[j]) return;
        cx.save(); cx.font = '12px sans-serif'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(ds.icon || '', (el.base + el.x) / 2, el.y); cx.restore();
      });
    });
  }};
  lifeLaneChartInst = new Chart(ctx, {
    type:'bar', data:{ labels, datasets },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
      animation: reduceMotion ? false : { duration:600 },
      layout:{ padding:{ top:14 } },
      interaction:{ mode:'nearest', intersect:true },
      plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ title:()=> '', label:(c)=> c.dataset.label } } },
      scales:{
        x:{ min:le.axisMin, max:le.axisMax, grid:{ color:line }, ticks:{ color:muted, font:{ size:10 }, stepSize:5, callback:(v)=> v + '歳' } },
        y:{ grid:{ display:false }, ticks:{ color:ink, font:{ size:11.5, weight:'700' } } }
      }
    },
    plugins:[lifeRetireLinePlugin(le.retireAge), evIcons]
  });
}

// 下段：山の棒 × 資産の線（標準シナリオ）の複合チャート（同じ物差し＝万円）
function drawLifeMoneyChart(le){
  const ctx = document.getElementById('lifeMoneyChart');
  if (!ctx || !le || le.state === 'empty') return;
  if (lifeMoneyChartInst) { lifeMoneyChartInst.destroy(); lifeMoneyChartInst = null; }
  const muted = cssVar('--muted'), line = cssVar('--line');
  const cBar = cssVar('--ev-bar'), cNear = cssVar('--ev-near'), cAsset = cssVar('--ev-asset');
  const colors = le.bars.map(b => Math.abs(b.x - le.retireAge) <= 3 ? cNear : cBar);
  lifeMoneyChartInst = new Chart(ctx, {
    data:{ datasets:[
      { type:'line', label:'asset', data:le.assetLine, borderColor:cAsset, borderWidth:2.2,
        pointRadius:0, pointHoverRadius:4, tension:0.25, fill:false, order:1 },
      { type:'bar', label:'event', data:le.bars, backgroundColor:colors, borderWidth:0, borderRadius:4, barThickness:13, order:2 },
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      animation: reduceMotion ? false : { duration:600 },
      interaction:{ mode:'nearest', intersect:false },
      layout:{ padding:{ top:14 } },
      plugins:{ legend:{ display:false }, tooltip:{ callbacks:{
        title:(c)=> c[0].parsed.x + '歳のとき',
        label:(c)=> c.dataset.label === 'asset' ? '資産の見込み（標準）約' + man0(c.parsed.y) + '万円' : '出費の山 約' + man0(c.parsed.y) + '万円' } } },
      scales:{
        x:{ type:'linear', min:le.axisMin, max:le.axisMax, title:{ display:true, text:'年齢', color:muted, font:{ size:10 } }, grid:{ color:line }, ticks:{ color:muted, font:{ size:10 }, stepSize:5, callback:(v)=> v + '歳' } },
        y:{ beginAtZero:true, grid:{ color:line }, ticks:{ color:muted, font:{ size:10 }, callback:(v)=> man0(v) + '万' } }
      }
    },
    plugins:[lifeRetireLinePlugin(le.retireAge)]
  });
}

function afterRenderLifeevent(model){
  const le = model.lifeevent;
  if (!le || le.state === 'empty') {
    // filled→empty遷移（インポート等）で旧インスタンスが残らないよう破棄（applyThemeの空振り防止）
    if (lifeLaneChartInst) { lifeLaneChartInst.destroy(); lifeLaneChartInst = null; }
    if (lifeMoneyChartInst) { lifeMoneyChartInst.destroy(); lifeMoneyChartInst = null; }
    return;
  }
  const c1 = document.getElementById('lifeLaneChart'), c2 = document.getElementById('lifeMoneyChart');
  if (!c1 && !c2) return;
  // 再レンダリングで canvas が作り直されたら旧 Chart を破棄（F1再発防止・2canvas分）。
  if (lifeLaneChartInst && lifeLaneChartInst.canvas !== c1) { lifeLaneChartInst.destroy(); lifeLaneChartInst = null; }
  if (lifeMoneyChartInst && lifeMoneyChartInst.canvas !== c2) { lifeMoneyChartInst.destroy(); lifeMoneyChartInst = null; }
  // 描画。閉/未レイアウトは後で再試行。全幅リフロー前に狭く焼き付いたら実寸で描き直す（F2再発防止）。
  const draw = () => {
    const a = document.getElementById('lifeLaneChart'), b = document.getElementById('lifeMoneyChart');
    if (!a || a.clientWidth <= 0) return false;
    const boxA = a.parentElement, boxB = b ? b.parentElement : null;
    const okA = !!(lifeLaneChartInst && lifeLaneChartInst.canvas === a && boxA && lifeLaneChartInst.width >= boxA.clientWidth - 8);
    const okB = !!(lifeMoneyChartInst && b && lifeMoneyChartInst.canvas === b && boxB && lifeMoneyChartInst.width >= boxB.clientWidth - 8);
    if (okA && okB) return true;
    if (!okA) drawLifeLaneChart(le);
    if (!okB) drawLifeMoneyChart(le);
    return true;
  };
  draw();
  setTimeout(draw, 80);
  setTimeout(draw, 320);
  const det = document.querySelector('details.area.lifeevent-area');
  if (det && !det._lifeToggleBound) {
    det._lifeToggleBound = true;
    det.addEventListener('toggle', () => { if (det.open) { requestAnimationFrame(draw); setTimeout(draw, 80); } });
  }
}

// Stage2：エリア間ジャンプ/全駅ツアー/生涯CF/見本シミュは app.04.shared.js（遷移版 gotoArea/gotoCF/toggleSurplusSim）
// と app.06.hub.js（startTour／ハブ③のシミュトグル hubToggleSim）へ移設。
// パネルHTML内の gotoArea('...')/gotoCF()/toggleSurplusSim() 呼び出しは無改変＝shared側がページ遷移として解決する。

</script>
<script>/* ============================================================
   SPOKE（map-area.html?area=KEY）専用：1エリアを1ページでじっくり
   - 健診データ＋地図追記から1エリアのパネルだけ描画（パネルHTML/グラフ/計算は panels.js・calc を無改変で呼ぶ）。
   - 追記（配偶者収入/団信/修繕/イベント/検討済み）はこのページ内。保存→このパネルだけ再描画。ハブに戻ると②③も自動反映。
   - 訪問記録（⑧）は build 前に行う＝最終駅で達成finaleが出る。
   ============================================================ */

const params = new URLSearchParams(location.search);
const AREA_KEY = params.get('area');

// 派生D3 v2 工程④：出口パネル「シナリオ切替タブ」の現在キー。セッション内一時保持（localStorage非保存）。
//   このページ内では recalcDetailSpoke / setExitScenario で再描画するたびに参照される。
//   別ページ（hub→spoke遷移、別エリア遷移）では state がリセットされる＝プランv2の「セッション内一時保持」要件と一致。
let exitScenario = 'standard';
// 選択シナリオ用の exit を取り出す（fallback：cfByScenario が無いサンプル経路は m.exit）。
function pickExit(m){ return (m && m.exitByScenario && m.exitByScenario[exitScenario]) || (m && m.exit) || null; }

// エリア→パネルHTML / グラフ描画 / ラッパークラス（renderAreas のエリア別分岐と一致）
const PANEL_HTML = {
  exit:       m => exitPanelHTML(pickExit(m), exitScenario),
  defense:    m => defensePanelHTML(m.defense),
  cashflow:   m => cashflowPanelHTML(m.cashflow),
  coverage:   m => coveragePanelHTML(m.coverage),
  allocation: m => allocationPanelHTML(m.allocation),
  housing:    m => housingPanelHTML(m.housing),
  lifeevent:  m => lifeeventPanelHTML(m.lifeevent),
};
const PANEL_AFTER = {
  // 派生D3 v2 工程④：afterRenderExit は model.exit を見るので、選択シナリオの exit を一時差し込んで渡す。
  //   CURRENT 自体は汚さない（=hub からのデータ流入経路の整合を保つ）。
  exit: (m) => afterRenderExit(Object.assign({}, m, { exit: pickExit(m) })),
  defense: afterRenderDefense, cashflow: afterRenderCashflow,
  coverage: afterRenderCoverage, allocation: afterRenderAllocation, housing: afterRenderHousing, lifeevent: afterRenderLifeevent,
};
const PANEL_WRAP  = { exit:'exit-panel', defense:'defense-panel', cashflow:'cashflow-panel', coverage:'coverage-panel', allocation:'allocation-panel', housing:'housing-panel', lifeevent:'lifeevent-panel' };
const AREA_CLASS  = { exit:'exit-area', defense:'defense-area', cashflow:'cashflow-area', coverage:'coverage-area', allocation:'allocation-area', housing:'housing-area', lifeevent:'lifeevent-area' };
// allocation/housing/lifeevent は status='empty' でも自前パネルを出す（renderAreas と同じ除外）
const EMPTY_OK    = { allocation:1, housing:1, lifeevent:1 };

/* テーマはレンダ前に適用（チャートの色が初回から正しく出るように） */
const themeBtn = document.getElementById('themeToggle');
try { const saved = localStorage.getItem('asset_map_theme'); if (saved){ document.documentElement.dataset.theme = saved; if (themeBtn) themeBtn.textContent = saved==='dark'?'☀️':'🌙'; } } catch(e){}
function applyTheme(t){ document.documentElement.dataset.theme = t; if (themeBtn) themeBtn.textContent = t==='dark'?'☀️':'🌙'; if (CURRENT && PANEL_AFTER[AREA_KEY]) PANEL_AFTER[AREA_KEY](CURRENT); }
if (themeBtn) themeBtn.addEventListener('click', () => { const t = document.documentElement.dataset.theme==='dark'?'light':'dark'; applyTheme(t); try{ localStorage.setItem('asset_map_theme', t); }catch(e){} });

/* ---- 描画 ---- */
function renderSpokeHead(a){
  const crumb = document.getElementById('crumb'); if (crumb) crumb.textContent = '資産形成の地図 ／ ' + a.name;
  const head = document.getElementById('spokeHead');
  if (head) head.innerHTML =
      `<span class="ico" style="--cat:var(--c-${a.cat})">${a.icon}</span>`
    + `<div><div class="ttl">${a.name} <span class="tag" data-s="${a.status}">${AREA_TAG_TEXT[a.status]}</span></div>`
    + `<div class="smy">${esc(a.smy)}</div></div>`;
  document.title = a.name + '｜資産形成の地図';
}

// パネル本体を描画。実パネルを描いたら true（＝afterRenderでグラフを描く対象）
// ※ spokeは<details>でなく<section class="...spoke-area">で描く（常時展開）。afterRender内のtoggle再描画ガード
//   （details.area探し）はspokeでは空振り＝不要。グラフ本体は afterRender 直書きの draw() で描かれる（実機検証済み）。
function renderSpokeBody(model, a){
  const key = a.key;
  let detail, hasPanel = false;
  if (a.status === 'empty' && !EMPTY_OK[key]) {
    detail = `<div class="area-detail"><p class="sub" style="margin:12px 0 0">このエリアはまだ空白です。健康診断で入力すると埋まります。</p><div class="cta-row"><a class="btn invest" href="https://smartside-jp.github.io/asset-planning-checkup/" target="_blank" rel="noopener">入力して埋める →</a></div></div>`;
  } else if (PANEL_HTML[key]) {
    detail = `<div class="area-detail"><div class="${PANEL_WRAP[key]}">${PANEL_HTML[key](model)}</div></div>`;
    hasPanel = true;
  } else {
    detail = `<div class="area-detail"><p class="sub" style="margin:12px 0 0">このエリアは準備中です。</p></div>`;
  }
  document.getElementById('spokeBody').innerHTML =
    `<section class="area card ${AREA_CLASS[key] || ''} spoke-area" data-key="${key}" style="--cat:var(--c-${a.cat})">${detail}${reviewedControlHTML(a)}</section>`;
  return hasPanel;
}

function renderSpokeNav(a){
  const back = `<a class="backlink" href="${hubFileName()}">← 地図にもどる</a>`;
  const nk = nextStationKey(a.key);
  const fwd = nk
    ? `<a class="next-btn" href="${areaURL(nk)}">次の駅：${STATION_LABEL[nk]} →</a>`
    : `<a class="consult-btn" href="${CONSULT_URL}" target="_blank" rel="noopener">💬 FPに相談する</a>`;
  const nav = document.getElementById('spokeNav'); if (nav) nav.innerHTML = back + fwd;
}

// 1エリアのページを描画（初回・追記後の再描画 共通）。model から CURRENT を差し替える。
function renderSpokePanel(model){
  CURRENT = model;
  const a = (model.areas || []).find(x => x.key === AREA_KEY)
         || { key:AREA_KEY, name:STATION_LABEL[AREA_KEY]||AREA_KEY, smy:'', status:'empty', cat:AREA_KEY, icon:'' };
  // locked（MVPでは休眠）はハブのpaywallへ
  if (a.status === 'locked'){ location.replace(hubFileName() + '#paywall'); return; }
  renderSpokeHead(a);
  const hasPanel = renderSpokeBody(model, a);
  if (hasPanel && PANEL_AFTER[AREA_KEY]) PANEL_AFTER[AREA_KEY](model);   // グラフ（afterRender内でRAF・0×0対策）
  renderSpokeNav(a);
}

/* ---- 追記レイヤー（boot.js から移設・再計算は recalcDetailSpoke＝このパネルだけ描き直す） ---- */
function recalcDetailSpoke(){
  if (!CURRENT || CURRENT.isSample) return;                  // サンプル世帯は追記不可
  const raw = loadRaw(); if (!raw) return;
  const scrollY = window.scrollY;
  CURRENT = { isSample:false };                              // detailAllowed() を build/再描画前に確定
  const model = buildMapModel(mergeDetail(raw, loadDetail()));
  model.isSample = false;
  renderSpokePanel(model);
  window.scrollTo(0, scrollY);                               // 入力していた位置に留まる
}
const manToYen = (el) => Math.max(0, Math.round((+el.value || 0))) * 10000;   // 入力欄=万円 → 保存=円
window.setSpouseWorks     = function(v){  patchDetail({ spouseWorks: v === 'yes' ? 'yes' : 'no' }); recalcDetailSpoke(); };
window.setSpouseIncome    = function(el){ patchDetail({ spouseIncome: manToYen(el) });  recalcDetailSpoke(); };
window.setInsDeathBenefit = function(el){ patchDetail({ insDeathBenefit: manToYen(el) }); recalcDetailSpoke(); };
// P1-5（2026-06-18）：配偶者の死亡保障額（任意・地図追記）。calcCoverageNeed が lostPerson='spouse' のときに参照する。
window.setSpouseInsDeathBenefit = function(el){ patchDetail({ spouseInsDeathBenefit: manToYen(el) }); recalcDetailSpoke(); };
// P1-5（2026-06-18）：必要保障額の主体切替（self/spouse）。手動切替時に保存・以降ユーザー選択が自動判定より優先。
window.setCoverageLostPerson = function(v){ patchDetail({ coverageLostPerson: (v === 'spouse' ? 'spouse' : 'self') }); recalcDetailSpoke(); };
window.setDanshin         = function(v){  patchDetail({ danshin: v }); recalcDetailSpoke(); };
window.setLoanBalance     = function(el){ patchDetail({ loanBalance: manToYen(el) }); recalcDetailSpoke(); };
// 派生B：修繕積立金（これから備える額）を地図から追記＝毎月の支出に上乗せして再計算。
window.setShuzenPlan      = function(el){ patchDetail({ shuzenPlanMonthly: manToYen(el) }); recalcDetailSpoke(); };
// ⑥（P3）：地図からライフイベントを追記/削除
window.addMapEvent = function(){
  const nmEl = document.getElementById('mapEvName'), amtEl = document.getElementById('mapEvAmt'), ageEl = document.getElementById('mapEvAge');
  const ap = document.getElementById('mapEvApplied');
  const nm = ((nmEl && nmEl.value) || '').trim(); const amt = +((amtEl && amtEl.value) || 0); const age = +((ageEl && ageEl.value) || NaN);
  if (!nm || !(amt > 0) || !(age >= 0)){ if (ap){ ap.style.color = 'var(--warn)'; ap.textContent = '⚠ 名前・金額・歳を入れてください'; } return; }
  addExtraEvent(nm, amt, age); recalcDetailSpoke();
};
window.removeMapEvent = function(i){ removeExtraEvent(i); recalcDetailSpoke(); };
// ⑦（P3-d）：検討済みコントロール
window.startAreaReview = function(key){
  const el = document.getElementById('rvc-' + key);
  if (!el) return;
  el.innerHTML = `<div class="ask"><b>検討済みにする</b>（理由は任意・ひとことでOK）</div>`
    + `<div class="editor"><input id="rvReason-${key}" type="text" maxlength="60" placeholder="例：いまの方針で進める／あとで見直す">`
    + `<button class="save" onclick="setAreaReviewed('${key}')">記録する</button></div>`;
  const i = document.getElementById('rvReason-' + key); if (i) i.focus();
};
window.setAreaReviewed = function(key){
  const i = document.getElementById('rvReason-' + key);
  const reason = i ? i.value.trim() : '';
  setReviewed(key, reason); recalcDetailSpoke();
};
window.clearAreaReviewed = function(key){ clearReviewed(key); recalcDetailSpoke(); };
// 派生D3 v2 工程④：出口パネルのシナリオ切替タブ。クリック→ exitScenario を更新し1パネルだけ再描画。
//   同一エリア（exit）以外では呼ばれない＝onclick は exitPanelHTML 内のボタンからのみ。
//   不正キーは無視（無限再描画防止）。
window.setExitScenario = function(key){
  if (!SCENARIO_KEYS || !SCENARIO_KEYS.includes(key) || key === exitScenario) return;
  exitScenario = key;
  if (CURRENT) renderSpokePanel(CURRENT);   // 1パネル再描画＝afterRender でグラフ再描画も連動
};

/* ---- 初期化 ---- */
(function bootSpoke(){
  if (!AREA_KEY || STATIONS.indexOf(AREA_KEY) < 0){ location.replace(hubFileName()); return; }  // 不正/欠落areaはハブへ
  // 戻るリンクは2か所（ヘッダー/パンくず）とも hubFileName() に追従＝公開/検証どちらの配置でも正しく戻れる
  const backTop = document.getElementById('backLink');   if (backTop)  backTop.href  = hubFileName();
  const backTop2 = document.getElementById('backLink2'); if (backTop2) backTop2.href = hubFileName();

  const raw = loadRaw();
  const isSample = !raw;
  CURRENT = { isSample };                                    // markVisited / buildExitData(allVisited) のための detailAllowed を先に確定
  if (!isSample) markVisited(AREA_KEY);                      // ⑧ 訪問記録を build 前に＝最終駅で達成finale
  const model = buildMapModel(isSample ? SAMPLE_RAW : mergeDetail(raw, loadDetail()));
  model.isSample = isSample;
  renderSpokePanel(model);
})();

// 別タブ/別ページで健診データが変わったら、このスポークも最新へ
window.addEventListener('storage', (e) => { if ((e.key === RAW_KEY || e.key === DETAIL_KEY) && CURRENT && !CURRENT.isSample) recalcDetailSpoke(); });
</script>
