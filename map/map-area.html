<script>/* ============================================================
   4) マッピング層：健診の生データ → 地図モデル
   ============================================================ */
function childRole(i){ return i === 0 ? '長子' : i === 1 ? '次子' : `第${i+1}子`; }

function mapProfile(raw){
  const m = [{ id:'self', role:'本人', age: raw.age }];
  // 2026-06-23：配偶者の年齢を健診で聞くようになった。spouseAge>0 で hole が外れる＝年表に配偶者リタイア印を描く。
  //   spouseAge=0/未入力なら hole 継続 → renderTimetable 側で行ごと非表示（skip）。
  if (raw.family === 'married_no_kids' || raw.family === 'with_dependents') {
    const sa = Number(raw.spouseAge) || 0;
    m.push({ id:'spouse', role:'配偶者', age: sa>0 ? sa : null, hole: !(sa>0) });
  }
  if (raw.family === 'with_dependents' && Array.isArray(raw.kidsAge)) raw.kidsAge.forEach((a, i) => m.push({ id:'child'+(i+1), role: childRole(i), age: a }));
  // 2026-06-23：親・祖父母行は素材なし（健診で年齢を聞いていない）ため hole のまま生成→renderTimetable で skip され非表示。
  //   将来「親の年齢」Qを追加するまでは描画素材ゼロで「準備中」表記をユーザーに見せる方が害が大きいため非表示が妥当。
  m.push({ id:'gp', role:'親・祖父母', age:null, hole:true });
  return m;
}

function mapTimeline(raw, tl){
  const out = []; let careDone = false;
  tl.forEach(e => {
    const name = e.name || '';
    // ⑥（P3）：地図追記イベントは custom 印で最優先処理＝名前に「住宅」「子」等が入っても誤分類しない（自分レーンの汎用pill）。
    if (e.custom) { out.push({ member:'self', selfAge:e.age, span:1, label:name, type:'pill', cat:'lifeevent' }); return; }
    let member='self', cat='lifeevent', type='pill', span=1, label=name;
    const km = name.match(/子\s*(\d+)/);
    if (km) {
      member = 'child' + km[1]; cat = 'lifeevent';
      if (name.includes('高校')) { label = `子${km[1]} 高校`; span = 3; }
      else if (name.includes('大学')) { label = `子${km[1]} 大学`; span = 4; }
    } else if (name.includes('住宅')) { member='self'; cat='housing'; type='milestone'; label='住宅購入'; }
    else if (name.includes('介護')) {
      if (careDone) return; careDone = true;
      member='self'; cat='coverage'; label='親の介護'; span = Math.max(1, raw.careYears || 1);
    } else if (e.marker || name.includes('リタイア')) { member='self'; cat='exit'; type='milestone'; label='リタイア'; }
    else if (name.includes('その他')) { member='self'; cat='lifeevent'; label='その他出費'; }
    out.push({ member, selfAge: e.age, span, label, type, cat });
  });
  if (raw.pensionStartAge) out.push({ member:'self', selfAge: raw.pensionStartAge, span:1, label:'年金開始', type:'milestone', cat:'exit' });
  // 2026-06-23：配偶者の退職milestone。以下すべての条件を満たすときのみ描画：
  //   ① family が married_no_kids / with_dependents（mapProfile の spouse row 生成条件と一致＝単身者の残骸 spouseAge=39 を弾く）
  //   ② spouseWorks=yes（社長判断：退職milestone は共働き時のみ）
  //   ③ spouseAge>0 かつ retireAge>0（数値の正当性）
  //   ④ 計算した spouseRetireSelfAge が axis 範囲内（>=本人現在年齢 && <=axis_end）
  //      位置 = 本人年齢軸上の「配偶者がリタイア年齢に達する時の本人の年齢」
  //           = raw.age + (raw.retireAge − raw.spouseAge)（配偶者リタイア年齢は本人と同じ仮定＝P1-4 と整合）
  //      ガードA（>=me）：配偶者がすでにリタイア年齢以上なら（spouseAge>=retireAge）位置が過去になるため描画しない
  //      ガードB（<=axisEnd）：配偶者が極端に若い（例：本人55・配偶者20）と spouseRetireSelfAge が軸末を超え◆が右にはみ出すため描画しない
  const isMarried = raw.family === 'married_no_kids' || raw.family === 'with_dependents';
  if (isMarried && raw.spouseWorks === 'yes' && (raw.spouseAge||0) > 0 && (raw.retireAge||0) > 0) {
    const sa = Number(raw.spouseAge), ra = Number(raw.retireAge), me = Number(raw.age) || 0;
    const spouseRetireSelfAge = me + (ra - sa);
    const axisEnd = Math.max(90, ra + 25);   // app.03.model.js:332 の buildMapModel axis 定義と完全一致
    if (spouseRetireSelfAge >= me && spouseRetireSelfAge <= axisEnd) {
      out.push({ member:'spouse', selfAge: spouseRetireSelfAge, span:1, label:'配偶者 リタイア', type:'milestone', cat:'exit' });
    }
  }
  return out;
}

function build7Areas(raw, dx, reviewed){
  reviewed = reviewed || {};   // ⑦：検討済みマップ（status の 'reviewed' 昇格は P3-d で実装）
  const nej = dx.nejireList || [];
  const hasNej = (kw) => nej.some(n => kw.some(k => (n.title || '').includes(k)));
  const twistFor = (kw) => { const n = nej.find(x => kw.some(k => (x.title || '').includes(k))); return n ? n.finding : null; };
  const man = (n) => Math.round(n/10000).toLocaleString('ja-JP');
  const months = raw.expense > 0 ? Math.round(raw.bank / raw.expense) : 0;
  const insMonthly = (raw.gakushi==='yes'?(raw.gakushiMonthly||0):0)+(raw.hengaku==='yes'?(raw.hengakuMonthly||0):0)+(raw.kojinNenkin==='yes'?(raw.kojinNenkinMonthly||0):0)+(raw.gaikaHoken==='yes'?(raw.gaikaHokenMonthly||0):0);
  const insRatio = householdIncome(raw) > 0 ? insMonthly / householdIncome(raw) : 0;   // 派生C：世帯収入ベース（家計CF/保障と一致）
  const A = [];

  // defense
  { let st = (raw.bank===0 && raw.expense===0) ? 'empty' : dx.bankSufficient ? 'filled' : 'attention';
    const smy = st==='empty' ? '銀行貯金が未入力' : `生活防衛資金 ${months}ヶ月分（目安${dx.emergencyMonths}ヶ月）`;
    A.push({ key:'defense', cat:'defense', icon:'🛡', name:'守りの土台', status:st, smy,
      twist: st==='attention' ? `備え目安 ¥${man(dx.totalReserve)}万に対し、銀行貯金 ¥${man(raw.bank)}万。` : null,
      mini: st==='attention' ? { a: raw.bank, b: dx.totalReserve } : null }); }

  // cashflow
  { const empty = raw.income===0 && raw.expense===0;
    const insHeavy = insMonthly>0 && insRatio>0.10;
    let st = empty ? 'empty' : (dx.monthlySurplus<0 || insHeavy) ? 'attention' : 'filled';
    const smy = empty ? '収支が未入力' : `月の余り ${dx.monthlySurplus>=0?'+':''}${(dx.monthlySurplus/10000).toFixed(1)}万円`;
    A.push({ key:'cashflow', cat:'cashflow', icon:'💰', name:'家計CF', status:st, smy,
      twist: insHeavy ? twistFor(['保険料']) : null,
      mini: !empty ? { a: raw.income, b: raw.expense } : null }); }

  // coverage
  { const anyIns = raw.gakushi==='yes'||raw.hengaku==='yes'||raw.kojinNenkin==='yes'||raw.gaikaHoken==='yes';
    const att = hasNej(['変額','学資','個人年金','外貨','保険料']);
    let st = att ? 'attention' : 'filled';
    const smy = att ? '保険の見直し余地あり' : (anyIns ? '保険は入力済み・大きな見直しなし' : '見直すべき保険なし');
    A.push({ key:'coverage', cat:'coverage', icon:'🩹', name:'保険', status:st, smy,
      twist: att ? twistFor(['変額','学資','個人年金','外貨','保険料']) : null,
      mini: att ? { a:1, b:0.6 } : null }); }

  // allocation
  { const noInvest = raw.nisa!=='active' && raw.toushinShin==='none' && (raw.crypto||0)===0 && (raw.dcBalance||0)===0 && (raw.dcMonthly||0)===0;
    const att = hasNej(['暗号資産','銀行窓販']);
    let st = noInvest ? 'empty' : att ? 'attention' : 'filled';
    const al = dx.allocation;
    const smy = noInvest ? '未入力（資産配分が描けていません）' : att ? '投資商品に見直し余地あり' : `株式${al.stocksPct}% / 現金${al.cashPct}%`;
    A.push({ key:'allocation', cat:'allocation', icon:'📊', name:'投資の型', status:st, smy,
      twist: att ? twistFor(['暗号資産','銀行窓販']) : null,
      mini: st==='attention' ? { a:1, b:0.6 } : null }); }

  // exit（ペイウォール対象）
  { A.push({ key:'exit', cat:'exit', icon:'🚪', name:'出口・取り崩し', status:'filled', smy:'取り崩し順序と「寿命まで持つか」の精密検査', twist:null, mini:null }); }

  // housing
  { const empty = raw.housing==='rent' && (raw.housingPlan||0)===0;
    // 維持費は「見落とし」警告をやめた（expense=明細ベースで概ね込み）ため attention 点灯条件から外す。
    // でないと owned（維持費ねじれのみ）がバッジ要検討なのにパネルは良好、のチグハグになる。
    const att = hasNej(['ローン','返済']);
    let st = empty ? 'empty' : att ? 'attention' : 'filled';
    const smy = empty ? '賃貸・購入予定なし' : raw.housing==='loan' ? '住宅ローン あり' : raw.housing==='owned' ? '持ち家（ローン無）' : '住まいの情報あり';
    A.push({ key:'housing', cat:'housing', icon:'🏠', name:'住まい', status:st, smy,
      twist: att ? twistFor(['ローン','返済']) : null, mini:null }); }

  // lifeevent
  { const nonMarker = (dx.lifeTimeline||[]).filter(e => !e.marker);
    const empty = nonMarker.length === 0;
    const near = nonMarker.some(e => Math.abs(e.age - raw.retireAge) <= 3);
    // ⑦（P3-c）：「余裕あり」（守りOK＆寿命まで枯渇なし）なら近接でも要検討にしない＝余裕なし世帯だけ attention。判定は dx.cushioned に一本化。
    const cushioned = !!dx.cushioned;
    let st = empty ? 'empty' : (near && !cushioned) ? 'attention' : 'filled';
    // B-2：退職±3年の集計額で表現（個別最大の歳の言い切りを廃止＝パネルの nearTotalMan と一致させる）
    let nearTotal = 0;
    nonMarker.forEach(e => { if (Math.abs(e.age - raw.retireAge) <= 3) nearTotal += (e.value||0); });
    const smy = empty ? 'ライフイベント未入力'
      : (near && !cushioned) ? `退職前後±3年に出費 約${man(nearTotal)}万`
      : near ? '退職前後の山は今の備えでカバー'
      : `イベント ${nonMarker.length}件`;
    A.push({ key:'lifeevent', cat:'lifeevent', icon:'📅', name:'ライフイベント', status:st, smy,
      twist:null, mini:null }); } // mini廃止＝詳細パネル（lifeeventPanelHTML）が代替

  // ペイウォール適用（status確定の最終段）
  A.forEach(a => { a.status = resolveLock('area', a.key, a.status); });
  // ⑦（P3-d）：検討済み＝attention を OK相当(reviewed)に昇格＝この1箇所だけで天気バー/次の一手/タグ/カードが自動追従。
  //   locked は据え置き（attention 以外は触らない＝locked優先）。レコードを a.reviewed に同梱（コントロール描画用）。
  A.forEach(a => { const rv = reviewed[a.key]; if (rv && rv.done && a.status === 'attention') { a.status = 'reviewed'; a.reviewed = rv; } });
  return A;
}

function calcCompletion(areas){
  const payable = areas.filter(a => a.status !== 'locked');
  if (!payable.length) return 0;
  const score = payable.reduce((s,a)=> s + ((a.status==='filled'||a.status==='reviewed')?1 : a.status==='attention'?0.5 : 0), 0);  // ⑦（P3-d）reviewed＝OK相当=1
  return Math.round(score / payable.length * 100);
}

function buildNextActions(areas){
  const acts = [];
  areas.filter(a=>a.status==='empty').forEach(a=> acts.push({ label:`${a.name}の空白を確認する`, kind:'fill', area:a.key }));
  areas.filter(a=>a.status==='attention').forEach(a=> acts.push({ label:`${a.name}の要検討を確認する`, kind:'review', area:a.key }));
  areas.filter(a=>a.status==='locked').forEach(a=> acts.push({ label:`${a.name}の精密検査を見る`, kind:'unlock', area:a.key }));
  const top = acts.slice(0,3);
  top.push({ label:'FPに相談して仕上げる', kind:'consult' }); // 原則E：末尾は必ず相談
  return top;
}

// 住まい 詳細パネル用データ（既存 diagnose / 入力値の再利用・新規金融計算なし）
function buildHousingData(d, dx){
  const LIFE_END = 90;                                  // 維持費・家賃の打ち切り年齢（人生100年の手前の目安）
  const man = (yen) => man0(Math.round((yen||0)/10000));// 万円・整数（allocation と同じ man0 を使用）
  const age = d.age || 0, retireAge = d.retireAge || 0;
  const housing = d.housing || 'rent';
  const propertyValue = d.propertyValue || 0;           // 円
  const maintAnnual   = Math.round(propertyValue * 0.01);// 円/年（既存 Rule14 と同式 1%）
  const rentMonthly   = d.rentMonthly || 0;             // 円/月
  const loanMonthly   = d.loanMonthly || 0;             // 円/月
  // ボーナス返済込みの「実質完済年数」（diagnose と同式の複製＝新規計算ではない）
  const annualBase = loanMonthly * 12, annualBonus = d.loanBonusYearly || 0;
  const loanYears  = d.loanYears || 0;
  const effYears   = (annualBonus > 0 && annualBase > 0)
    ? Math.max(1, Math.round(loanYears * annualBase / (annualBase + annualBonus)))
    : loanYears;
  const payoffAge  = age + effYears;
  const retireLeftover = Math.max(0, payoffAge - retireAge);   // リタイア後に残る返済年数
  const ratioPct   = Math.round((dx.loanRatio || 0) * 100);    // 既存 loanRatio を%表示
  const yearsLeft  = Math.max(0, LIFE_END - age);
  const maintTotal = maintAnnual * yearsLeft;
  const rentTotal  = rentMonthly * 12 * yearsLeft;
  const state = housing === 'loan' ? 'loan'
              : housing === 'owned' ? 'owned'
              : housing === 'family' ? 'family' : 'rent';
  const isLoanWarn = state === 'loan' && (retireLeftover > 0 || ratioPct > 35);

  // 派生B：修繕積立金（戸建ての見落とし）。健診の propertyType / shuzenMonthly（円）＋地図追記 shuzenPlanMonthly（円）。
  // ・isDetached＝戸建てと答えたときのみ（マンション・未設定は警告しない＝安全側）。
  // ・shuzenSaving＝すでに積み立てている（>0）。0／未入力なら見落とし対象。
  const propertyType  = d.propertyType || '';
  const shuzenMonthly = d.shuzenMonthly || 0;            // 円/月（健診の積立額・既に expense 内の想定なので計算には足さない）
  // 地図追記（これから備える額）。サンプル世帯には実世帯の追記を当てない（reviewed と同じ参照等価ガード）。
  const shuzenPlan    = (d === SAMPLE_RAW) ? 0 : ((loadDetail().shuzenPlanMonthly) || 0);   // 円/月
  const isDetached    = propertyType === 'detached';
  const shuzenSaving  = isDetached && shuzenMonthly > 0;
  // 見落とし＝戸建て かつ 既存の積立0／未入力（追記の有無に関わらず「気づき」自体は出す）
  const shuzenMiss    = isDetached && shuzenMonthly <= 0;

  // 気づきカード（loan/owned のみ。新規金融計算なし＝既存値の言い換え）
  let repairCard;
  if (shuzenMiss) {
    // 戸建て・積立0：一歩踏み込んだ見落とし警告（家計簿に出ない将来費用）
    repairCard = {
      cls:'', lvl:'見落とし', title:'戸建てなのに「大規模修繕」の積み立てが 0 です',
      find:'あなたは<b>戸建て</b>で、修繕積立金は<b>0円</b>と回答しています。マンションと違い、戸建ては屋根・外壁・水回りの<b>大規模修繕（10〜15年に1回・数十万〜100万超）</b>を自分で備える必要があります。これは毎月の家計簿には出てこない「将来費用」なので、'
          + (state === 'loan' ? 'ローン返済や日々の支出に紛れて' : '日々の支出に紛れて') + '見落とされがちです。',
      alt: '戸建てなら自分で<b>月1〜2万を別に積み立て</b>ておくと、突発の出費に慌てずに済みます。いざという時の備え（守りの土台）とは別腹で。下の追記欄で「これから備える額」を入れると、その分を家計に織り込んで再計算できます。'
    };
  } else if (shuzenSaving) {
    // 戸建て・積立あり：肯定（数字は動かさない）。info＝teal枠（warn色を避ける＝警告に見せない）
    repairCard = {
      cls:'info', lvl:'できている', title:`✓ 大規模修繕に向けて 月${man(shuzenMonthly)}万 を積み立てていますね`,
      find:`戸建ては屋根・外壁・水回りの大規模修繕（10〜15年に1回・まとまった額）を自分で備える必要があります。あなたは毎月 <b>${man(shuzenMonthly)}万</b> を積み立てているので、突発の出費への備えができています。`,
      alt: 'この調子で続ければ、いざ修繕が来てもいざという時の備え（守りの土台）を崩さずに済みます。'
    };
  } else {
    // マンション・建物種別未設定：従来どおりの一般的な気づき（警告ではない・数字は動かさない）
    repairCard = {
      cls:'info', lvl:'備え',
      title: state === 'loan' ? 'ローン返済とは別に「大規模修繕」に備えていますか'
                              : 'いつか来る「大規模修繕」に備えていますか',
      find: '毎月の維持費（固定資産税・火災保険など）は家計に織り込み済みのことが多いですが、屋根・外壁・水回りの<b>大規模修繕は10〜15年に1回・まとまった額</b>（数十万〜100万超）で来ます。これは'
          + (state === 'loan' ? 'ローン返済とも毎月の支出とも別' : '毎月の支出には出てこない') + 'の「将来費用」です。',
      alt: 'マンションなら修繕積立金、戸建てなら自分で<b>月1〜2万を別に積み立て</b>ておくと、突発の出費に慌てずに済みます。いざという時の備え（守りの土台）とは別腹で。'
    };
  }
  const cards = [];
  if (state === 'loan'){
    if (retireLeftover > 0) cards.push({
      cls:'', lvl:'要検討', title:`退職後もローン返済が ${retireLeftover}年残る見込み`,
      find:`リタイア（${retireAge}歳）まで ${Math.max(0, retireAge - age)}年。今のペースだと完済は ${payoffAge}歳で、退職後も毎月 ${man(loanMonthly)}万円 の返済が続く計算です。年金生活に入ってからの固定支出になります。`,
      alt:`退職金の一部での完済、または現役のうちの繰上返済で「定年までに完済」に寄せる、という選択肢がよく挙げられます（無理に手元資金を削るのは逆効果なので、守りの土台とのバランスで）。`
    });
    if (ratioPct > 35) cards.push({
      cls:'', lvl:'要検討', title:`返済比率が年収の ${ratioPct}% で高め`, amt:`<span class="amt">月${man(loanMonthly)}万</span>`,
      find:`住宅ローンの年間返済額が年収に占める割合（返済比率）が ${ratioPct}%。目安は25%以内・余裕を見ても30%まで。35%を超えると、収入減や大きな出費に弱くなりやすいとされます。`,
      alt:`まずは固定費（保険・通信・サブスク）を見直して家計に余白を作るのが先決。借り換えで金利を下げる選択肢もあります。→ <a onclick="gotoArea('cashflow')">家計CFで返済の重さを見る →</a>`
    });
    cards.push(repairCard);
  } else if (state === 'owned'){
    cards.push(repairCard);
  }

  return {
    state, isLoanWarn, age, retireAge, payoffAge, retireLeftover, ratioPct,
    propertyValue, maintAnnual, maintTotal, rentMonthly, rentTotal,
    loanMonthly, effYears, yearsLeft, LIFE_END,
    housingPlan: d.housingPlan || 0, housingPlanYears: d.housingPlanYears || 0, cards,
    // 派生C：団信・ローン残高の追記（住まいパネルで入力＝単一真実源。保険パネルは参照のみ）。UI=万円・保存=円
    danshin: d.danshin || 'unknown', loanBalance: d.loanBalance || 0,
    // 派生B：修繕積立金（戸建ての見落とし）。propertyType／shuzenMonthly は健診・shuzenPlanMonthly は地図追記。すべて円/月
    propertyType, isDetached, shuzenSaving, shuzenMiss, shuzenMonthly, shuzenPlanMonthly: shuzenPlan,
  };
}

function buildLifeeventData(d, dx){
  const age = d.age || 0, retireAge = d.retireAge || 0;
  const manR = (yen) => Math.round((yen||0)/10000);          // 円→万円・整数
  const tl = (dx.lifeTimeline || []).filter(e => !e.marker); // リタイアmarker除外
  const empty = tl.length === 0;
  const near = tl.some(e => Math.abs(e.age - retireAge) <= 3); // build7Areasと同一判定
  const state = empty ? 'empty' : near ? 'near' : 'far';
  // ⑦（P3-c）：余裕あり＝守りが足りていて寿命まで枯渇なし。state は 'near' のまま（チャートは現状）＝verdict/カードだけ前向きに出し分ける。判定は dx.cushioned に一本化。
  const nearCushioned = near && !!dx.cushioned;

  // --- レーン分け（mapTimeline と同じ名前パース。介護は1本の期間バーに束ねる） ---
  const laneSelf = { label:'自分', events:[] };
  const kidLanes = {};
  let careTotal = 0, careStart = null, careEnd = null;
  let hasEdu = false, hasHouse = false, hasOther = false;
  tl.forEach(e => {
    const name = e.name || '';
    // ⑥（P3）：地図追記イベントは custom 印で「自分レーンの💰その他」に固定（名前に住宅/子/介護を含んでも誤分類しない）。tipはcanvas描画＝escしない。
    if (e.custom){ hasOther = true; laneSelf.events.push({ s:e.age, e:e.age+0.9, icon:'💰', colorVar:'--ev-other', tip:`${name}・約${man0(manR(e.value))}万（${e.age}歳のとき）` }); return; }
    const km = name.match(/子\s*(\d+)/);
    if (km){
      const k = km[1];
      if (!kidLanes[k]){
        const kidAge = Array.isArray(d.kidsAge) ? d.kidsAge[+k-1] : null;
        kidLanes[k] = { label:`子${k}` + (typeof kidAge === 'number' ? `（いま${kidAge}歳）` : ''), events:[] };
      }
      hasEdu = true;
      kidLanes[k].events.push({ s:e.age, e:e.age+0.9, icon:'🎓', colorVar:'--ev-edu',
        tip:`${name}・約${man0(manR(e.value))}万（${e.age}歳のとき）` });
    } else if (name.includes('介護')){
      careTotal += (e.value || 0);
      careStart = careStart === null ? e.age : Math.min(careStart, e.age);
      careEnd   = careEnd   === null ? e.age : Math.max(careEnd, e.age);
    } else if (name.includes('住宅')){
      hasHouse = true;
      laneSelf.events.push({ s:e.age, e:e.age+0.9, icon:'🏠', colorVar:'--ev-house',
        tip:`住宅購入の頭金・約${man0(manR(e.value))}万（${e.age}歳のとき）` });
    } else {
      hasOther = true;
      laneSelf.events.push({ s:e.age, e:e.age+0.9, icon:'💰', colorVar:'--ev-other',
        tip:`${name}・約${man0(manR(e.value))}万（${e.age}歳のとき）` });
    }
  });
  const lanes = [];
  if (laneSelf.events.length) lanes.push(laneSelf);
  Object.keys(kidLanes).sort((a,b)=> +a - +b).forEach(k => lanes.push(kidLanes[k])); // 数値順（辞書順だと子10が子2より先に来る）
  const careInfo = (careStart !== null) ? { start:careStart, end:careEnd, totalMan:manR(careTotal) } : null;
  const careSpanTxt = careInfo ? (careInfo.start === careInfo.end ? `${careInfo.start}歳` : `${careInfo.start}〜${careInfo.end}歳`) : '';
  if (careInfo) lanes.push({ label:'親', events:[{ s:careInfo.start, e:careInfo.end+1, icon:'🏥', colorVar:'--ev-care',
    tip:`親の介護の想定（${careSpanTxt}・総額約${man0(careInfo.totalMan)}万）` }] });

  // --- 年齢別合計（山の棒・万円）とピーク（年合計ベース） ---
  const byAge = {};
  tl.forEach(e => { byAge[e.age] = (byAge[e.age] || 0) + (e.value || 0); });
  const bars = Object.keys(byAge).map(a => ({ x:+a, y:manR(byAge[a]) })).sort((p,q)=>p.x-q.x);
  let peak = null; bars.forEach(b => { if (!peak || b.y > peak.y) peak = b; });
  const totalMan = bars.reduce((s,b)=> s + b.y, 0);

  // --- 資産の線（標準シナリオ・退職まで・万円。山の差引きは calcRetirement 実装済み） ---
  const std = ((dx.retirement || {}).scenarios || []).find(s => s.key === 'standard');
  const assetLine = std ? std.yearly.map(p => ({ x:p.age, y:manR(p.asset) })) : [];
  let assetAtPeak = null;
  if (peak && std){ const hit = std.yearly.find(p => p.age === peak.x); if (hit) assetAtPeak = manR(hit.asset); }
  const assetAtRetire = assetLine.length ? assetLine[assetLine.length-1].y : null;

  // --- 退職±3年の近接イベント（attentionカード用・介護は1行に要約） ---
  const nearNames = []; let careNear = false, nearTotal = 0;
  tl.forEach(e => {
    if (Math.abs(e.age - retireAge) > 3) return;
    nearTotal += (e.value || 0);
    if ((e.name||'').includes('介護')) careNear = true;
    else nearNames.push(`${esc(e.name)}（${e.age}歳のとき）`);   // ⑥：HTML出力（パネル3222行）＝esc必須
  });
  if (careNear && careInfo) nearNames.push(`親の介護の想定（${careSpanTxt}）`);
  const nearTotalMan = manR(nearTotal);

  // --- 5年以内の山（手元の現金から支払う前提。J-2修正で発生年に銀行から差引き＝資産線も下がる） ---
  const within5Man = manR(tl.filter(e => e.age - age <= 5).reduce((s,e)=> s + (e.value||0), 0));

  // --- 軸レンジ（2チャートで共有・縦の位置関係を見比べられるように） ---
  const lastEventAge = tl.length ? Math.max.apply(null, tl.map(e=>e.age)) : retireAge;
  const axisMin = age, axisMax = Math.max(retireAge, lastEventAge) + 2;

  const surplusMan = Math.round((dx.monthlySurplus || 0) / 1000) / 10; // 月・万円1桁

  // あかりFB④（2026-06-11）：次の一手を状態依存にするための2フラグ（守りが足りているか／5年超の遠い山があるか）
  const bankOK = !!dx.bankSufficient;
  const hasFar = tl.some(e => e.age - age > 5);

  return { state, nearCushioned, age, retireAge, axisMin, axisMax, lanes, bars, assetLine,
    totalMan, peak, assetAtPeak, assetAtRetire, nearNames, nearTotalMan, within5Man,
    hasEdu, hasHouse, hasOther, careInfo, surplusMan, eventCount: tl.length, bankOK, hasFar,
    extraEvents: Array.isArray(d.extraEvents) ? d.extraEvents : [] };   // ⑥：追記リストの編集表示用（生データ）
}

function buildMapModel(raw){
  const dx = diagnose(raw);
  const axis = { start: raw.age, end: Math.max(90, raw.retireAge + 25), today: raw.age };
  // 派生D3 v2（工程③・2026-06-16）：4シナリオまとめ取得＝CF/出口パネルのシナリオ切替タブ用。
  //   標準（standard）の cf/exit は従来呼び出しと byte 一致＝既存ハッシュ（あかりa290c290/たけしdb835cfd/ひろこ32c615d0）不変。
  //   既存パネル（renderCF/afterRenderExit）は model.cf / model.exit を参照し続けるため後方互換。
  //   新パネル（タブUI）は model.cfByScenario[key] / model.exitByScenario[key] を参照。
  // FB-5（2026-06-17 社長承認）：NISA移行シミュは1回計算して defense/exit の両方に注入＝データドリフト防止。
  //   判定外（applies=false）の世帯は exit が migrate 線を作らず＝既存挙動完全保持＝3ペルソナYMYL不変。
  const nisaMig = calcNisaMigration(raw, dx);
  const cfByScenario = {}, exitByScenario = {};
  SCENARIO_KEYS.forEach(key => {
    const rows = calcCashflow(raw, dx.retirement, key).filter(r => r.age <= axis.end);
    cfByScenario[key] = {
      ages: rows.map(r=>r.age), income: rows.map(r=>r.incomeAnnual), expense: rows.map(r=>r.expenseAnnual), asset: rows.map(r=>r.assetEnd),
      bonus: rows.map(r=>r.bonusAnnual), status: rows.map(r=>r.status),
    };
    exitByScenario[key] = buildExitData(raw, dx, key, nisaMig);
  });
  // surplusSim はシナリオ非依存（標準シナリオの「もし余りを積み立てたら」見本シミュ）＝既存通り model.cf にのみ添える。
  const cf = Object.assign({}, cfByScenario.standard, { surplusSim: buildSurplusSimSeries(raw, dx, axis.end) });
  // ⑦：枯渇判定は出口パネルと同一ソースに一本化（buildExitData を build7Areas より前に出し→dx.depletionAge へ）。
  //     これで「⑦の余裕あり/なし」と「出口の枯渇あり/なし」が必ず一致する（軸末90超の枯渇も拾える）。
  const exit = exitByScenario.standard;
  dx.depletionAge = (exit && exit.depletionAge != null) ? exit.depletionAge : null;
  // ⑦（P3-c）：「余裕あり」＝守りが足りていて寿命まで枯渇なし。build7Areas と buildLifeeventData が同じ真実源を見るよう dx に一本化（depletionAge と同じ思想）。
  dx.cushioned = !!dx.bankSufficient && dx.depletionAge == null;
  // ⑦：検討済み状態（UI専用・mergeDetailで計算からは除外済み）。サンプル世帯には実世帯の追記を当てない（参照等価で判定）。
  const reviewed = (raw === SAMPLE_RAW) ? {} : ((loadDetail() || {}).reviewed || {});
  const areas = build7Areas(raw, dx, reviewed);
  return {
    view:'checked', axis,
    members: mapProfile(raw),
    events: mapTimeline(raw, dx.lifeTimeline),
    areas,
    completion: calcCompletion(areas),
    next: buildNextActions(areas),
    cf,
    exit,
    // 派生D3 v2（工程③）：CF/出口パネルのシナリオ切替タブ用。cfByScenario[key] / exitByScenario[key]（key ∈ pessimistic|conservative|standard|optimistic）。
    //   標準キーは model.cf / model.exit と byte 一致（cf は surplusSim を別途添えてあるので Object.assign の上書きを参照）。
    cfByScenario,
    exitByScenario,
    defense: buildDefenseData(raw, dx, nisaMig),
    cashflow: buildCashflowData(raw, dx),
    coverage: buildCoverageData(raw, dx),
    allocation: buildAllocationData(raw, dx),
    housing: buildHousingData(raw, dx),
    lifeevent: buildLifeeventData(raw, dx),
    profileMeta: { job: raw.job, housing: raw.housing },
  };
}

    + `<div class="box"><div class="k">公的年金（月・目安）</div><div class="v">${m1(p.pensionMan)}<small>万円/月</small></div></div>`
    + `</div>`
    + `<p class="note">※ 毎月の取り崩し額（${m1(p.monthlyWithdrawMan)}万円/月）＝「リタイア後の生活費 − 公的年金」の不足分です。資産の一定％を取り崩す固定ルール（いわゆる4%ルール等）ではなく、実際の不足額で計算しています。</p>`
    + (ex.pensionAssumed ? `<p class="note">※ 年金額が未入力のため、いまは<b>手取りの約50%</b>で計算しています。<b>ねんきん定期便の見込額</b>で更新すると、より正確になります。</p>` : '')
    + (ex.hasRetireBonus ? `<p class="note">※ 退職金は<b>税引き後の見込額</b>での入力を推奨します（実際は退職所得控除で税負担が軽くなります）。</p>` : '')
    + `</div>`;
  // ④ 年金 繰上げ繰下げ表
  const prows = ex.pensionTable.map(r => {
    const cls = r.depletionAge ? 'depleted' : 'hl';
    const pill = r.current ? '現状' : (r.startAge < 65 ? '繰上げ' : '繰下げ');
    return `<tr class="${cls}"><td>${r.startAge}歳 <span class="pill">${pill}</span></td><td>×${r.mul.toFixed(2)}</td><td>${m1(r.monthlyMan)}万</td><td>${r.depletionAge ? r.depletionAge+'歳' : '枯渇なし'}</td></tr>`;
  }).join('');
  const pensionSec = `<div class="sec"><h3>年金の受給開始年齢で月額が変わる</h3><table class="tnum"><thead><tr><th>開始年齢</th><th>倍率</th><th>月額（目安）</th><th>枯渇する年齢</th></tr></thead><tbody>${prows}</tbody></table><p class="note">※ リタイア年齢とは独立。早期リタイアでも年金は最短60歳から（繰上げ）。一般的な目安で、特定の受給方法を推奨するものではありません。<br>※ <b>「枯渇なし」でも繰上げ（早く受け取る）と月額・生涯の受取総額は減ります</b>。逆に繰下げ（遅らせる）と月額は増えますが、待機中の生活費を資産で賄ううちに尽きるケースもあります。月額だけでなく「枯渇する年齢」もあわせて見てください。</p></div>`;
  // ⑤ 年次CF表
  const crows = ex.cfTable.map(r => {
    const pill = r.isRetire ? ' <span class="pill">退職</span>' : r.isDepletion ? ' <span class="pill">枯渇</span>' : r.noPension ? ' <span class="pill">無年金</span>' : '';
    const penStr = r.pensionMan > 0 ? m1(r.pensionMan)+'万' : '—';
    const wdStr = r.withdrawMan > 0 ? '−'+m1(r.withdrawMan)+'万' : '—';
    const asset = r.isDepletion ? '不足' : man0(r.assetMan)+'万';
    return `<tr class="${r.isDepletion?'depleted':''}"><td>${r.age}歳${pill}</td><td>${penStr}</td><td>${wdStr}</td><td>${asset}</td></tr>`;
  }).join('');
  const cfTbl = `<div class="sec"><h3>年次キャッシュフロー（5年刻み・100歳まで）</h3><table class="tnum"><thead><tr><th>年齢</th><th>年金</th><th>取り崩し</th><th>累計資産</th></tr></thead><tbody>${crows}</tbody></table></div>`;
  // ⑥ 追加分析
  const an = ex.analysis;
  const items = [];
  if (an.alreadySafe) items.push(['💡','繰下げ余地：現状の受給開始でも100歳まで持つ見込み','無理に繰り下げなくても大丈夫そうです。さらに余裕を持たせたい時の選択肢が上の「効く手」です。']);
  else if (an.optimalDeferAge) items.push(['💡',`繰下げ最適：${an.optimalDeferAge}歳まで繰り下げ`,`このケースでは、年金の受給開始を ${an.optimalDeferAge}歳 にすると枯渇を回避できる見込みです。`]);
  else items.push(['💡','繰下げだけでは届きにくい','年金の繰下げ単独では100歳まで届かない可能性。上の「効く手」と組み合わせて検討を。']);
  items.push(['🔢','取り崩し順序：現金 → 債券 → 株','値下がりしにくい順に使うと、株の回復時間を稼げます（一般的なセオリーの整理）。']);
  if (an.noPensionYears > 0) items.push(['⚠️',`無年金期間に注意（約${an.noPensionYears}年）`,`${ex.retireAge}歳でリタイアし年金開始が${ex.pensionStartAge}歳だと、その間は取り崩しが集中します。`]);
  const analysis = `<div class="addbox"><span class="lbl">＋ 追加分析</span>${items.map(it=>`<div class="add"><div class="em">${it[0]}</div><div class="t"><b>${it[1]}</b><br><span class="s">${it[2]}</span></div></div>`).join('')}</div>`;

  // ⑧P4：全駅ツアー完走の終点＝達成＋第一の座(続けて使う)を将来用に確保＋相談(第二)。allVisitedでなければ達成/枠は出さず従来の相談のみ
  const finale = ex.allVisited
    ? `<div class="exit-finale"><div class="ef-h">✓ 7つの駅を ぜんぶ見終わりました</div>`
      + `<div class="ef-s">あなたの資産形成の地図が、これで一通り見えました。気になった駅は、いつでも見返せます。</div>`
      + `<div class="sub-slot"><span class="ss-badge">この先も、ずっと</span><div class="ss-t">数字が変わっても、この地図をアップデートしながら使い続ける</div><div class="ss-d">※ もっと活用しやすい形を準備中です。</div></div></div>`
    : '';
  // FB③：旅の終点＝共通の出口（プロ相談）。7駅をめぐった結果がそのまま相談メモになる
  const consult = `<div class="sec"><h3>🏁 ここから先は</h3>`
    + finale
    + consultCardHTML('ここまでの地図を持って、プロに相談する', '7つの駅で見てきた「足りているもの・見直すもの」が、そのまま相談メモになります。具体的な商品・手続きの話は有資格者へ。メールで聞いてみたいことがあれば、こちらから。')
    + `</div>`;

  return tabs + verdict + graph + levers + policy + pensionSec + cfTbl + analysis + consult;
}

  const ctx = document.getElementById('exitAssetChart');
  if (!ctx || !ex || !ex.chart) return;
  if (exitChartInst) { exitChartInst.destroy(); exitChartInst = null; }
  const ink = cssVar('--ink'), muted = cssVar('--muted'), line = cssVar('--line');
  exitChartInst = new Chart(ctx, {
    type:'line',
    data:{ labels: ex.chart.ages, datasets: ex.chart.datasets.map(ds => ({
      label: ds.label, data: ds.data, borderColor: ds.color, backgroundColor:'transparent',
      borderWidth:2, pointRadius:0, tension:.25, borderDash: ds.dash ? [5,4] : [] })) },
    options:{ responsive:true, maintainAspectRatio:false, interaction:{ mode:'index', intersect:false },
      animation: reduceMotion ? false : { duration:600 },
      plugins:{ legend:{ labels:{ boxWidth:14, font:{size:11}, color:ink } },
        tooltip:{ callbacks:{ label:(c)=>`${c.dataset.label}：${man0(c.parsed.y)}万円` } } },
      scales:{
        x:{ title:{display:true,text:'年齢',color:muted,font:{size:10}}, grid:{display:false},
          ticks:{ color:muted, font:{size:10}, maxTicksLimit:12, callback:(v,i)=>{ const a=ex.chart.ages[i]; return a%5===0?a:''; } } },
        y:{ title:{display:true,text:'累計資産（万円）',color:muted,font:{size:10}}, grid:{color:line}, ticks:{color:muted,font:{size:10}}, beginAtZero:true }
      }

}

function afterRenderExit(model){
  const canvas0 = document.getElementById('exitAssetChart');
  if (!model.exit || !canvas0) return;
  // B-5：再レンダリング(boot/visibilitychange/storage/import)で canvas が作り直されたら旧 Chart を破棄（afterRenderDefense と同型）。
  //   これを怠ると stale な exitChartInst が下の全幅ガードを誤作動させ、新 canvas が空グラフ／狭幅のまま焼き付く。
  if (exitChartInst && exitChartInst.canvas !== canvas0) { exitChartInst.destroy(); exitChartInst = null; }
  // 描画。閉/未レイアウトは後で再試行。全幅(grid-column:1/-1)リフロー前に狭く焼き付いたら実寸で描き直す。
  const draw = () => {
    const c = document.getElementById('exitAssetChart');
    if (!c || c.clientWidth <= 0) return false;             // 閉じている/未レイアウト→再試行へ
    const box = c.parentElement;                            // .chartbox（全幅コンテナ）
    if (exitChartInst && exitChartInst.canvas === c && box && exitChartInst.width >= box.clientWidth - 8) return true; // 実寸で描画済み
    drawExitChart(model.exit);                              // 内部で destroy→生成（コンテナ実寸で描き直し）
    return true;
  };
  draw();
  setTimeout(draw, 80);
  setTimeout(draw, 320);
  const det = document.querySelector('details.area.exit-area');
  if (det && !det._exitToggleBound) {
    det._exitToggleBound = true;
    // 開いた直後は全幅リフローが未確定→1フレーム＋80msで実寸描画に追従
    det.addEventListener('toggle', () => { if (det.open) { requestAnimationFrame(draw); setTimeout(draw, 80); } });
  }
}

/* ===== 守りの土台 詳細パネル：HTML生成・グラフ描画（データは buildDefenseData 済み） ===== */
let defenseChartInst = null;
let nisaMigChartInst = null;   // FB-5: NISA移行シミュ 折れ線
function defensePanelHTML(def){
  if (!def) return '<p class="note">データを準備中です。</p>';
  const man = (yen) => man0(yen/10000);
  // ① 結論バナー
  let verdict;
  if (def.sufficient){
    const tail = def.surplusOver > 0
      ? `必要な守り ${man(def.totalReserve)}万 に対し、今の現金は ${man(def.bank)}万。余っている ${man(def.surplusOver)}万 は、値動きする投資（NISA等）に回す余地があります。`
      : `必要な守り ${man(def.totalReserve)}万 に対し、今の現金は ${man(def.bank)}万。ちょうど備えが整っています。`;
    verdict = `<div class="verdict good"><div class="em">✅</div><div class="big">いざという時の備えは<b>足りています</b>。<br><span class="sub" style="color:var(--muted)">${tail}</span></div></div>`;
  } else {
    verdict = `<div class="verdict warn"><div class="em">⚠️</div><div class="big">いざという時の備えは、あと <b>${man(def.shortfall)}万円</b> 足りません。<br><span class="sub" style="color:var(--muted)">必要な守り ${man(def.totalReserve)}万 に対して、今の現金は ${man(def.bank)}万。下に「内訳」と「埋め方」をまとめます。今すぐ慌てる額ではありません。</span></div></div>`;
  }
  // ② 守りの内訳（グラフ＋テーブル）
  const itemRows = def.shortItems.map(it => `<tr><td><span class="swatch" style="background:var(--bar-short)"></span>${esc(it.name)}（5年以内）</td><td>${man(it.value)}万</td></tr>`).join('');   // ⑥：追記名が混じるためesc
  const balanceRow = def.sufficient
    ? `<tr class="over"><td>余剰</td><td>${man(def.surplusOver)}万</td></tr>`
    : `<tr class="gap"><td>不足</td><td>${man(def.shortfall)}万</td></tr>`;
  const graph = `<div class="sec"><h3>守りの内訳 ── 必要な守り と 今の現金</h3><div class="chartbox"><canvas id="defenseChart"></canvas></div>`
    + `<table class="tnum"><thead><tr><th>項目</th><th>金額</th></tr></thead><tbody>`
    + `<tr><td><span class="swatch" style="background:var(--bar-fund)"></span>生活防衛資金（月${man(def.expense)}万 × ${def.emergencyMonths}ヶ月）</td><td>${man(def.emergencyFund)}万</td></tr>`
    + itemRows
    + `<tr class="sum"><td>必要な守り（目安）</td><td>${man(def.totalReserve)}万</td></tr>`
    + `<tr class="cash"><td><span class="swatch" style="background:var(--bar-cash)"></span>今の現金（銀行貯金）</td><td>${man(def.bank)}万</td></tr>`
    + balanceRow
    + `</tbody></table>`
    + `<p class="note">※「必要な守り」＝生活防衛資金＋5年以内に使い道が決まっているお金。これは値動きする投資に回さず、現金で確保しておく部分です。</p></div>`;
  // ③ なぜ◯ヶ月か
  const tierOn = (m) => def.emergencyMonths === m ? ' on' : '';
  const you = (m) => def.emergencyMonths === m ? ' <b>← あなた</b>' : '';
  const reason = `<div class="sec"><h3>なぜ「${def.emergencyMonths}ヶ月」分なのか</h3>`
    + `<div class="kv">`
    + `<div class="box"><div class="k">あなたのリスク許容度</div><div class="v">${def.riskScore}<small>/ 5</small></div></div>`
    + `<div class="box"><div class="k">月の生活費</div><div class="v">${man(def.expense)}<small>万円</small></div></div>`
    + `<div class="box"><div class="k">備えの目安</div><div class="v">${def.emergencyMonths}<small>ヶ月分 = ${man(def.emergencyFund)}万</small></div></div>`
    + `</div>`
    + `<div class="tiers">`
    + `<div class="tier${tierOn(3)}"><b>3ヶ月</b>収入が安定・投資に積極的（スコア4-5）${you(3)}</div>`
    + `<div class="tier${tierOn(6)}"><b>6ヶ月</b>標準（スコア3）${you(6)}</div>`
    + `<div class="tier${tierOn(12)}"><b>12ヶ月</b>慎重・収入が不安定（スコア1-2）${you(12)}</div>`
    + `</div>`
    + `<p class="note">※ スコアは 年齢・職業・家族構成・暴落時にどう動くか などから算出。慎重な人ほど厚めに確保します。</p></div>`;
  // ④ 埋め方 / 守りの状態
  let fill;
  if (def.sufficient){
    // FB③R1：完成→次の駅は保障（投資へ直行は駅飛ばし。余剰の活かし方は投資の型に着いてから）
    // FB②（2026-06-15 社長承認）：次の駅誘導はスポーク下部フッターに集約＝ここの末尾リンクは削除
    const body = def.surplusOver > 0
      ? `必要な守りを超える現金 ${man(def.surplusOver)}万 は、値動きする投資（NISA等）に回す余地があります。その前に、保険が守りの穴になっていないか（ねじれ）だけ確かめておきましょう。`
      : `ちょうど備えが整っています。次は、保険が守りの穴になっていないか（ねじれ）の確認です。`;
    fill = `<div class="sec"><h3>守りはどうなってる？</h3><div class="fill"><span class="big">守りは完成しています。</span><br><span style="color:var(--muted);font-size:12px">${body}</span></div></div>`;
  } else if (def.monthsToFill){
    // 到達まで長期になる場合は年換算（「約400ヶ月」のような非現実的な月数表示を避ける）
    const dur = def.monthsToFill <= 18 ? `約 ${def.monthsToFill}ヶ月` : `約 ${Math.round(def.monthsToFill/12)}年`;
    fill = `<div class="sec"><h3>どう埋める？</h3><div class="fill">不足 ${man(def.shortfall)}万 を、今の月の余り（${m1(def.surplus/10000)}万）で積み増すと <span class="big">${dur}</span> で到達できる計算です。<br><span style="color:var(--muted);font-size:12px">毎月の黒字をそのまま現金で積み増せば、守りが完成します。先に守りを埋めてから、投資の増額を考えるのが順番です。</span></div></div>`;
  } else {
    fill = `<div class="sec"><h3>どう埋める？</h3><div class="fill alt"><span class="big">今は月の余りがありません。</span><br><span style="color:var(--muted);font-size:12px">まず固定費の見直しが先です。 → <a class="lnk" onclick="gotoArea('cashflow')">家計CF をくわしく見る →</a></span></div></div>`;
  }
  // ⑤ 現金の置き場（年齢 lifePhase で出し分け）
  const placeImmediate = `<div class="place" style="--lc:var(--bar-cash)"><span class="pt">すぐ要る分（生活防衛資金）</span><span class="pd">普通預金。いつでも引き出せる流動性が最優先。値動きする商品には回さない。</span><span class="when">即時性が命</span></div>`;
  const placeBond = `<div class="place" style="--lc:var(--c-defense)"><span class="pt">当面使わない守り寄りのお金</span><span class="pd">個人向け国債（変動10年）も選択肢。元本割れしにくく、出口に向けてリスクを落とす受け皿になる。</span><span class="when">45歳〜</span></div>`;
  const places = def.age >= 45 ? placeImmediate + placeBond : placeImmediate;
  let glideMsg;
  if (def.phaseId === 'active') glideMsg = `🛬 あなたは <b>${def.age}歳（${def.phaseLabel}）</b>。出口（取り崩し）の準備は45歳ごろから。今は守りのお金を普通預金で確保すれば十分です。「45歳になったら何をするか」を先に知っておくと、迷わず積立を続けられます。`;
  else if (def.phaseId === 'glide') glideMsg = `🛬 あなたは <b>${def.age}歳（${def.phaseLabel}）</b>。<b>すでに、出口に向けて少しずつリスクを落としていく時期に入っています</b>。投資の株式比率を年齢とともに債券・現金へ移していく考え方を「グライドパス（＝着陸への滑走路）」と呼びます。守りのお金の置き場も、その流れの一部として整理すると分かりやすくなります。`;   // W-11：グライドパスを一言説明＋現在形（45歳〜の準備期にもう入っている）
  else glideMsg = `🛬 あなたは <b>${def.age}歳（${def.phaseLabel}）</b>。取り崩し期は、現金・債券を厚めに持つのがセオリーです。守りのお金は普通預金と個人向け国債で確保を。`;
  const placeSec = `<div class="sec"><h3>守りのお金は、どこに置く？</h3><div class="places">${places}</div>`
    + `<div class="glide">${glideMsg} → <a href="https://smart-side.dev/posts/glide-from-45-to-60/" target="_blank" rel="noopener">45歳になったらやることリスト（出口戦略の15年プラン）を読む →</a></div>`
    + `<p class="note">※ 一般的な選択肢の整理です。特定商品の推奨ではありません（投資判断は提供しません）。円建てMMFは現在ほぼ存在しないため挙げていません。</p></div>`;

  // FB-5（2026-06-17 社長承認）：NISA移行シミュ セクション（適用世帯のみ）。fill と placeSec の間に挿入＝「余ってる現金をどう活かすか」の話の延長。
  let nisaMigSec = '';
  if (def.nisaMig && def.nisaMigDefense) {
    const nm = def.nisaMig;
    const nmd = def.nisaMigDefense;
    const diffSign = nmd.diffAtRetire >= 0 ? '+' : '';
    nisaMigSec = `<div class="sec nisaMigSec"><h3>💡 NISA移行シミュ：余ってる現金を活かす</h3>`
      + `<div class="nisaMigBanner">`
      +   `現金 <b>${man(nm.bank)}万</b> のうち、備え目安×2倍 <b>${man(nm.totalReserveX2)}万</b> を超える <b>${man(nm.migrateTotal)}万</b> を `
      +   `<b>年360万円ずつ ${nm.migrateYears}年</b>で NISA に移行すると、`
      +   `退職 <b>${nm.retireAge}歳</b>時点で資産が <b class="diff">${diffSign}${nmd.diffAtRetire}万円</b> 違う計算（標準シナリオ：実質年5%）。`
      + `</div>`
      + `<div class="chartbox"><canvas id="nisaMigChart"></canvas></div>`
      + `<p class="note">※ 年 360万円を NISA（つみたて＋成長フル活用）に移行する想定（生涯枠1800万円が上限）。運用は標準シナリオ＝実質年5%。市場次第で結果は変動します。`
      +   `<br>※ 5年以内の使い道（住み替え・教育費など）は別途確保した上での試算です。`
      +   `<br>※ 退職後の取り崩しまで含めた見比べは <a class="lnk" onclick="gotoArea('exit')">出口・取り崩しパネル →</a> へ。</p>`
      + `</div>`;
  }

  return verdict + graph + reason + fill + nisaMigSec + placeSec;
}

function afterRenderDefense(model){
  const canvas0 = document.getElementById('defenseChart');
  if (!model.defense || !canvas0) return;
  // 再レンダリング(boot/visibilitychange/storage/import)で canvas が作り直されたら旧 Chart を破棄する。
  // これを怠ると stale な defenseChartInst が下の二重描画ガードを誤作動させ、新 canvas が空グラフになる。
  if (defenseChartInst && defenseChartInst.canvas !== canvas0) { defenseChartInst.destroy(); defenseChartInst = null; }
  // FB-5: NISA移行グラフも同じパターンで stale 破棄
  const migCanvas0 = document.getElementById('nisaMigChart');
  if (nisaMigChartInst && nisaMigChartInst.canvas !== migCanvas0) { nisaMigChartInst.destroy(); nisaMigChartInst = null; }
  // 描画。閉/未レイアウトは後で再試行。全幅(grid-column:1/-1)リフロー前に狭く焼き付いたら実寸で描き直す。
  const draw = () => {
    const c = document.getElementById('defenseChart');
    if (!c || c.clientWidth <= 0) return false;              // 閉じている/未レイアウト→再試行へ
    const box = c.parentElement;                             // .chartbox（全幅コンテナ）
    if (defenseChartInst && defenseChartInst.canvas === c && box && defenseChartInst.width >= box.clientWidth - 8) {
      // FB-5: 既存 defense は描画済みでも、NISA migration は別 canvas のため毎回試行
      drawNisaMigrationChart(model.defense);
      return true;
    }
    drawDefenseChart(model.defense);                         // 内部で destroy→生成（コンテナ実寸で描き直し）
    drawNisaMigrationChart(model.defense);                   // FB-5: 適用時のみ描画（内部で early return）
    return true;
  };
  draw();
  setTimeout(draw, 80);
  setTimeout(draw, 320);
  const det = document.querySelector('details.area.defense-area');
  if (det && !det._defToggleBound) {
    det._defToggleBound = true;
    // 開いた直後は全幅リフローが未確定→1フレーム＋80msで実寸描画に追従
    det.addEventListener('toggle', () => { if (det.open) { requestAnimationFrame(draw); setTimeout(draw, 80); } });
  }
}

/* ===== 家計CF 詳細パネル：HTML生成・グラフ描画（計算は buildCashflowData 済み） ===== */
let cashflowChartInst = null;
function cashflowPanelHTML(cf){
  if (!cf || cf.empty) return '<p class="note">データを準備中です。</p>';
  const man  = (yen) => man0(Math.round(yen/10000));   // 万円・整数
  const manS = (yen) => m1(yen/10000);                 // 万円・1桁
  const pct  = (r) => Math.round(r*100);
  const expTotal = cf.expense || 1;
  const ratioCell = (yen) => Math.round(yen/expTotal*100) + '%';
  // 派生C：共働き世帯は「手取り」を世帯ベースと明示（cf.income は世帯手取り＝余りと整合）。単身/片働きは従来どおり「手取り」
  const incLbl = cf.spouseWorks === 'yes' ? '世帯の手取り' : '手取り';
  // ① 結論バナー（黒字／赤字）
  let verdict;
  if (cf.isDeficit){
    verdict = `<div class="verdict bad"><div class="em">🔴</div><div class="big">今の家計は、月 <b>−${manS(-cf.surplus)}万円</b> の赤字です。<br><span class="sub" style="color:var(--muted)">${incLbl} ${man(cf.income)}万 − 支出 ${man(cf.expense)}万。まず効くのは固定費の見直しです（下の③）。日々の節約より、仕組みを変える方が近道です。</span></div></div>`;
  } else {
    verdict = `<div class="verdict good"><div class="em">🟢</div><div class="big">今の家計は、月 <b>+${manS(cf.surplus)}万円</b> の黒字です。<br><span class="sub" style="color:var(--muted)">${incLbl} ${man(cf.income)}万 − 支出 ${man(cf.expense)}万。年間にすると約 ${man(cf.surplus*12)}万円が手元に残る計算。下に「中身の内訳」と「固定費が重くないか」をまとめます。</span></div></div>`;
  }
  // ② 収支内訳（グラフ＋テーブル）
  const loanRow = cf.hasLoan ? `<tr><td><span class="swatch" style="background:var(--c-housing)"></span>住宅ローン</td><td>${manS(cf.loanMonthly)}万</td><td>${ratioCell(cf.loanMonthly)}</td></tr>` : '';
  const insRow  = cf.hasIns  ? `<tr><td><span class="swatch" style="background:var(--c-coverage)"></span>保険料</td><td>${manS(cf.insMonthly)}万</td><td>${ratioCell(cf.insMonthly)}</td></tr>` : '';
  const surplusRow = cf.isDeficit
    ? `<tr class="surplus neg"><td>月の不足</td><td>−${manS(-cf.surplus)}万</td><td>—</td></tr>`
    : `<tr class="surplus"><td>月の余り</td><td>+${manS(cf.surplus)}万</td><td>—</td></tr>`;
  const colorLinks = [cf.hasLoan ? '<span style="color:var(--c-housing);font-weight:700">■住宅ローン→住まい</span>' : '', cf.hasIns ? '<span style="color:var(--c-coverage);font-weight:700">■保険料→保障</span>' : ''].filter(Boolean).join(' ／ ');
  const colorNote = colorLinks
    ? `<p class="note">※ 色は隣のエリアと連動：${colorLinks} で詳しく見られます。グレーの「その他の生活費」は、健診では中身まで聞いていないため一括表示です。</p>`
    : `<p class="note">※ グレーの「その他の生活費」は、健診では中身まで聞いていないため一括表示です。</p>`;
  const breakdown = `<div class="sec"><h3>収支の内訳 ── 何にいくら使っているか</h3><div class="chartbox"><canvas id="cashflowChart"></canvas></div>`
    + `<table class="tnum"><thead><tr><th>項目</th><th>月額</th><th>割合</th></tr></thead><tbody>`
    + `<tr class="in"><td><span class="swatch" style="background:var(--income)"></span>${incLbl}月収</td><td>${manS(cf.income)}万</td><td>—</td></tr>`
    + loanRow + insRow
    + `<tr><td><span class="swatch" style="background:var(--keep)"></span>その他の生活費</td><td>${manS(cf.other)}万</td><td>${ratioCell(cf.other)}</td></tr>`
    + `<tr class="sum"><td>支出 合計</td><td>${manS(cf.expense)}万</td><td>100%</td></tr>`
    + surplusRow
    + `</tbody></table>` + colorNote + `</div>`;
  // ③ 固定費ゲージ（保険＝手取り比0-15% / ローン＝年収比0-40%・目安帯＋縦線マーカー）
  const gaugeRow = (label, sub, ratio, scaleMax, bandLo, bandHi, color, tag, heavy, link) => {
    const markPct = Math.min(ratio/scaleMax*100, 100);
    const bandLeft = bandLo/scaleMax*100, bandW = (bandHi-bandLo)/scaleMax*100;
    const tagHtml = tag==='warn' ? `<span class="rtag warn">${heavy?'重め':'やや重め'}</span>${link}` : `<span class="rtag ok">範囲内</span>`;
    return `<div class="ratio-row"><div class="rlabel">${label}<small>${sub}</small></div>`
      + `<div class="gauge"><div class="band" style="left:${bandLeft}%; width:${bandW}%"></div>`
      + `<div class="fillbar" style="width:${markPct}%; background:${color}"></div>`
      + `<div class="mark" style="left:${markPct}%"></div></div>`
      + `<div class="rmeta"><b style="color:var(--ink)">${pct(ratio)}%</b>　目安 ${pct(bandLo)}〜${pct(bandHi)}%　${tagHtml}</div></div>`;
  };
  let ratioRows = '';
  if (cf.hasIns)  ratioRows += gaugeRow('保険料','手取り比', cf.insRatio, 0.15, 0.05, 0.10, 'var(--c-coverage)', cf.insTag, false, ' → <a class="rlink" onclick="gotoArea(\'coverage\')">保険で詳しく →</a>');
  if (cf.hasLoan) ratioRows += gaugeRow('住宅ローン','年収比', cf.loanRatio, 0.40, 0.25, 0.30, 'var(--c-housing)', cf.loanTag, cf.loanRatio>0.35, ' → <a class="rlink" onclick="gotoArea(\'housing\')">住まいで詳しく →</a>');
  const ratios = ratioRows
    ? `<div class="sec"><h3>固定費は重くないか ── 目安と比べてみる</h3><div class="ratio">${ratioRows}</div><p class="note">※ 緑の帯が「一般的な目安」。縦線が「あなた」。<b>ここでの％は手取り（月収）に対する割合</b>です（上の内訳表の「割合」は支出に占める割合なので、同じ保険料でも数字が変わります）。重くても即ダメではなく、収入減や大きな出費に弱くなる、という目安です。日々の食費・光熱費の節約には踏み込みません（下記参照）。</p></div>`
    : '';
  // ④ 次の一手（黒字／赤字で出し分け）
  let fill;
  if (cf.isDeficit){
    // FB③R2：赤字＝前提未達。固定費の見直し先（保障・住まい）への参照は「戻り」でなく前提づくりなので維持
    fill = `<div class="fill alt"><span class="big">まず効くのは固定費の見直し</span><br><span style="color:var(--muted);font-size:12px">保険・ローンの見直しは「一度やれば効果が続く」タイプ。→ <a class="lnk" onclick="gotoArea('coverage')">保険 →</a> ／ <a class="lnk" onclick="gotoArea('housing')">住まい →</a>　投資はそのあと。順番を守るのが近道です。</span></div>`;
  } else {
    // FB③R1：黒字でも駅順どおり次の駅＝守りへ（足りている人は守り側で「完成→保障へ」と前に流れる）
    // FB②（2026-06-15 社長承認）：次の駅誘導はスポーク下部フッターに集約＝ここの末尾リンクは削除
    const body = cf.bankSufficient
      ? `「守りの土台」は足りています。<span class="big">この余りを"活かす"番</span>です。このあとの駅（守りの土台 → 保険 → 投資）を順に確かめていきましょう。`
      : `まず「守りの土台（生活防衛資金）」が埋まっているか確認 → 埋まれば、<span class="big">この余りを"活かす"番</span>です。`;
    fill = `<div class="fill">${body}<br><span style="color:var(--muted);font-size:12px">余りをただ銀行に置くか、活かすかで、30年後は大きく変わります（↓で確認）。</span></div>`;
  }
  const mf = `<div class="mf">💡 生活費の細かい出費を見える化したい場合は → <b>金融機関連携の強い家計簿アプリ（マネーフォワード等）</b>を使いましょう。</div>`;
  const nextStep = `<div class="sec"><h3>次の一手</h3>${fill}${mf}</div>`;
  // ⑤ 生涯への導線（投資の必要性に気づく装置）
  const surplusLabel = cf.isDeficit ? '不足分' : `+${manS(cf.surplus)}万円`;
  const lifetime = `<div class="sec"><h3>この${cf.isDeficit?'家計':'余り'}は、30年でどうなる？</h3>`
    + `<div class="glide">🛬 毎月の <b>${surplusLabel}</b> を、<b>ただ置く</b>か <b>活かす</b>かで、将来の金融資産は大きく変わります。あなたの収入・支出・年齢から、<b>一生分のお金の流れ</b>を1本のグラフにしました。 → <a onclick="gotoCF()">生涯キャッシュフローのグラフを見る →</a></div>`
    + `<p class="note">※ 上の「キャッシュフロー（年齢軸）」グラフへ移動します。特定商品の推奨ではありません（投資判断は提供しません）。</p></div>`;
  // 派生C：配偶者就労の追記（地図から入力）。共働きなら世帯の手取り＝余り・将来見通しに反映される
  const spInc = Math.round((cf.spouseIncome || 0) / 10000);   // 入力欄の初期値（円→万・カンマなし）
  const spOn = cf.spouseWorks === 'yes';
  const cfAddBox = `<div class="addbox">`
    + `<span class="lbl">＋ もっと正確にする（地図から追記）</span>`
    + `<div class="intro">共働きなら、配偶者の手取りを足すと「世帯の余り」や将来の見通しが現実に近づきます。入れた値は地図に保存され、健診を入力し直しても残ります。</div>`
    + `<div class="field"><div class="q">配偶者は働いていますか？ <small>（世帯の手取り・万一のときの収入源になります）</small></div>`
    + `<div class="arow"><div class="seg">`
    + `<button type="button" class="${spOn?'':'on'}" onclick="setSpouseWorks('no')">働いていない</button>`
    + `<button type="button" class="${spOn?'on':''}" onclick="setSpouseWorks('yes')">働いている</button>`
    + `</div></div>`
    + `<div class="sub-field${spOn?'':' off'}"><div class="arow">手取り <input type="number" min="0" inputmode="numeric" value="${spInc}" onchange="setSpouseIncome(this)"> <span class="unit">万円 / 月</span></div>`
    + `<div class="hint">世帯の手取りに合算されます。万一のあとも収入が続く分、必要な保障も小さくなります（保険パネルに反映）。</div></div>`
    + `<div class="applied">${(spOn && cf.spouseIncome > 0) ? '✓ 世帯の手取りに 月' + manS(cf.spouseIncome) + '万 を合算' : ''}</div></div>`
    + `</div>`;
  // B-4：配偶者追記欄は「配偶者がいる世帯」だけ（単身では出さない＝入れても合算されないので欄も見せない）
  const showSpouseBox = detailAllowed() && cf.family !== 'single';
  return verdict + breakdown + (showSpouseBox ? cfAddBox : '') + ratios + nextStep + lifetime;
}

/* ===== 保障 詳細パネル：HTML生成・グラフ描画（計算は buildCoverageData / calcCoverageNeed 済み） ===== */
let coverageChartInst = null;
function coveragePanelHTML(cov){
  if (!cov) return '<p class="note">データを準備中です。</p>';
  const man  = (yen) => man0(Math.round(yen/10000));   // 万円・整数
  const manS = (yen) => m1(yen/10000);                 // 万円・1桁
  const pct  = (r) => Math.round(r*100);

  // ① 結論バナー（混ざってる保険なし＝good／あり or 保険料重い＝warn）
  let verdict;
  if (cov.savingsInsCount === 0 && !cov.insHeavy){
    verdict = `<div class="verdict good"><div class="em">🟢</div><div class="big">保障と運用が「混ざっている」保険は見当たりません。<br><span class="sub" style="color:var(--muted)">下で、万一のとき家族にいくら必要かの目安を見ていきます。掛け捨ての医療・死亡保険などはここには出ません。</span></div></div>`;
  } else {
    const insBit   = cov.savingsInsCount > 0 ? `貯蓄型の保険が <b>${cov.savingsInsCount}件</b>` : '保険料の負担';
    const ratioBit = cov.insMonthly > 0 ? `・保険料は手取りの <b>${pct(cov.insRatio)}%</b>${cov.insHeavy?'でやや重め':''}` : '';
    verdict = `<div class="verdict warn"><div class="em">🟡</div><div class="big">${insBit}${ratioBit}です。<br><span class="sub" style="color:var(--muted)">「保障」と「お金を増やす」を1つの商品で混ぜていると、コスト分だけ損をしやすい状態。下で①入っている保険の見直し余地、②万一のとき家族に必要な額の目安、を順に見ていきます。</span></div></div>`;
  }

  // ② ねじれ棚卸し（貯蓄型保険のカード）
  let insSection;
  if (cov.cards.length){
    const cards = cov.cards.map(c => {

  // ②-2（ひろこFB③）保険2段目：㋑「乗り換えで失うもの」＝㋐「分ける考え方」(次の一手＋各カードのalt)の現実の注意。
  // 貯蓄型カードのある世帯のみ。煽らず「複雑＝プロへ」で締め、出典は生命保険文化センター1本。静的文字列のみ（自由入力なしでesc不要）。

      + `<div class="caution">「保障と運用は分けるのが王道」とはいえ、<b>いま入っている貯蓄型をすぐ解約して乗り換えるのが正解とは限りません</b>。乗り換え・解約には、こんな“失うもの”があります。</div>`
      + `<ul class="loss-list">`
      + `<li><b>解約返戻金の元本割れ・解約控除</b>：早く解約すると、払った保険料より戻るお金が少なくなることがあります。</li>`

      + `<p class="note">⚖️ ここは<b>総合的に判断する必要がある複雑な項目</b>です。今の契約の中身（返戻率・据置期間・健康状態）で損得が変わるので、自己判断で動く前に<b>プロに相談することをおすすめします</b>。</p>`

      + `<p class="src">出典：公益財団法人 生命保険文化センター「保険料の払い込みが困難になったとき」 <a href="https://www.jili.or.jp/knows_learns/basic/continuance/97.html" target="_blank" rel="noopener">jili.or.jp →</a></p>`

      + `</tbody></table>`
      + `<p class="note">※ <b>前提（ざっくり概算）</b>：遺族の生活費＝今の支出の70%／末子が22歳になるまで（あと${n.years}年）／遺族年金＝子の数と職業から概算（年 約${man(n.survivorPensionAnnual)}万・遺族基礎＋会社員は遺族厚生の目安／自営は基礎のみ）。「取り崩せる資産」＝<b>銀行貯金・NISA残高・投信残高</b>（暗号は変動が激しいため、iDeCo/DCは60歳前は引き出せないため、保守側で除外）。実際は加入期間・収入で変わります。<b>これは"考え方"の目安です</b>。正確な金額は有資格者にご相談ください。</p>`

  } else {
    // W-2：夫婦のみ世帯（married_no_kids）に「残される家族がいない」と断定しない＝配偶者がいる前提の文言＋配偶者収入の追記導線（派生C連携）。単身は従来文言。
    const isCouple = cov.family === 'married_no_kids';
    const thin = isCouple
      ? `🧩 <b>配偶者はいるが、扶養するお子さんがいない世帯です。</b><br>大きな死亡保障の必要性は比較的低めですが、<b>残された配偶者の暮らし</b>は考えどころです。配偶者ご自身に収入があるほど、必要な保障は小さくなります（${detailAllowed() ? `<a class="lnk" onclick="gotoArea('cashflow')">家計CFで配偶者の収入を追記 →</a>` : '家計CFで配偶者の収入を追記できます'}）。むしろ<b>「働けなくなったとき（医療・就業不能）」</b>の備えのほうが効くことが多いです。`
      : `🧩 <b>扶養するご家族がいない／少ない世帯です。</b><br>大きな死亡保障の必要性は低めです。むしろ<b>「働けなくなったとき（医療・就業不能）」</b>の備えのほうが効きます。掛け捨ての医療保険・就業不能保険などを、保険料が重くならない範囲で検討する選択肢があります。`;
    needSection = `<div class="sec"><h3>万一のときの備え方</h3>`

      + `<p class="note">※ 必要保障額（万一のとき家族に遺す額）の概算は、扶養するご家族がいる場合に表示されます。</p></div>`;
  }

  // ④ 次の一手（貯蓄型ねじれ→投資の型=FB③R4維持／保険料重い→家計CF=FB③R2・ガード付きの前提整理）
  let nextParts = '';
  if (cov.hasSavingsIns){

  }
  if (!nextParts){
    // ※insHeavyは貯蓄型4商品の月額からのみ算出（1153行）＝insHeavy⇒必ずhasSavingsIns。よってここ＝見直しゼロの世帯
    // FB②（2026-06-15 社長承認）：次の駅誘導はスポーク下部フッターに集約＝ここの末尾リンクは削除
    nextParts = `<div class="fill"><span class="big">大きな見直しは見当たりません</span><br><span style="color:var(--muted);font-size:12px">保険は「混ざっていない・重すぎない」状態です。</span></div>`;
  }
  const nextStep = `<div class="sec"><h3>次の一手</h3>${nextParts}<p class="note">※ 「これを解約しろ」という指示ではありません。一般的な選択肢を示すだけで、最終判断はご家庭で（必要なら有資格者へ）。</p></div>`;

  return verdict + insSection + switchCaution + needSection + nextStep;
}

function drawCoverageChart(cov){
  const ctx = document.getElementById('coverageChart');
  if (!ctx || !cov || !cov.need) return;
  if (coverageChartInst) { coverageChartInst.destroy(); coverageChartInst = null; }
  const ink = cssVar('--ink'), muted = cssVar('--muted'), line = cssVar('--line');
  const cPension = cssVar('--pension'), cAsset = cssVar('--asset'), cNeed = cssVar('--c-coverage');
  const cSpouse = cssVar('--c-lifeevent'), cIns = cssVar('--c-allocation');   // 派生C：配偶者収入＝teal／保険＝purple（表のswatchと一致）
  const m = (yen) => Math.round(yen/10000);   // 万・整数
  // 順＝年金→資産→配偶者収入→保険→不足。追記が無い(0)segmentは凡例を汚さないよう出さない
  const ds = [
    { label:'遺族年金で埋まる', data:[m(cov.need.barPension)], backgroundColor:cPension, borderWidth:0, stack:'s', borderRadius:4 },
    { label:'今ある資産で埋まる', data:[m(cov.need.barAsset)], backgroundColor:cAsset, borderWidth:0, stack:'s', borderRadius:4 },
  ];
  if (cov.need.barSpouse > 0) ds.push({ label:'配偶者の収入で埋まる', data:[m(cov.need.barSpouse)], backgroundColor:cSpouse, borderWidth:0, stack:'s', borderRadius:4 });
  if (cov.need.barIns > 0)    ds.push({ label:'保険で備えた分', data:[m(cov.need.barIns)], backgroundColor:cIns, borderWidth:0, stack:'s', borderRadius:4 });
  ds.push({ label:'不足（保障で備える）', data:[m(cov.need.barNeed)], backgroundColor:cNeed, borderWidth:0, stack:'s', borderRadius:4 });
  coverageChartInst = new Chart(ctx, {
    type:'bar',
    data:{ labels:['必要額'], datasets: ds },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
      animation: reduceMotion ? false : { duration:600 },
      interaction:{ mode:'index', axis:'y', intersect:false },   // ④判別性：行(y)で束ねて1行ぶん全部ハイライト
      plugins:{ legend:{ labels:{ boxWidth:14, font:{size:11}, color:ink } },
        tooltip:{ callbacks:{ title:(it)=> it[0] ? it[0].label : '', label:(c)=> `${c.dataset.label}：${c.parsed.x.toLocaleString()}万円` } } },
      scales:{
        x:{ stacked:true, title:{display:true,text:'万円（遺族の支出総額の内訳）',color:muted,font:{size:10}}, grid:{color:line}, ticks:{color:muted,font:{size:10}}, beginAtZero:true },
        y:{ stacked:true, grid:{display:false}, ticks:{color:ink, font:{size:13, weight:'700'}} }
      }
    }
  });
}

function afterRenderCoverage(model){
  const canvas0 = document.getElementById('coverageChart');
  // 子なし/単身/夫婦のみ＝canvas を出さない設計なので早期 return（コンソールエラーも出さない）
  if (!model.coverage || !model.coverage.need || !canvas0) return;
  // 再レンダリング(boot/visibilitychange/storage/import)で canvas が作り直されたら旧 Chart を破棄する（F1再発防止）。
  if (coverageChartInst && coverageChartInst.canvas !== canvas0) { coverageChartInst.destroy(); coverageChartInst = null; }
  // 描画。閉/未レイアウトは後で再試行。全幅(grid-column:1/-1)リフロー前に狭く焼き付いたら実寸で描き直す（F2再発防止）。
  const draw = () => {
    const c = document.getElementById('coverageChart');
    if (!c || c.clientWidth <= 0) return false;
    const box = c.parentElement;
    if (coverageChartInst && coverageChartInst.canvas === c && box && coverageChartInst.width >= box.clientWidth - 8) return true;
    drawCoverageChart(model.coverage);
    return true;
  };
  draw();
  setTimeout(draw, 80);
  setTimeout(draw, 320);
  const det = document.querySelector('details.area.coverage-area');
  if (det && !det._covToggleBound) {
    det._covToggleBound = true;
    det.addEventListener('toggle', () => { if (det.open) { requestAnimationFrame(draw); setTimeout(draw, 80); } });
  }
}
