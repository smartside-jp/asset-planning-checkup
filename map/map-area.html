<!DOCTYPE html>
<html lang="ja" data-theme="light" data-view="checked">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>資産形成の地図</title>
<!-- Chart.js（健診アプリと同じ系統のCDN） -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ============================================================
   資産形成の地図ハブ v0.1（本実装）
   - 健診データ asset_planning_v1 を読み取り、地図モデルへ変換して表示
   - お金データはサーバー送信しない（localStorage貫き・健診は読むだけ）
   - 見た目トークンは姉妹アプリ(lifeplan_whatif)を継承
   ============================================================ */
:root{
  --card:#ffffff; --ink:#1a1a2e; --muted:#5f6275;
  --line:rgba(20,20,40,.12); --accent:#1a1a2e; --accent2:#2e5cb8;
  --keep:#8a8f9c; --invest:#2e7d56; --good:#1f7a4d; --warn:#b8860b; --bad:#a3324b; --soft:#f4f6fa;
  --bg:#f7f8fb;
  --shadow:0 1px 3px rgba(20,20,40,.06), 0 1px 2px rgba(20,20,40,.04);
  --shadow-h:0 6px 18px rgba(20,20,40,.10), 0 2px 6px rgba(20,20,40,.06);
  --radius-card:18px; --radius-btn:11px; --radius-pill:999px;
  --st-empty:var(--muted); --st-filled:var(--good); --st-attention:var(--warn); --st-locked:var(--accent2); --st-reviewed:var(--keep);
  --c-defense:#2e7d56; --c-cashflow:#2e5cb8; --c-coverage:#a3324b; --c-allocation:#7b4fb5;
  --seg-cash:#8a8f9c; --seg-stock:#2e7d56; --seg-bond:#4c7fb8; --seg-crypto:#d99a30; /* 投資の型 配分4区分（現金/株式/債券=個人国債/暗号） G1-a 2026-06-22 */
  --seg-pre:#1f7a4d; --seg-post:#a3324b; --seg-maint:#8a8f9c; --seg-rent:#c2683a; /* 住まい タイムライン（返済前/返済後/維持費/家賃） */
  --ev-edu:#2e5cb8; --ev-house:#c2683a; --ev-care:#a3324b; --ev-other:#8a8f9c; /* ライフイベント レーン（教育/住宅/介護/その他） */
  --ev-bar:#d9663f; --ev-near:#b3261e; --ev-asset:#2e7d56; --ev-income:#2e7d56; /* お金の山（出費の山=赤橙/退職±3年=濃赤/資産の線=緑/退職金=緑）※P2② 出費を赤系へ */
  --c-exit:#b8860b; --c-housing:#c2683a; --c-lifeevent:#2f8f9d;
  --bar-fund:#2e7d56; --bar-short:#7cc0a0; --bar-cash:#2e5cb8; /* 守りパネル：防衛資金/短期/現金 */
  --income:#60a5fa; --expense:#f6a06a; --asset:#34d399;
  --pension:#5b89b5; /* 保障パネル：遺族年金（公的）＝落ち着いた青 */
  --today-line:color-mix(in srgb, var(--accent) 55%, transparent);
  --col:42px; --labw:124px; --rowh:42px;
}
html[data-theme="dark"]{
  --bg:#13141b; --card:#1c1e27; --ink:#e9ebf5; --muted:#9aa0b4;
  --line:rgba(255,255,255,.12); --soft:#222533;
  --shadow:0 1px 3px rgba(0,0,0,.45); --shadow-h:0 8px 22px rgba(0,0,0,.5);
  --today-line:color-mix(in srgb, #fff 45%, transparent);
  --ev-bar:#e0815a; --ev-near:#e05a4a; /* P2②：お金の山の赤系を暗背景で沈ませない明度up（出費=赤橙/退職±3年=赤） */
  --seg-bond:#6ea8e0; /* G1-a：個人国債のダーク版・明度up でコントラスト確保（code-review HIGH-2 対応 2026-06-22） */
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,system-ui,sans-serif;
  line-height:1.6; -webkit-text-size-adjust:100%;
  transition:background .25s ease, color .25s ease;
}
.tnum{font-variant-numeric:tabular-nums}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  padding:10px 18px; background:color-mix(in srgb,var(--card) 88%, transparent);
  backdrop-filter:saturate(1.2) blur(8px); border-bottom:1px solid var(--line);
}
.topbar h1{font-size:16px; margin:0; letter-spacing:.02em; display:flex; align-items:center; gap:8px}
.topbar h1 .logo{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,var(--accent2),var(--c-lifeevent));display:inline-block}
.topbar-meta{margin-left:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.stamp{font-size:11px; color:var(--muted); background:var(--soft); border:1px solid var(--line); padding:3px 9px; border-radius:var(--radius-pill)}
.tlink{font-size:12px; color:var(--accent2); text-decoration:none; border:1px solid var(--line); background:var(--card); padding:5px 11px; border-radius:10px; font-weight:600}
.tlink:hover{box-shadow:var(--shadow)}
.icon-btn{cursor:pointer; border:1px solid var(--line); background:var(--card); color:var(--ink); width:34px;height:34px;border-radius:10px; font-size:15px; display:grid;place-items:center; transition:transform .12s, box-shadow .12s}
.icon-btn:hover{transform:translateY(-1px); box-shadow:var(--shadow)}

.layout{max-width:1280px; margin:0 auto; padding:18px; display:flex; flex-direction:column; gap:16px}
.card{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-card);
  box-shadow:var(--shadow); padding:18px; container-type:inline-size;
}
.card h2{margin:0 0 12px; font-size:15px; display:flex; align-items:center; gap:8px}
.card h2 .n{background:var(--accent); color:#fff; font-size:10px; padding:2px 7px; border-radius:6px; font-family:ui-monospace,monospace; letter-spacing:.05em}
.sub{color:var(--muted); font-size:12px}

.bento.hero{display:grid; gap:14px; grid-template-columns:1fr 1fr 1.4fr}
.bento.areas{display:grid; gap:14px; grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
@media (max-width:880px){ .bento.hero{grid-template-columns:1fr} }

.sample-banner{display:none}
html[data-view="sample"] .sample-banner{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  background:color-mix(in srgb,var(--accent2) 8%, var(--card));
  border:1px solid color-mix(in srgb,var(--accent2) 30%, var(--line));
}

.completion{display:flex; align-items:center; gap:16px}
.ring{position:relative; width:92px; height:92px; border-radius:50%; flex:0 0 auto;
  background:conic-gradient(var(--good) calc(var(--rate)*1%), var(--soft) 0);}
.ring::after{content:""; position:absolute; inset:11px; border-radius:50%; background:var(--card)}
.ring .v{position:absolute; inset:0; display:grid; place-items:center; font-weight:800; font-size:22px}
.ring .v small{font-size:12px; font-weight:700; color:var(--muted)}

.household .row{display:flex; justify-content:space-between; font-size:13px; padding:3px 0; border-bottom:1px dashed var(--line)}
.household .row:last-child{border-bottom:0}

.next{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px}
.next li{display:flex; align-items:center; gap:10px; font-size:13px; padding:9px 11px; border:1px solid var(--line); border-radius:12px; background:var(--soft); cursor:pointer; transition:transform .12s, box-shadow .12s}
.next li:hover{transform:translateY(-1px); box-shadow:var(--shadow)}
.next li .num{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;display:grid;place-items:center;flex:0 0 auto}
.next li.consult{background:color-mix(in srgb,var(--invest) 12%, var(--card)); border-color:color-mix(in srgb,var(--invest) 35%, var(--line)); font-weight:700}
.next li.consult .num{background:var(--invest)}
.next li.locked .num{background:var(--accent2)}

.tt-scroll,.cf-scroll{overflow-x:auto; overflow-y:hidden; overscroll-behavior-x:contain; scrollbar-width:thin}
.tt-inner,.cf-inner{position:relative; width:calc(var(--labw) + var(--N) * var(--col)); min-width:100%}
.tt-row{display:flex; align-items:stretch; height:var(--rowh)}
.tt-row.head{height:30px; position:sticky; top:0; z-index:5}
.tt-label{position:sticky; left:0; z-index:4; width:var(--labw); flex:0 0 var(--labw);
  display:flex; align-items:center; gap:6px; padding:0 10px; font-size:12.5px; font-weight:600;
  background:var(--card); box-shadow:1px 0 0 var(--line)}
.tt-row.head .tt-label{font-size:11px; color:var(--muted); font-weight:700}
.tt-label .age-chip{margin-left:auto; font-size:10.5px; color:var(--muted); background:var(--soft); border-radius:var(--radius-pill); padding:1px 7px}
.tt-track{position:relative; flex:1; min-width:calc(var(--N) * var(--col))}
.tt-row:not(.head) .tt-track{border-bottom:1px solid color-mix(in srgb,var(--line) 60%, transparent)}
.tt-row:nth-child(odd) .tt-track{background:color-mix(in srgb,var(--soft) 50%, transparent)}
.yr{position:absolute; top:0; bottom:0; width:var(--col); display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--muted)}
.yr.major{color:var(--ink); font-weight:700}
.yr.major::before{content:""; position:absolute; top:26px; bottom:-2000px; left:50%; width:1px; background:color-mix(in srgb,var(--line) 70%, transparent)}
.ev{position:absolute; top:50%; transform:translateY(-50%); height:24px; display:flex; align-items:center; gap:4px;
  font-size:11px; white-space:nowrap; padding:0 9px; border-radius:var(--radius-pill);
  background:color-mix(in srgb, var(--cat) 14%, var(--card));
  border:1px solid color-mix(in srgb, var(--cat) 38%, var(--line));
  color:color-mix(in srgb, var(--cat) 75%, var(--ink)); box-shadow:var(--shadow); overflow:hidden}
.ev.milestone{padding:0; width:22px; justify-content:center; background:transparent; border:0; box-shadow:none}
.ev.milestone .dia{width:15px;height:15px;background:var(--cat);transform:rotate(45deg);border-radius:3px;box-shadow:var(--shadow)}
.ev.milestone .ml-label{position:absolute; top:-2px; left:20px; font-size:10px; color:var(--muted); transform:none; white-space:nowrap}
.tt-track.hole{background:repeating-linear-gradient(45deg,transparent,transparent 7px,color-mix(in srgb,var(--muted) 9%,transparent) 7px 14px)}
.hole-cta{position:absolute; top:50%; left:10px; transform:translateY(-50%); font-size:11px; color:var(--muted); background:var(--card); border:1px dashed var(--line); border-radius:var(--radius-pill); padding:2px 10px; cursor:pointer}
.today-line{position:absolute; top:0; bottom:0; z-index:6; width:2px; pointer-events:none;
  left:calc(var(--labw) + (var(--today) - var(--start)) * var(--col) + var(--col)/2);
  background:var(--today-line)}
.today-line::before{content:"今"; position:absolute; top:2px; left:4px; font-size:10px; font-weight:700; color:var(--today-line); background:var(--card); padding:0 4px; border-radius:5px}

/* ── 全体マップ俯瞰（FB② 2026-06-10）：天気バー・出費の山レーン・退職ライン・凡例 ── */
.tt-lead{font-size:11.5px; color:var(--muted); margin:0 0 10px}
.weather{display:flex; flex-wrap:wrap; gap:8px; margin:0 0 12px}
.w-chip{display:flex; align-items:center; gap:7px; font:inherit; border:1px solid var(--line); background:var(--card); color:var(--ink);
  border-radius:var(--radius-pill); padding:5px 12px 5px 9px; font-size:12px; font-weight:600; cursor:pointer; transition:transform .12s, box-shadow .12s}
.w-chip:hover{transform:translateY(-1px); box-shadow:var(--shadow)}
.w-chip .dot{width:9px; height:9px; border-radius:50%; background:var(--st); flex:0 0 auto}
.w-chip .st-txt{font-size:10px; font-weight:700; color:var(--st)}
.w-chip[data-s="attention"]{background:color-mix(in srgb, var(--st-attention) 9%, var(--card)); border-color:color-mix(in srgb, var(--st-attention) 35%, var(--line))}
.w-chip[data-s="reviewed"]{background:color-mix(in srgb, var(--st-reviewed) 10%, var(--card)); border-color:color-mix(in srgb, var(--st-reviewed) 35%, var(--line)); --st:var(--st-reviewed)}
.w-chip[data-s="empty"]{color:var(--muted)}
/* P4(8)：未訪問チップ（案A・天気バー統合） */
#weatherBar .w-chip.unseen{position:relative; border-style:dashed; border-color:color-mix(in srgb,var(--accent2) 55%,var(--line))}
#weatherBar .w-chip.unseen::after{content:"\672A"; position:absolute; top:-7px; right:-5px; font-size:9.5px; font-weight:800; color:#fff; background:var(--accent2); border-radius:var(--radius-pill); padding:1px 6px; line-height:1.5; box-shadow:var(--shadow)}
/* P4(8)：全駅ツアー入口ボタン */
.tour-entry{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin:14px 0 2px}
.tour-btn{display:inline-flex; align-items:center; gap:8px; font-family:inherit; font-size:14px; font-weight:800; cursor:pointer; color:#fff; background:var(--accent2); border:0; border-radius:var(--radius-btn); padding:10px 18px; box-shadow:var(--shadow); transition:.14s}
.tour-btn:hover{transform:translateY(-1px); box-shadow:var(--shadow-h)}
.tour-btn .arr{font-weight:900}
.tour-cap{font-size:11.5px; color:var(--muted)}
/* P4(8)：終点の達成バナー＋サブスク確保枠（第一の座・将来用） */
.exit-finale{border:1px solid color-mix(in srgb,var(--good) 30%,var(--line)); border-radius:13px; padding:14px 15px; margin:0 0 10px; background:color-mix(in srgb,var(--good) 5%,var(--card))}
.exit-finale .ef-h{font-size:15px; font-weight:800; color:var(--good); margin:0 0 3px}
.exit-finale .ef-s{font-size:12.5px; color:var(--muted); margin:0 0 12px}
.sub-slot{border:1.5px dashed color-mix(in srgb,var(--accent2) 40%,var(--line)); border-radius:11px; padding:12px 14px; background:repeating-linear-gradient(135deg,transparent,transparent 9px,color-mix(in srgb,var(--accent2) 4%,transparent) 9px,color-mix(in srgb,var(--accent2) 4%,transparent) 18px)}
.sub-slot .ss-badge{display:inline-block; font-size:10px; font-weight:800; color:var(--accent2); border:1px solid color-mix(in srgb,var(--accent2) 40%,var(--line)); border-radius:6px; padding:1px 7px; margin-bottom:5px}
.sub-slot .ss-t{font-size:13px; font-weight:800; color:var(--ink)}
.sub-slot .ss-d{font-size:11.5px; color:var(--muted); margin-top:3px}
.tt-track .ev{cursor:pointer}
.tt-row.money{height:auto; min-height:88px}
.tt-row.money .tt-label{align-items:flex-end; padding-bottom:8px}
.mt{position:absolute; bottom:6px; width:calc(var(--col)*.72); border-radius:6px 6px 0 0; cursor:pointer;
  background:color-mix(in srgb, var(--ev-bar) 28%, var(--card));
  border:1px solid color-mix(in srgb, var(--ev-bar) 60%, var(--line)); border-bottom:3px solid var(--ev-bar)}
.mt:hover{box-shadow:var(--shadow-h)}
.mt .amt{position:absolute; top:-15px; left:50%; transform:translateX(-50%); font-size:9.5px; font-weight:800; color:var(--ev-bar); white-space:nowrap}
.mt.warn2{background:color-mix(in srgb, var(--ev-near) 28%, var(--card)); border-color:color-mix(in srgb, var(--ev-near) 65%, var(--line)); border-bottom-color:var(--ev-near)}
.mt.warn2 .amt{color:var(--ev-near)}
.mt-none{position:absolute; top:50%; left:12px; transform:translateY(-50%); font-size:11px; color:var(--muted)}
.retire-line{position:absolute; top:0; bottom:0; z-index:6; width:0; border-left:2px dashed color-mix(in srgb, var(--ev-near) 70%, transparent); pointer-events:none}
.retire-line::before{content:"🏖️ 退職"; position:absolute; top:2px; left:4px; font-size:10px; font-weight:700; color:var(--ev-near); background:var(--card); padding:0 4px; border-radius:5px; white-space:nowrap}
.tt-legend{display:flex; flex-wrap:wrap; gap:12px; font-size:10.5px; color:var(--muted); margin-top:8px}
.tt-legend .sw{display:inline-block; width:9px; height:9px; border-radius:3px; margin-right:4px; vertical-align:-1px}

/* ── P2② 全体マップ フル化（2026-06-13）：退職金の山・資産の見通し行・年金強調 ── */
.tt-row.money .tt-label{flex-direction:column; justify-content:flex-end; gap:1px}
.tt-row.money .tt-label .sub2{font-weight:400; font-size:9.5px; color:var(--muted)}
/* 退職金＝収入の山（緑・▲キャップで「入ってくるお金」を出費=赤と峻別） */
.mt.income{width:calc(var(--col)*.82); background:color-mix(in srgb, var(--ev-income) 24%, var(--card));
  border:1px solid color-mix(in srgb, var(--ev-income) 60%, var(--line)); border-bottom:3px solid var(--ev-income)}
.mt.income .amt{color:var(--ev-income)}
.mt.income::before{content:"▲"; position:absolute; top:-13px; left:50%; transform:translateX(-50%); font-size:9px; color:var(--ev-income)}
/* 📈 資産の見通し行：スパークライン主役＋▲▼をカーブ上に */
.tt-row.asset{min-height:96px; border-top:2px solid color-mix(in srgb,var(--line) 80%, transparent)}
.tt-row.asset .tt-label{align-items:center}
.spark{position:absolute; inset:0; pointer-events:none}
.spark .fillz{fill:color-mix(in srgb,var(--ev-asset) 9%, transparent)}
.apk{position:absolute; transform:translate(-50%,-50%); z-index:3; cursor:pointer; width:16px; height:16px;
  display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800}
.apk.peak{color:var(--ev-asset)}
.apk.low{color:var(--muted)}
.apk.low.danger{color:var(--bad)}
.alab{position:absolute; z-index:3; font-size:9px; font-weight:800; white-space:nowrap; background:color-mix(in srgb,var(--card) 86%, transparent); border-radius:4px; padding:0 3px; pointer-events:none}
.alab.peak{color:var(--ev-asset)}
.alab.low{color:var(--muted)}
.alab.low.danger{color:var(--bad)}
/* 年金開始マイルストンの強調（青リング・cat=exitの黄土を上書き） */
.ev.milestone.pension .dia{background:var(--pension); box-shadow:0 0 0 3px color-mix(in srgb,var(--pension) 22%, transparent)}
.ev.milestone.pension .ml-label{color:var(--pension); font-weight:700}
/* 年金開始の縦ガイド線＋無年金帯 */
.pension-line{position:absolute; top:0; bottom:0; z-index:6; width:0; border-left:2px dotted color-mix(in srgb, var(--pension) 75%, transparent); pointer-events:none}
.pension-line::before{content:"📮 年金"; position:absolute; top:2px; left:4px; font-size:10px; font-weight:700; color:var(--pension); background:var(--card); padding:0 4px; border-radius:5px; white-space:nowrap}
.gap-band{position:absolute; top:0; bottom:0; z-index:1; background:color-mix(in srgb,var(--pension) 7%, transparent); pointer-events:none}

.cf-inner{display:flex; height:200px}  /* FB①（2026-06-15 社長承認）：248→200pxに詰めて圧迫感を軽減（②全体マップとの間で目が滑らないように） */
.cf-yaxis{position:sticky; left:0; z-index:4; width:var(--labw); flex:0 0 var(--labw); background:var(--card);
  box-shadow:1px 0 0 var(--line); display:flex; flex-direction:column; justify-content:center; gap:10px; padding:0 10px; font-size:11px}
.cf-yaxis .lg{display:flex; align-items:center; gap:7px; color:var(--muted)}
.cf-yaxis .sw{width:14px;height:10px;border-radius:3px;flex:0 0 auto}
.cf-canvas{position:relative; flex:1; min-width:calc(var(--N) * var(--col)); padding:6px 0}

.area{padding:0; overflow:hidden; border-left:4px solid var(--cat)}
.area summary{list-style:none; cursor:pointer; padding:15px 16px; display:flex; align-items:center; gap:10px}
.area summary::-webkit-details-marker{display:none}
.area .ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px;
  background:color-mix(in srgb,var(--cat) 13%, var(--card)); flex:0 0 auto}
.area .ttl{font-size:14px; font-weight:700}
.area .smy{font-size:12px; color:var(--muted); margin-top:2px}
.area .chev{margin-left:auto; color:var(--muted); transition:transform .2s}
.area[open] .chev{transform:rotate(180deg)}
.tag{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:var(--radius-pill); white-space:nowrap}
.tag[data-s="filled"]{color:#fff;background:var(--st-filled)}
.tag[data-s="attention"]{color:#fff;background:var(--st-attention)}
.tag[data-s="empty"]{color:var(--muted);background:var(--soft);border:1px dashed var(--line)}
.tag[data-s="locked"]{color:#fff;background:var(--st-locked)}
.tag[data-s="reviewed"]{color:#fff;background:var(--st-reviewed)}
/* ⑦（P3-d）：検討済みコントロール（全7エリア共通 reviewedControlHTML） */
.rvc{margin:0 16px;padding:11px 0 14px;border-top:1px dashed var(--line)}
.rvc .ask{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.rvc .ask b{color:var(--ink)}
.rvc-btn{border:1px solid color-mix(in srgb,var(--st-reviewed) 45%,var(--line));background:var(--card);color:var(--muted);font-weight:700;font-size:12.5px;font-family:inherit;border-radius:9px;padding:6px 13px;cursor:pointer}
.rvc-btn:hover{background:var(--soft)}
.rvc .editor{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.rvc .editor input{flex:1 1 200px;min-width:140px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;background:var(--card);color:var(--ink)}
.rvc .editor .save{border:0;background:var(--st-reviewed);color:#fff;font-weight:800;font-size:12.5px;font-family:inherit;border-radius:8px;padding:7px 14px;cursor:pointer}
.rvc .done{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;background:color-mix(in srgb,var(--st-reviewed) 9%,var(--card));border:1px solid color-mix(in srgb,var(--st-reviewed) 32%,var(--line));border-radius:11px;padding:9px 12px}
.rvc .done .ck{color:var(--st-reviewed);font-size:16px;font-weight:800;line-height:1.2}
.rvc .done .body{flex:1}
.rvc .done .reason{font-weight:700;color:var(--ink)}
.rvc .done .meta{color:var(--muted);font-size:11px;margin-top:1px}
.rvc .done .undo{border:0;background:transparent;color:var(--accent2);font-weight:700;font-size:12px;cursor:pointer;text-decoration:underline}
.area-detail{padding:0 16px 16px; border-top:1px solid var(--line)}
.area-detail .mini{height:120px; margin-top:12px}
.area-detail .twist{font-size:12px; background:color-mix(in srgb,var(--warn) 12%, var(--card)); border:1px solid color-mix(in srgb,var(--warn) 30%, var(--line)); border-radius:10px; padding:9px 11px; margin-top:10px}
.area-detail .cta-row{margin-top:12px}
.area.locked .lock-body{position:relative; padding:15px 16px}
.area.locked .teaser{filter:blur(5px); opacity:.6; pointer-events:none; user-select:none}
.area.locked .lock-over{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; text-align:center; padding:14px;
  background:color-mix(in srgb,var(--card) 35%, transparent)}
.lock-badge{font-size:22px}

.btn{display:inline-flex; align-items:center; gap:7px; cursor:pointer; border:1px solid var(--line); background:var(--card); color:var(--ink);
  font-size:13px; font-weight:700; padding:9px 15px; border-radius:var(--radius-btn); text-decoration:none; transition:transform .12s, box-shadow .12s}
.btn:hover{transform:translateY(-1px); box-shadow:var(--shadow-h)}
.btn.primary{background:var(--accent2); color:#fff; border-color:transparent}
.btn.invest{background:var(--invest); color:#fff; border-color:transparent}
.btn.big{font-size:14px; padding:12px 20px}

/* ===== 出口・取り崩し 詳細パネル（mock_exit_panel_v0.1 を .exit-panel にスコープ移植・非破壊） ===== */
.area.exit-area[open]{grid-column:1 / -1}
.exit-panel{padding-top:2px}
.exit-panel .verdict{margin-top:14px; padding:14px 16px; border-radius:14px; display:flex; gap:12px; align-items:flex-start}
.exit-panel .verdict.bad{background:color-mix(in srgb,var(--bad) 9%, var(--card)); border:1px solid color-mix(in srgb,var(--bad) 30%, var(--line))}
.exit-panel .verdict.good{background:color-mix(in srgb,var(--good) 9%, var(--card)); border:1px solid color-mix(in srgb,var(--good) 30%, var(--line))}
.exit-panel .verdict .big{font-size:13px}
.exit-panel .verdict .big b{font-size:20px; color:var(--bad)}
.exit-panel .verdict.good .big b{color:var(--good)}
.exit-panel .verdict .em{font-size:24px; line-height:1; flex:0 0 auto}
.exit-panel .sec{margin-top:20px}
.exit-panel .sec h3{font-size:12px; font-weight:700; color:var(--muted); margin:0 0 8px; letter-spacing:.04em; display:flex; align-items:center; gap:7px}
.exit-panel .sec h3::before{content:""; width:9px;height:9px;border-radius:3px;background:var(--c-exit);display:inline-block}
.exit-panel .chartbox{height:230px; position:relative}
.exit-panel .note{font-size:11px; color:var(--muted); margin-top:6px}
.exit-panel .kv{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-top:4px}
.exit-panel .kv .box{border:1px solid var(--line); border-radius:12px; padding:11px 13px; background:var(--soft)}
.exit-panel .kv .box .k{font-size:11px; color:var(--muted)}
.exit-panel .kv .box .v{font-size:18px; font-weight:800; margin-top:2px}
.exit-panel .kv .box .v small{font-size:11px; font-weight:600; color:var(--muted)}
.exit-panel table{border-collapse:collapse; width:100%; font-size:12.5px; margin-top:2px}
.exit-panel th,.exit-panel td{border:1px solid var(--line); padding:7px 9px; text-align:right}
.exit-panel th:first-child,.exit-panel td:first-child{text-align:left}
.exit-panel th{background:var(--soft); color:var(--muted); font-weight:700}
.exit-panel tr.hl td{background:color-mix(in srgb,var(--good) 12%, var(--card)); font-weight:700}
.exit-panel tr.depleted td{background:color-mix(in srgb,var(--bad) 10%, var(--card)); color:var(--bad); font-weight:700}
.exit-panel .pill{display:inline-block; font-size:10px; font-weight:700; padding:1px 7px; border-radius:6px; background:var(--soft); color:var(--muted)}
.exit-panel .levers{display:grid; grid-template-columns:repeat(auto-fit,minmax(228px,1fr)); gap:10px}
.exit-panel .lever{display:flex; gap:11px; align-items:flex-start; border:1px solid var(--line); border-left:4px solid var(--lc,var(--accent2)); border-radius:12px; padding:11px 13px; background:var(--card)}
.exit-panel .lever .dot{width:11px;height:11px;border-radius:3px;background:var(--lc,var(--accent2));margin-top:4px;flex:0 0 auto}
.exit-panel .lever .lv-t{font-size:13px;font-weight:700}
.exit-panel .lever .eff{display:block;font-size:12px;color:var(--muted);margin-top:3px;font-weight:600}
.exit-panel .lever .gain{display:inline-block;font-size:10.5px;font-weight:700;color:#fff;background:var(--good);border-radius:var(--radius-pill);padding:1px 9px;margin-top:5px}
.exit-panel .lever .gain.partial{background:var(--warn)}
.exit-panel .lever .gain.worse{background:var(--bad)}
.exit-panel .addbox{border:1px dashed color-mix(in srgb,var(--accent2) 40%, var(--line)); border-radius:12px; padding:6px 14px 12px; margin-top:20px; background:color-mix(in srgb,var(--accent2) 5%, var(--card))}
.exit-panel .addbox .lbl{font-size:10.5px; font-weight:700; color:var(--accent2); background:color-mix(in srgb,var(--accent2) 12%, var(--card)); border-radius:var(--radius-pill); padding:2px 10px; display:inline-block; margin:8px 0 4px}
.exit-panel .add{display:flex; gap:10px; padding:9px 0; border-bottom:1px dashed var(--line)}
.exit-panel .add:last-child{border-bottom:0}
.exit-panel .add .em{font-size:18px; flex:0 0 auto}
.exit-panel .add .t{font-size:12.5px}
.exit-panel .add .t .s{color:var(--muted)}

<!-- Stage2: スポーク（1エリア専用）。共有(01-04)＋パネル本体(05)＋スポーク配線(08)。ハブ描画(06)/ハブ配線(07)は読まない。
     派生D3 v2 工程④（2026-06-16）：dev で Python http.server がブラウザに強くキャッシュさせるため
     ?v= でキャッシュを切る。本番は build_single.py で1枚dist化＝クエリ不要。 -->
<script>
/* ============================================================
   1) 計算エンジン（健診アプリ asset_planning_app/index.html から移植）
      移植元 Sprint版: asset_planning_v1（2026-06時点）
      移植元の行: formatYen:2802 / calcRiskScore:1221 / calcLifeTimeline:1498 /
                  calcRetirement:1319 / diagnose:1715 / calcCashflow:2204 ほか
      ※健診本体は一切改修せず複製。健診の計算が更新されたら手動で追従（二重管理・MVP割り切り）
   ============================================================ */
function formatYen(n){ return '¥ ' + Math.round(n).toLocaleString('ja-JP'); }

// 派生D3：派生Dに戻す＋4シナリオは派生D2拡張を維持（2026-06-16 社長承認・v2）。
//   派生D2（運用名目／支出インフレ反映）は3ペルソナ体感テストで「現役期の購買力激落ち・老後支出が現役超え」など現実乖離が判明し撤回。
//   派生D3＝運用リターン側でインフレ吸収（実質ベース表示）。支出は据置＝ユーザー入力「老後30万」がそのまま「今の感覚で30万」のまま表示される。
//   4シナリオは派生D2の良いUX改善として維持＝悲観1% / 堅実3% / 標準5% / 楽観7%（すべて実質・名目換算は+2%）。
//   据置＝ローン・保険料・収入・年金・退職金（salaryIncreaseで別途反映）。健診と地図で必ず同値（ドリフト防止）。
const INFLATION = 0.02;   // 運用リターンから差し引く物価上昇率（日銀目標・財政検証2024中位ケースと一致）

// 派生D3 v2（工程③・2026-06-16 社長承認）：4シナリオを module-level に抽出。
//   calcRetirement の内部ローカル定義から昇格＝calcCashflow / buildExitData が key で参照可能になり、
//   CF/出口パネルの「シナリオ切替タブ」が単一の真実源（=この配列）から rate / label / color を引ける。
//   既存挙動の不変条件：calcRetirement 内 scenarios 参照を SCENARIOS に置換しても、要素・順序・rate は完全に同じ。
//   各 rate は実質（-INFLATION 込み）＝悲観 0.01 / 堅実 0.03 / 標準 0.05 / 楽観 0.07（名目換算は +0.02）。
const SCENARIOS = [
  { rate: 0.03 - INFLATION, label: '悲観（株式 実質 1%）',  color: '#f87171', key: 'pessimistic' },
  { rate: 0.05 - INFLATION, label: '堅実（株式 実質 3%）',  color: '#fbbf24', key: 'conservative' },
  { rate: 0.07 - INFLATION, label: '標準（株式 実質 5%）',  color: '#60a5fa', key: 'standard' },
  { rate: 0.09 - INFLATION, label: '楽観（株式 実質 7%）',  color: '#34d399', key: 'optimistic' },
];
const SCENARIO_KEYS = ['pessimistic','conservative','standard','optimistic'];

function calcRiskScore(d){
  let score = 3;
  if (d.age < 30) score += 1.5; else if (d.age < 50) score += 0; else score -= 1;
  if (d.job === 'employee' || d.job === 'public') score += 0.5; else if (d.job === 'self') score -= 1;
  if (d.family === 'single') score += 0.5; else if (d.family === 'with_dependents') score -= 1;
  if (d.experience === 'none') { /* 未経験者：Q1不問 */ }
  else {
    if (d.experience === 'exp') score += 0.5;
    if (d.riskA === 'sell') score -= 2;
    else if (d.riskB === 'sell') score -= 1;
    else if (d.riskC === 'sell') score += 0;
    else score += 1;
  }
  if (d.period === 'short') score -= 2; else if (d.period === 'long') score += 0.5;
  return Math.max(1, Math.min(5, Math.round(score)));
}
function emergencyFundMonths(riskScore){ if (riskScore >= 4) return 3; if (riskScore <= 2) return 12; return 6; } // 3段階：4-5→3 / 3→6 / 1-2→12

// 派生C：世帯の手取り月収（円/月）＝本人＋（配偶者が「働いている」場合のみ）配偶者手取り。
//   ・追記キー spouseWorks/spouseIncome は地図の別キー asset_map_detail（健診 asset_planning_v1 は不変）。
//   ・未追記（spouseWorks 未設定）なら本人収入のみ＝従来計算と完全一致。
//   ・現役期の「お金の入り」（余り・生涯CF・投資余力・出口）にだけ使う。年金推計（本人ベース）は d.income のまま。
function householdIncome(d){ return (d.income || 0) + ((d.family || 'single') !== 'single' && d.spouseWorks === 'yes' ? (d.spouseIncome || 0) : 0); }   // B-4：単身世帯は配偶者収入を合算しない（健診を単身に戻しても残る追記の水増しを止める安全弁）。family未設定は'single'扱い＝buildCashflowData/cashflowPanelの正規化と一致

function calcLifeEvents(d){
  const events = [];
  if (d.kidsEdu && d.kidsEdu.length > 0) {
    let totalEdu = 0; const breakdown = [];
    d.kidsEdu.forEach((edu, idx) => {
      let amount = 0, label = '';
      if (edu === 'public') { amount = 7800000; label = '主に公立'; }
      else if (edu === 'private') { amount = 22000000; label = '私立含む'; }
      else if (edu === 'unknown') { amount = 12000000; label = '進路未定（中央推計）'; }
      if (amount > 0) { totalEdu += amount; breakdown.push(`子 ${idx + 1}（${label}）：${formatYen(amount)}`); }
    });
    if (totalEdu > 0) events.push({ name: `子の教育費（${d.kidsEdu.length} 人分）`, total: totalEdu, note: breakdown.join(' / ') });
  }
  if (d.housingPlan > 0) events.push({ name: '住宅購入', total: d.housingPlan, note: `${d.housingPlanYears} 年後の予定として入力` });
  const total = events.reduce((s, e) => s + e.total, 0);
  return { events, total };
}

// J-2（ひろこFB自走監査）：以前は yearsAway<=5 の山を「現金で受ける前提」として除外していたが、
//   その現金（bank）は実際には減らず、5年以内×現役期の山が資産線から一生引かれない不整合だった。
//   → 全イベントを返し、calcRetirement の積立ループで発生年に銀行から差引く（銀行→投資の既存カスケード）。
//   退職後の山は calcCashflow が別途差引くが、積立ループは退職年で止まるため二重控除にはならない。
function eventCostByAge(d){
  const events = calcLifeTimeline(d); const byAge = {};
  events.forEach(e => {
    if (e.marker) return; if (!e.age || !e.value) return;
    byAge[e.age] = (byAge[e.age] || 0) + (e.value || 0);
  });
  return byAge;
}

function calcRetirement(d, reviewOptions, emergencyFund = 0, shortTermTotal = 0, migrateOpts = null){
  // FB-5（2026-06-17 社長承認）：第5引数 migrateOpts を追加。null/未指定なら既存挙動 byte 一致＝YMYL不変。
  //   { annualMigrate, totalMigrate } を渡すと、退職前の年次ループで「銀行→NISA(stockB)」へ年 annualMigrate を移動し、
  //   totalMigrate に達するまで継続。NISA移行シミュの「移行する」線を生成する用途。
  //   ※ d を改変せず、calcRetirement 内部で bankB/stockB を移すだけ＝呼び出し側は d を渡し直すだけで近似ではなく正確に5年分割を再現。
  if (reviewOptions === true) reviewOptions = { reviewInsurance: true, reviewBank: true };
  if (reviewOptions === false || reviewOptions == null) reviewOptions = {};
  const reviewInsurance = !!reviewOptions.reviewInsurance;
  const reviewBank = !!reviewOptions.reviewBank;
  const yearsToRetire = Math.max(0, d.retireAge - d.age);
  // P1-11d（2026-06-19）：健診側 index.html と同形。retirementYear>=2058 で Y経路発動。
  const retirementYear = NOW_YEAR + yearsToRetire;
  const currentCrypto = d.crypto || 0;
  const initialBank = d.bank || 0;
  const nisaBalActive = (d.nisa === 'active') ? (d.nisaBalance || 0) : 0;
  const toushinBalActiveBank = (d.toushinShin === 'bank') ? (d.toushinShinBalance || 0) : 0;
  const toushinBalActiveNet = (d.toushinShin === 'netSecu') ? (d.toushinShinBalance || 0) : 0;
  const dcBal = d.dcBalance || 0;
  const pureSurplus = Math.max(0, householdIncome(d) - (d.expense || 0));   // 派生C：余り＝世帯収入−支出（配偶者収入を反映）
  const gakushiM = (d.gakushi === 'yes') ? (d.gakushiMonthly || 0) : 0;
  const hengakuM = (d.hengaku === 'yes') ? (d.hengakuMonthly || 0) : 0;
  const kojinM = (d.kojinNenkin === 'yes') ? (d.kojinNenkinMonthly || 0) : 0;
  const gaikaM = (d.gaikaHoken === 'yes') ? (d.gaikaHokenMonthly || 0) : 0;
  const nisaM = (d.nisa === 'active') ? (d.nisaMonthly || 0) : 0;
  const toushinNetM = (d.toushinShin === 'netSecu') ? (d.toushinShinMonthly || 0) : 0;
  const toushinBankM = (d.toushinShin === 'bank') ? (d.toushinShinMonthly || 0) : 0;
  const dcM = d.dcMonthly || 0;
  const pensionMul = d.pensionStartAge === 60 ? 0.76 : d.pensionStartAge === 70 ? 1.42 : d.pensionStartAge === 75 ? 1.84 : 1;
  const pensionBase = d.pension > 0 ? d.pension : Math.round((d.income || 0) * 0.5);   // 派生C：年金推計は本人ベース維持（配偶者の年金は今回入れない＝householdIncomeを使わない）
  const pensionEst = Math.round(pensionBase * pensionMul);
  const bankExcess = Math.max(0, initialBank - emergencyFund - shortTermTotal);
  // 派生D3 v2（工程③）：module-level SCENARIOS（L18-25）を参照。要素・順序・rate は従来のローカル定義と完全に同じ＝挙動不変。
  //   実質1%(=名目3% 悲観・Damodaran T-Bill)／実質3%(=名目5% 堅実・UBS Yearbook 21世紀世界株式)／実質5%(=名目7% 標準・GPIF国内株式)／実質7%(=名目9% 楽観・米国S&P500長期実質)
  const scenarios = SCENARIOS;
  const annualIncrease = Math.max(0, d.salaryIncrease || 0);
  const eventByAge = eventCostByAge(d);
  // P2-A（2026-06-23 健診 f3545e7 追従）：子独立後の生活費減モデル。健診側先行で同期漏れだったロジックを地図に移植。
  //   kidsAge の各子が 22 歳到達後、現役期の月余りに「子1人につき月3万円」を加算（生活費から抜ける分を投資余力に回す）。
  //   一次情報：国立成育医療研究センター 2024／家計調査 2024（子1人▲3.6万の保守側）／FP3級公式 末子独立-30%係数。
  //   段階的減算（1人独立で-3万・2人独立で-6万）。retireMonthly（退職後希望生活費）には触らない（ユーザー入力尊重）。
  //   YMYL実測：子なし(あかり/祥平/ひろこ)=完全不変／たけし[6,1] retireAge=60 → 健診と一致(+1,080,000円)／修一[15,12] retireAge=60 → 健診と一致(+720,000円)。
  const KID_INDEPENDENT_AGE = 22;
  const KID_EXPENSE_REDUCTION_MONTHLY = 30000;
  const totalKidsP2A = (d.kidsAge || []).length;
  const results = scenarios.map(s => {
    const stockRate = s.rate; const yearly = [];
    let bankB = initialBank, kojinB = 0, gaikaB = 0, hengakuB = 0;
    let toushinBankB = reviewInsurance ? 0 : toushinBalActiveBank;
    let stockB = nisaBalActive + toushinBalActiveNet + dcBal;
    if (reviewInsurance) stockB += toushinBalActiveBank;
    if (reviewBank) { stockB += bankExcess; bankB -= bankExcess; }
    let yearlySurplus = pureSurplus * 12;
    let migratedSoFar = 0;   // FB-5: 累計移行額。migrateOpts 未指定時は使われない
    for (let i = 0; i <= yearsToRetire; i++) {
      const age = d.age + i;
      // FB-5: 年初に「銀行→NISA(stockB)」への移行を反映（totalAsset push の前＝当該年の運用は移行後の状態で進む）。
      //   migrateOpts 未指定なら 0 のまま＝既存挙動完全一致。
      if (migrateOpts && i > 0) {
        const remaining = Math.max(0, (migrateOpts.totalMigrate || 0) - migratedSoFar);
        const thisYear = Math.min(migrateOpts.annualMigrate || 0, remaining, Math.max(0, bankB));
        if (thisYear > 0) { bankB -= thisYear; stockB += thisYear; migratedSoFar += thisYear; }
      }
      const totalAsset = bankB + kojinB + gaikaB + hengakuB + toushinBankB + stockB + currentCrypto;
      yearly.push({ age, asset: totalAsset });
      const stockEff = effectiveRate(age, stockRate, retirementYear, d.retireAge);
      const hengakuRate = stockRate * PRODUCT_RATES.hengakuFactor;
      const toushinBankRate = stockRate * PRODUCT_RATES.toushinBankFactor;
      // P2-A：その年の「独立済の子」数を求めて生活費減算分を年余りに加算（健診 index.html L2472-2475 と同形）。
      const activeKidsThisYear = (d.kidsAge || []).filter(k => (k + i) < KID_INDEPENDENT_AGE).length;
      const independentKidsThisYear = totalKidsP2A - activeKidsThisYear;
      const yearlyEffectiveSurplus = yearlySurplus + independentKidsThisYear * KID_EXPENSE_REDUCTION_MONTHLY * 12;
      if (reviewBank) { stockB = stockB * (1 + stockEff) + yearlyEffectiveSurplus; }
      else { bankB = bankB + yearlyEffectiveSurplus; stockB = stockB * (1 + stockEff); }
      stockB += (nisaM + toushinNetM + dcM) * 12;
      if (reviewInsurance) { stockB += (gakushiM + hengakuM + kojinM + gaikaM + toushinBankM) * 12; }
      else {
        kojinB = kojinB * (1 + PRODUCT_RATES.kojinNenkin) + kojinM * 12;
        gaikaB = gaikaB * (1 + PRODUCT_RATES.gaikaHoken) + gaikaM * 12;
        hengakuB = hengakuB * (1 + hengakuRate) + hengakuM * 12;
        toushinBankB = toushinBankB * (1 + toushinBankRate) + toushinBankM * 12;
      }
      const eventCost = eventByAge[age] || 0;
      if (eventCost > 0) {
        const fromBank = Math.min(Math.max(0, bankB), eventCost);
        bankB -= fromBank; let remaining = eventCost - fromBank;
        if (remaining > 0) { const fromStock = Math.min(Math.max(0, stockB), remaining); stockB -= fromStock; remaining -= fromStock; }
        if (remaining > 0) bankB -= remaining;

      yearlySurplus += annualIncrease;
    }

    const total = bankB + kojinB + gaikaB + hengakuB + toushinBankB + stockB + currentCrypto;
    if (yearly.length > 0) yearly[yearly.length - 1].asset = total;
    const monthlyWithdraw = (total * 0.04) / 12;
    const totalMonthlyIncome = pensionEst + monthlyWithdraw;
    const gap = (d.retireMonthly || 0) - totalMonthlyIncome;
    return { label: s.label, color: s.color, key: s.key, total, monthlyWithdraw, totalMonthlyIncome, gap, yearly };
  });
  return {
    scenarios: results, pensionEst, yearsToRetire,
    pureSurplus, currentInvestingMonthly: nisaM + toushinNetM + dcM,
  };
}

function calcLifeTimeline(d){
  // 派生D3：イベント費用は据置＝「今の感覚」表示。物価上昇は運用リターン側で吸収（派生D方式）。
  const events = [];
  if (Array.isArray(d.kidsEdu) && Array.isArray(d.kidsAge)) {
    d.kidsEdu.forEach((edu, idx) => {
      const i = idx + 1; const age = d.kidsAge[idx] || 0;
      const yearsToHS = 15 - age; const yearsToUniv = 18 - age;
      if (yearsToHS >= 0 && yearsToHS <= 40) {
        const valueHS = edu === 'private' ? 1500000 : edu === 'public' ? 500000 : 1000000;
        events.push({ year: yearsToHS, age: d.age + yearsToHS, name: `子 ${i} 高校進学（${edu === 'private' ? '私立想定' : edu === 'public' ? '公立想定' : '進路未定'}）`, value: valueHS, icon: '🎓' });
      }
      if (yearsToUniv >= 0 && yearsToUniv <= 40) {
        const valueUniv = edu === 'private' ? 5400000 : edu === 'public' ? 2500000 : 4000000;
        events.push({ year: yearsToUniv, age: d.age + yearsToUniv, name: `子 ${i} 大学進学（${edu === 'private' ? '私立想定' : edu === 'public' ? '国公立想定' : '進路未定'}）`, value: valueUniv, icon: '🎓' });
      }
    });
  }
  if (d.housingPlan > 0 && d.housingPlanYears >= 0) {
    // B-3：持ち家完済でも「住宅購入」の山が立つ→入力意図(住み替え/リフォーム等)を尊重したラベルに変更（山は残す）。
    const down = Math.round(d.housingPlan * 0.2);
    events.push({ year: d.housingPlanYears, age: d.age + d.housingPlanYears, name: '住み替え・リフォーム等の予定', value: down, icon: '🏠' });
  }
  if (d.otherShortTerm > 0) events.push({ year: 3, age: d.age + 3, name: 'その他想定出費', value: d.otherShortTerm, icon: '💰' });
  const careOneTime = d.careOneTime || 0, careMonthly = d.careMonthly || 0, careYears = d.careYears || 0, careStartYears = d.careStartYears || 0;
  if (careOneTime > 0 || (careMonthly > 0 && careYears > 0)) {
    const careAnnual = careMonthly * 12;
    for (let y = 0; y < Math.max(1, careYears); y++) {
      const year = careStartYears + y; const age = d.age + year; const isFirst = (y === 0);
      const value = (isFirst ? careOneTime : 0) + careAnnual; if (value <= 0) continue;
      events.push({ year, age, name: `親の介護 ${y + 1}/${careYears} 年目`, value, icon: '🏥' });
    }
  }
  // ⑥（P3）：地図から追記したライフイベント。名前は自由文字列＝custom印を付け、mapTimeline/レーン分けの名前正規表現での誤分類を避ける。
  if (Array.isArray(d.extraEvents)) {
    d.extraEvents.forEach(ev => {
      const age = Math.round(+ev.age || 0); const value = Math.max(0, Math.round(+ev.amount || 0));
      const year = age - (d.age || 0);
      if (value <= 0 || year < 0 || year > 60) return;   // 軸外・無効は無視
      events.push({ year, age, name: ev.name || 'その他の出費', value, icon: '💰', custom: true });
    });
  }
  events.push({ year: Math.max(0, d.retireAge - d.age), age: d.retireAge, name: 'リタイア', value: 0, marker: true, icon: '🌅' });
  events.sort((a, b) => a.year - b.year);
  return events;
}

function calcShortTermNeeds(d){
  const items = []; let total = 0;
  if (d.housingPlan > 0 && d.housingPlanYears <= 5) { const dp = Math.round(d.housingPlan * 0.2); total += dp; items.push({ name: '住宅頭金', value: dp }); }
  if (Array.isArray(d.kidsEdu) && Array.isArray(d.kidsAge)) {
    d.kidsEdu.forEach((edu, idx) => {
      const age = d.kidsAge[idx] || 0; const yU = 18 - age, yH = 15 - age;
      if (yU >= 0 && yU <= 5) { const c = edu === 'private' ? 5400000 : 2500000; total += c; items.push({ name: `子 ${idx+1} 大学`, value: c }); }
      else if (yH >= 0 && yH <= 5) { const c = edu === 'private' ? 1500000 : 500000; total += c; items.push({ name: `子 ${idx+1} 高校`, value: c }); }
    });
  }
  if (d.otherShortTerm > 0) { total += d.otherShortTerm; items.push({ name: 'その他5年以内', value: d.otherShortTerm }); }
  // ⑥（P3・確認B）：5年以内の地図追記イベントも「必要な備え」に加算＝近接の追記が bankSufficient に正しく効く（⑦の余裕判定が甘くならない）。
  if (Array.isArray(d.extraEvents)) {
    d.extraEvents.forEach(ev => {
      const age = Math.round(+ev.age || 0); const value = Math.max(0, Math.round(+ev.amount || 0));
      const y = age - (d.age || 0);
      if (value > 0 && y >= 0 && y <= 5) { total += value; items.push({ name: ev.name || 'その他の予定', value }); }
    });
  }
  return { total, items };
}

function calcAssetAllocation(d){
  const cash = d.bank || 0;
  const nisaBal = (d.nisa === 'active') ? (d.nisaBalance || 0) : 0;
  const toushinBal = (d.toushinShin === 'none') ? 0 : (d.toushinShinBalance || 0);
  const dcBal = d.dcBalance || 0;
  const stocks = nisaBal + toushinBal + dcBal; const crypto = d.crypto || 0;
  // G1-a（2026-06-22）：個人向け国債（変動10年）を bonds として追加。健診 P1-10 と整合。
  //   既存ペルソナは kojinKokusaiBalance=0 で total/各Pct 完全不変。calcRetirement には未接続＝YMYL不変。
  const bonds = d.kojinKokusaiBalance || 0;
  const total = cash + stocks + bonds + crypto;
  const phase = lifePhase(d.age);
  return {
    total, cash, stocks, bonds, crypto,
    cashPct: total > 0 ? Math.round((cash / total) * 100) : 0,
    stocksPct: total > 0 ? Math.round((stocks / total) * 100) : 0,
    bondsPct: total > 0 ? Math.round((bonds / total) * 100) : 0,
    cryptoPct: total > 0 ? Math.round((crypto / total) * 100) : 0,

}

function lifePhase(age){
  if (age < 45) return { id: 'active', label: '現役期', equityPct: 100 };
  if (age < 60) { const e = 100 - (age - 45) * 5; return { id: 'glide', label: '出口戦略期', equityPct: e }; }
  return { id: 'retired', label: 'リタイア後', equityPct: 50 };
}
const BOND_RATE = 0.015 - INFLATION;   // 派生D3：実質（運用リターン側で物価上昇を吸収）。名目1.5% − INFLATION 2% = 実質 -0.5%
// 派生D3：貯蓄・運用商品の利回りも実質。hengakuFactor/toushinBankFactor は stockRate（実質）に掛ける係数。bank（現金・0）据え置き。
const PRODUCT_RATES = { gakushi: 0.005 - INFLATION, kojinNenkin: 0.01 - INFLATION, gaikaHoken: 0.015 - INFLATION, hengakuFactor: 0.4, toushinBankFactor: 0.7, bank: 0 };
// P1-11d（2026-06-19）：健診側 index.html と完全同形。retirementYear>=2058 で Y経路（retireAge→+10歳で50→35%漸減・以降35%固定）。
const NOW_YEAR = 2026;
function equityPctAt(age, retirementYear, retireAge){
  if (age < 45) return 100;
  if (age < 60) return Math.max(50, 100 - (age - 45) * 5);
  if (retirementYear == null || retirementYear < 2058) return 50;  // X 経路
  const ra = (retireAge != null && retireAge >= 60) ? retireAge : 60;
  if (age < ra) return 50;
  if (age >= ra + 10) return 35;
  return 50 - (age - ra) * 1.5;
}
function effectiveRate(age, stockRate, retirementYear, retireAge){ const eq = equityPctAt(age, retirementYear, retireAge) / 100; return stockRate * eq + BOND_RATE * (1 - eq); }

    const annualBase = d.loanMonthly * 12; const annualBonus = d.loanBonusYearly || 0;
    const effectiveYears = annualBonus > 0 && annualBase > 0 ? Math.max(1, Math.round(d.loanYears * annualBase / (annualBase + annualBonus))) : d.loanYears;
    if (effectiveYears > yearsToRetire) nejireList.push({ level:'yellow', title:`リタイア後もローン返済が ${effectiveYears - yearsToRetire} 年残る見込み`, finding:`リタイアまで ${yearsToRetire} 年。リタイア後も毎月 ${formatYen(d.loanMonthly)} の返済が続く計算です。` });
  }
  return {
    emergencyFund, emergencyMonths, shortTermTotal, totalReserve, monthlySurplus, nejireList, nisaActive,
    bankSufficient: d.bank >= totalReserve, cryptoRatio, riskScore, phase, loanRatio,
    lifeEvents: calcLifeEvents(d), lifeTimeline: calcLifeTimeline(d),
    retirement: calcRetirement(d, { reviewInsurance:false, reviewBank:false }, emergencyFund, shortTermTotal),
    allocation: calcAssetAllocation(d), shortTermNeeds,
  };
}

function calcCashflow(d, ret, scenarioKey = 'standard'){
  // 派生D3 v2（工程③・2026-06-16）：scenarioKey 引数を受け取り、現役期 yearly と退職後 annualRate をシナリオごとに切替。
  //   デフォルト 'standard' で既存挙動 byte 一致（standard.rate = 0.07-INFLATION = 0.05 → 既存ハードコード値と同値）。
  //   呼び出し元：buildMapModel（4シナリオ反復）／runScenario（scenarioKey 伝搬）。
  const sc = SCENARIOS.find(s => s.key === scenarioKey) || SCENARIOS[2];
  const annualRate = sc.rate; const startAge = d.age || 0; const endAge = 100;
  const retireAge = d.retireAge || endAge;
  // P1-11d（2026-06-19）：健診側と同形。
  const retirementYear = NOW_YEAR + Math.max(0, (d.retireAge || 0) - (d.age || 0));
  const std = ret.scenarios.find(s => s.key === scenarioKey) || ret.scenarios[0];   // 派生D3 v2：現役期 yearly もシナリオごとに切替（=標準時は従来と一致）
  const stdYearly = (std && std.yearly) ? std.yearly : [];
  const pensionAnnual = (ret.pensionEst || 0) * 12;
  const retireAnnualExpense = (d.retireMonthly || 0) * 12;
  const incomeAnnualNow = householdIncome(d) * 12; const expenseAnnualNow = (d.expense || 0) * 12;   // 派生C：現役期の年収は世帯ベース（年金期は本人 pensionAnnual のまま）
  const events = calcLifeTimeline(d); const eventByAgeAll = {};
  events.forEach(e => { if (e.marker) return; if (!e.age || !e.value) return; eventByAgeAll[e.age] = (eventByAgeAll[e.age] || 0) + (e.value || 0); });
  const pensionStartAge = d.pensionStartAge || 65; const rows = [];
  for (let age = startAge; age <= endAge; age++) {
    const lifeEventCost = eventByAgeAll[age] || 0;
    let status, incomeAnnual, expenseAnnual, surplusAnnual, assetEnd;
    // 派生D3：支出は据置（今の感覚で表示）。物価上昇は運用リターン側で吸収（annualRate=実質5%）。
    if (age <= retireAge) {
      const idx = age - startAge; const y = stdYearly[idx];
      assetEnd = y ? y.asset : (rows.length > 0 ? rows[rows.length - 1].assetEnd : 0);
      // #4#9（たけしFB）：現役期も昇給・ライフイベント費を年次反映（従来は初年の値で固定→収支バーが横ばいに見えた）。
      const annualIncrease = Math.max(0, d.salaryIncrease || 0);
      incomeAnnual = incomeAnnualNow + annualIncrease * idx;
      expenseAnnual = expenseAnnualNow + lifeEventCost;
      surplusAnnual = incomeAnnual - expenseAnnual;
      status = (age === retireAge) ? 'リタイア' : '現役期';
    } else if (age < pensionStartAge) {
      const prevAsset = rows[rows.length - 1].assetEnd;
      const totalExpenseAnnual = retireAnnualExpense + lifeEventCost;
      const rEff = effectiveRate(age, annualRate, retirementYear, d.retireAge);
      assetEnd = Math.round(prevAsset * (1 + rEff) - totalExpenseAnnual);
      incomeAnnual = 0; expenseAnnual = totalExpenseAnnual; surplusAnnual = -totalExpenseAnnual; status = '無年金期';
    } else {
      const prevAsset = rows[rows.length - 1].assetEnd;
      const totalExpenseAnnual = retireAnnualExpense + lifeEventCost;
      const gap = Math.max(0, totalExpenseAnnual - pensionAnnual); const rEff = effectiveRate(age, annualRate, retirementYear, d.retireAge);
      assetEnd = Math.round(prevAsset * (1 + rEff) - gap);
      incomeAnnual = pensionAnnual; expenseAnnual = totalExpenseAnnual; surplusAnnual = pensionAnnual - totalExpenseAnnual; status = '年金生活';
    }
    rows.push({ age, status, incomeAnnual, expenseAnnual, surplusAnnual, assetEnd: Math.max(0, assetEnd),
      // P2①：退職一時金は「表示専用」。収入バー/余り/資産には混ぜない（資産は 839行で stockB に加算済み＝二重計上しない）
      bonusAnnual: (age === retireAge) ? (d.retirementBonus || 0) : 0 });
  }
  return rows;
}

/* ============================================================
   1.5) 出口・取り崩し 詳細パネル用データ（計算は既存関数の再利用・新規金融計算なし）
   ============================================================ */
// 枯渇年：リタイア後で累計資産が初めて 0 になる年齢（無ければ null）
function findDepletion(cfRows, retireAge){
  for (const r of cfRows){ if (r.age > retireAge && r.assetEnd <= 0) return r.age; }
  return null;
}
// d を1つ受けて calcRetirement＋calcCashflow を回し、枯渇年まで返す（効く手・年金表で複製実行）
// 派生D3 v2（工程③）：scenarioKey 引数を追加。デフォルト 'standard' で既存挙動 byte 一致。
//   calcRetirement は4シナリオを内部で全部計算するため scenarioKey 不要。calcCashflow が scenarioKey でシナリオ別に取り出す。
function runScenario(d, ef, st, scenarioKey = 'standard', migrateOpts = null){
  // FB-5: 第5引数 migrateOpts を伝搬。null/未指定で既存挙動 byte 一致。
  const ret = calcRetirement(d, { reviewInsurance:false, reviewBank:false }, ef||0, st||0, migrateOpts);
  const cf = calcCashflow(d, ret, scenarioKey);
  return { ret, cf, depletionAge: findDepletion(cf, d.retireAge||65) };
}

/* ============================================================
   1.7) FB-5: NISA移行シミュ（2026-06-17 社長承認）
   判定条件4つ（bank>totalReserve*2 / availableNisa>0 / migrateTotal>=100万 / 退職まで>=6年）を満たした人向け。
   年360万×最大5年でNISA生涯枠1800万を埋める移行を仮定し、守りパネル/出口パネルで「移行する vs しない」を見比べる。
   既存挙動不変：判定外の人は applies=false→ buildDefenseData/buildExitData が migrate線を作らない＝3ペルソナYMYL不変。
   ============================================================ */
function calcNisaMigration(d, dx){
  const totalReserve = dx.totalReserve || 0;
  const bank = d.bank || 0;
  const totalReserveX2 = totalReserve * 2;
  const surplus2x = Math.max(0, bank - totalReserveX2);
  const nisaBal = (d.nisa === 'active') ? (d.nisaBalance || 0) : 0;
  const availableNisa = Math.max(0, 18000000 - nisaBal);
  const yearsToRetire = Math.max(0, (d.retireAge || 65) - (d.age || 0));
  const ANNUAL = 3600000;
  // FB-5緩和（2026-06-17 社長承認）：論点⑤の「退職まで≥6年」要件を撤廃。
  //   migrateTotal の上限に ANNUAL*yearsToRetire を追加＝退職前2年の人は年360万×2年=720万まで移行可能。
  //   理由：守りパネルの折れ線では差が見えにくくても、出口パネルで取崩し後の差（NISA運用 vs 銀行）は意味があるため。
  //   退職まで1年未満（退職年や退職後）は migrateTotal=0 で自動的に applies=false に落ちる＝守りの安全弁。
  const migrateTotal = Math.min(surplus2x, availableNisa, ANNUAL * yearsToRetire);
  const migrateYears = Math.min(5, Math.max(1, Math.ceil(migrateTotal / ANNUAL)));
  const applies = (
    surplus2x > 0 &&
    availableNisa > 0 &&
    migrateTotal >= 1000000
  );
  return { applies, bank, totalReserve, totalReserveX2, surplus2x, availableNisa,
           migrateTotal, migrateYears, annualMigrate: ANNUAL,
           age: d.age || 0, retireAge: d.retireAge || 65 };
}

/* ============================================================
   1.6) ②「もし積み立てたら」見本シミュ（あかりFB②・2026-06-11 社長承認）
   新規の金融計算式は持たない＝出口の「効く手」と同型の複製再実行（runScenario）。
   前提は標準シナリオ（株式5%・calcRetirement 752-756行）と同じ。
   「月の余りを積み立てに回す」の表現：
     ・nisaMonthly に余りを上乗せ（calcRetirement 744行の nisa==='active' ガード対策で nisa:'active' を立てる。
       非稼働世帯の残高は 0 のまま＝資産を水増ししない）
     ・expense に余りを足して、現金への自動積み上げ（739行 pureSurplus）から同額を抜く
       ＝同じ余りが「現金にもNISAにも」入る二重計上を防ぐ（昇給分は従来どおり現金へ）
   出さない条件：余り≦0／age≧retireAge（calcCashflowの既知制約を踏まないための防御）
   ============================================================ */
function buildSurplusSimSeries(raw, dx, axisEnd){
  const surplus = householdIncome(raw) - (raw.expense || 0);        // 円/月（diagnose monthlySurplus と同式・派生Cで世帯ベース）
  if (surplus <= 0) return null;
  if ((raw.age || 0) >= (raw.retireAge || 65)) return null;
  const dSim = Object.assign({}, raw, {
    nisa: 'active',
    nisaMonthly: (raw.nisa === 'active' ? (raw.nisaMonthly || 0) : 0) + surplus,
    nisaBalance: (raw.nisa === 'active' ? (raw.nisaBalance || 0) : 0),
    expense: (raw.expense || 0) + surplus,
  });
  // ef/st は runScenario（→出口の効く手）と同じ呼び出し規約に合わせて渡すが、reviewBank:false 固定の現状では
  // bankExcess（calcRetirement 762行）経由の不活性パラメータ＝計算結果に影響しない。将来 reviewBank を有効化する際は
  // dSim の expense（余り上乗せ後）と raw 基準の ef/st の整合に注意（review #3）。
  const sc = runScenario(dSim, dx.emergencyFund || 0, dx.shortTermTotal || 0);
  return sc.cf.filter(r => r.age <= axisEnd).map(r => r.assetEnd);
}
const PENSION_MUL = { 60:0.76, 65:1.0, 70:1.42, 75:1.84 };

function buildExitData(d, dx, scenarioKey = 'standard', nisaMig = null){
  // 派生D3 v2（工程③・2026-06-16）：scenarioKey 引数を追加。デフォルト 'standard' で既存挙動 byte 一致。
  //   呼び出し元：buildMapModel（4シナリオ反復で exitByScenario に格納）。
  //   内部の runScenario 呼び出し（base / pensionTable / levers / optimalDefer）すべてに scenarioKey を伝搬。
  // FB-5（2026-06-17 社長承認）：第4引数 nisaMig を追加。applies=true のとき datasets に「NISAに移行する」線を追加。
  //   verdict バナーに2本分の枯渇年齢を併記。判定外の nisaMig=null/applies=false なら既存挙動完全保持＝YMYL不変。
  const retireAge = d.retireAge || 65;
  const pensionStartAge = d.pensionStartAge || 65;
  const ef = dx.emergencyFund || 0, st = dx.shortTermTotal || 0;
  const base = runScenario(d, ef, st, scenarioKey);
  const ret = base.ret, cf = base.cf;
  const std = ret.scenarios.find(s => s.key === scenarioKey) || ret.scenarios[0];   // 派生D3 v2：scenarioKey で選択（=standard時は従来と一致）
  const depletionAge = base.depletionAge;
  const pensionEst = ret.pensionEst || 0;                                  // 円/月（現状の倍率込み）
  const pensionBase = (d.pension > 0 ? d.pension : Math.round((d.income||0)*0.5)); // ×1.0基準
  // G7（2026-06-22）：P1-11 後続バックログ解消。Y経路対応のため引数3本渡し＋リタイア+10年後の値も計算。
  //   X経路（retirementYear<2058）：age=retireAge も retireAge+10 も 50% で従来通り＝単独表示「50」。
  //   Y経路（retirementYear>=2058）：リタイア直後 50%→10年で 35% グライドダウン＝レンジ表示「50→35」。
  //   表示テキスト用途のみで計算には未使用＝YMYL不変（既存eqPct値はX経路ユーザーで完全一致）。
  const retirementYear = NOW_YEAR + (retireAge - (d.age || 0));
  const eqPct    = equityPctAt(retireAge,      retirementYear, retireAge);
  const eqPctEnd = equityPctAt(retireAge + 10, retirementYear, retireAge);

  // ① 結論バナー用
  const years = depletionAge ? (100 - depletionAge) : 0;
  const annualGapYen = Math.max(0, (d.retireMonthly||0) - pensionEst) * 12;
  const shortfallMan = depletionAge ? Math.round(annualGapYen * years / 10000) : 0;

  // ③ 取り崩し方針
  const policy = {
    eqPct,
    eqPctEnd,    // G7：Y経路でリタイア+10年後の株式比率（X経路ではeqPctと同値）
    // 毎月の取り崩し＝実際の不足額（年金生活の steady state）。calcCashflow の取り崩しと一致させる
    monthlyWithdrawMan: Math.max(0, (d.retireMonthly||0) - pensionEst) / 10000,
    pensionMan: pensionEst / 10000,
  };

  // ④ 年金 繰上げ繰下げ表（各開始年齢で複製実行し枯渇年を読む）
  const pensionTable = [60,65,70,75].map(a => {
    const mul = PENSION_MUL[a];
    const monthlyMan = Math.round(pensionBase * mul) / 10000;
    const sc = runScenario({ ...d, pensionStartAge:a }, ef, st, scenarioKey);
    return { startAge:a, mul, monthlyMan, depletionAge: sc.depletionAge, current:(a===pensionStartAge) };
  });

  // ⑤ 年次CF表（5年刻み・退職〜100、枯渇年があれば差し込み）
  const byAge = {}; cf.forEach(r => byAge[r.age] = r);
  const marks = [];
  for (let a = retireAge; a <= 100; a += 5) marks.push(a);
  if (depletionAge && marks.indexOf(depletionAge) < 0) marks.push(depletionAge);
  if (marks.indexOf(100) < 0) marks.push(100);
  marks.sort((x,y)=>x-y);
  const cfTable = marks.map(a => {
    const r = byAge[a]; if (!r) return null;
    return {
      age:a, isRetire:(a===retireAge), isDepletion:(!!depletionAge && a===depletionAge),
      noPension:(a > retireAge && a < pensionStartAge),
      // B-1：年金列は「年金生活ステータス」の年だけ表示。退職年(status='リタイア')は最終給与が入っているので年金扱いしない
      //   （旧 a>=pensionStartAge だと、退職年=年金開始年が重なる世帯で最終給与が年金列に出ていた＝あかり33.3万バグ）
      pensionMan: (r.status === '年金生活' ? r.incomeAnnual/12 : 0) / 10000,
      withdrawMan: Math.max(0, (r.expenseAnnual - r.incomeAnnual)/12) / 10000,
      assetMan: r.assetEnd / 10000,
    };
  }).filter(Boolean);

  // ②.5 効く手（d を複製してパラメータを変え再実行・枯渇年の変化を読む）
  const nisaActive = d.nisa === 'active';
  const deferTo = (pensionStartAge >= 70) ? 75 : 70;
  const levers = [
    { key:'retire2', label:'リタイアを2年延ばす', color:'#1f7a4d', dash:false, graphed:true,
      eff:'収入期間が延び、取り崩し開始が遅くなる', _d:{ ...d, retireAge: retireAge+2 } },
    { key:'spend10', label:'生活費を10%抑える', color:'#b8860b', dash:true, graphed:true,
      eff:'毎月の取り崩しが軽くなる', _d:{ ...d, retireMonthly: Math.round((d.retireMonthly||0)*0.9) } },
    { key:'defer', label:`年金を${deferTo}歳まで繰り下げる`, color:'#7b4fb5', dash:false, graphed:false,
      _d:{ ...d, pensionStartAge: deferTo },
      deferInfo:{ curMan: pensionEst/10000, newMan: Math.round(pensionBase*(PENSION_MUL[deferTo]||1))/10000 } },
    { key:'nisa', label: nisaActive ? 'NISA積立を月2万増やす' : 'NISAを月2万はじめる', color:'#2e5cb8', dash:false, graphed:true,
      eff:'運用に回すお金を増やす', _d:{ ...d, nisa:'active', nisaMonthly:(nisaActive?(d.nisaMonthly||0):0)+20000 } },
  ];
  levers.forEach(v => {
    const sc = runScenario(v._d, ef, st, scenarioKey);
    v.depletionAge = sc.depletionAge;
    v._cf = sc.cf;
    if (!v.depletionAge) { v.gainText = depletionAge ? '枯渇を回避（100歳まで持つ）' : '100歳まで枯渇なし'; v.partial = false; v.worse = false; }
    else if (depletionAge && v.depletionAge > depletionAge) { v.gainText = `枯渇を ${depletionAge}歳 → ${v.depletionAge}歳 に先延ばし`; v.partial = true; v.worse = false; }
    else if (depletionAge && v.depletionAge < depletionAge) { v.gainText = (v.key==='defer') ? `かえって ${v.depletionAge}歳に早まる（無年金期間に取り崩し集中）` : `かえって ${v.depletionAge}歳に早まる`; v.partial = true; v.worse = true; }
    else { v.gainText = '単独では変化なし・組み合わせを'; v.partial = true; v.worse = false; }
  });

  // ② 資産推移グラフ（退職〜100の累計資産・万円。現状＋グラフ対象レバー）
  const chartAges = []; for (let a = retireAge; a <= 100; a++) chartAges.push(a);
  const curveOf = (rows) => { const m = {}; rows.forEach(r => m[r.age] = r.assetEnd); return chartAges.map(a => Math.round((m[a]||0)/10000)); };
  const chart = {
    ages: chartAges,
    datasets: [{ label:'① 現状のまま', color:'#a3324b', dash:false, data: curveOf(cf) }]
      .concat(levers.filter(v=>v.graphed).map(v => ({ label:v.label, color:v.color, dash:v.dash, data: curveOf(v._cf) }))),
  };
  levers.forEach(v => { delete v._d; delete v._cf; }); // モデルを軽くする

  // FB-5: NISA移行版の取崩しシミュ（適用時のみ）。同じ scenarioKey で「年360万×最大5年」を流し直し→ datasets に2本目追加。
  let nisaMigExit = null;
  if (nisaMig && nisaMig.applies) {
    const migSc = runScenario(d, ef, st, scenarioKey, { annualMigrate: nisaMig.annualMigrate, totalMigrate: nisaMig.migrateTotal });
    const migRetireRow = migSc.cf.find(r => r.age === retireAge);
    nisaMigExit = {
      depletionAge: migSc.depletionAge,
      retireAssetMan: Math.round((migRetireRow ? migRetireRow.assetEnd : 0) / 10000),
      hasDepletion: !!migSc.depletionAge,
    };
    // 「現状のまま」(index 0) の直後に挿入＝凡例の並びを「現状→移行→効く手」に整える
    chart.datasets.splice(1, 0, { label:'NISAに移行する', color:'#10b981', dash:false, data: curveOf(migSc.cf) });
  }

  // ⑥ 追加分析
  let optimalDeferAge = null, alreadySafe = false;
  if (!depletionAge) alreadySafe = true;
  else { for (let a = Math.max(65, pensionStartAge); a <= 75; a++) { if (runScenario({ ...d, pensionStartAge:a }, ef, st, scenarioKey).depletionAge == null) { optimalDeferAge = a; break; } } }
  const analysis = { alreadySafe, optimalDeferAge, noPensionYears: Math.max(0, pensionStartAge - retireAge) };

  // ⑧P4：全7駅を訪問済みか（終点で達成バナーを出すための表示専用フラグ・数字に無関係）
  const _vis = detailAllowed() ? (loadDetail().visited || {}) : null;
  const allVisited = !!_vis && STATIONS.every(k => _vis[k]);
  return { retireAge, pensionStartAge, hasDepletion: !!depletionAge, depletionAge, years, shortfallMan,
           policy, pensionTable, cfTable, levers, chart, analysis,
           pensionAssumed: !(d.pension > 0),            // W-4：年金額が未入力＝手取り×50%で仮置き中
           hasRetireBonus: (d.retirementBonus || 0) > 0, // W-5：退職金あり＝税引き後入力の注記を出す
           allVisited,                                   // ⑧P4：全駅ツアー完了フラグ
           nisaMigExit };                                // FB-5: 「移行する」線の枯渇年齢・退職時資産（applies=false / nisaMig=null なら null）
}

// 守りの土台 詳細パネル用データ（既存 diagnose の再利用・新規金融計算なし）
// FB-5: 第3引数 nisaMig を追加。applies=true のときだけ「NISA移行シミュ」セクション用の線データを生成。
function buildDefenseData(d, dx, nisaMig = null){
  const expense        = d.expense || 0;                 // 円/月
  const emergencyFund  = dx.emergencyFund || 0;          // 円
  const emergencyMonths= dx.emergencyMonths || 0;
  const riskScore      = dx.riskScore || 3;
  const shortItems     = (dx.shortTermNeeds && dx.shortTermNeeds.items) ? dx.shortTermNeeds.items : []; // [{name,value(円)}]
  const shortTotal     = dx.shortTermTotal || 0;         // 円
  const totalReserve   = dx.totalReserve || 0;           // 円（= 防衛資金 + 短期）
  const bank           = d.bank || 0;                    // 円
  const surplus        = dx.monthlySurplus || 0;         // 円/月（income - expense）
  const sufficient     = !!dx.bankSufficient;
  const shortfall      = Math.max(0, totalReserve - bank);                       // 不足（円）
  const surplusOver    = Math.max(0, bank - totalReserve);                       // 余剰（円・filled時）
  const monthsToFill   = (shortfall > 0 && surplus > 0) ? Math.ceil(shortfall / surplus) : null; // 到達月数
  const phase          = lifePhase(d.age || 0);          // {id:'active'|'glide'|'retired', label, equityPct}

  // FB-5: 適用時のみ標準シナリオで「移行する/しない」の年齢別資産推移を生成（退職時で止める＝論点④G案）
  let nisaMigDefense = null;
  if (nisaMig && nisaMig.applies) {
    const ef = dx.emergencyFund || 0, st = dx.shortTermTotal || 0;
    const without = calcRetirement(d, false, ef, st);
    const withMig = calcRetirement(d, false, ef, st, { annualMigrate: nisaMig.annualMigrate, totalMigrate: nisaMig.migrateTotal });
    const stdWithout = without.scenarios.find(s => s.key === 'standard');
    const stdWith    = withMig .scenarios.find(s => s.key === 'standard');
    if (stdWithout && stdWith) {
      const ages         = stdWithout.yearly.map(y => y.age);
      const lineWithout  = stdWithout.yearly.map(y => Math.round(y.asset / 10000));   // 万円
      const lineWith     = stdWith   .yearly.map(y => Math.round(y.asset / 10000));
      const diffAtRetire = Math.round(((stdWith.total || 0) - (stdWithout.total || 0)) / 10000); // 万円
      nisaMigDefense = { ages, lineWithout, lineWith, diffAtRetire };
    }
  }

  return {
    sufficient, expense, emergencyFund, emergencyMonths, riskScore,
    shortItems, shortTotal, totalReserve, bank,
    surplus, shortfall, surplusOver, monthsToFill,
    age: d.age || 0, phaseId: phase.id, phaseLabel: phase.label,
    nisaMig: (nisaMig && nisaMig.applies) ? nisaMig : null,   // FB-5: パネルが表示判定に使う
    nisaMigDefense,                                            // FB-5: 折れ線描画に使う
  };
}

// 家計CF 詳細パネル用データ（既存 diagnose / 入力値の再利用・新規金融計算なし）
function buildCashflowData(d, dx){
  const income      = householdIncome(d);              // 円/月（手取り・派生C＝世帯ベース。余り surplus と整合させ verdict 式を崩さない）
  const expense     = d.expense || 0;                  // 円/月
  const surplus     = dx.monthlySurplus || 0;          // 円/月（income - expense）
  const loanMonthly = d.loanMonthly || 0;              // 円/月（dx.loanRatio と同じ基礎）
  // 保険料月額合計（build7Areas と同式・既存入力の足し算であって新規計算ではない）
  const insMonthly  = (d.gakushi==='yes'?(d.gakushiMonthly||0):0)
                    + (d.hengaku==='yes'?(d.hengakuMonthly||0):0)
                    + (d.kojinNenkin==='yes'?(d.kojinNenkinMonthly||0):0)
                    + (d.gaikaHoken==='yes'?(d.gaikaHokenMonthly||0):0);
  const other       = Math.max(0, expense - loanMonthly - insMonthly);   // その他生活費（0クランプ）
  const loanRatio   = dx.loanRatio || 0;               // 年ローン/年収（既存）
  const insRatio    = income > 0 ? insMonthly / income : 0;              // 手取り比
  return {
    income, expense, surplus, loanMonthly, insMonthly, other,
    loanRatio, insRatio,
    empty: (income === 0 && expense === 0),
    isDeficit: surplus < 0,
    hasLoan: loanMonthly > 0, hasIns: insMonthly > 0,
    insTag:  insRatio  > 0.10 ? 'warn' : 'ok',         // 目安5〜10%
    loanTag: loanRatio > 0.30 ? 'warn' : 'ok',         // 目安25〜30%
    bankSufficient: !!dx.bankSufficient,
    family: d.family || 'single',                      // B-4：単身世帯では配偶者追記欄を出さないための判定材料
    // 派生C：配偶者就労の追記（地図から入力）。UI=万円表示・保存=円
    spouseWorks:  d.spouseWorks === 'yes' ? 'yes' : 'no',
    spouseIncome: d.spouseIncome || 0,                 // 円/月
  };
}

// 必要保障額の固定概算（子あり世帯のみ・大黒柱の万一を想定）
// 前提はすべて「会社員世帯のおおまかな目安」。新規金融計算はここだけ・教育費は calcLifeTimeline を流用（二重計上回避）
// 派生C：地図からの追記（asset_map_detail）で精緻化する。追記が無ければ全項目0扱い＝従来の概算と完全一致。
//   ① 配偶者収入：遺族の収入源として need の控除段で引く（生活費は直接削らない）
//   ② 死亡保障額：need から別建てで控除（最終必要保障額）
//   ③ 団信あり：遺族のローンが消える→生活費からローン分(0.70係数=生活費と二重控除回避)を引く
//   ④ 団信なし＋残高：遺族にローンが残る→総額に上乗せ。'unknown'(既定)は加減算なし＝現状維持の安全弁
// P1-5（2026-06-18）：lostPerson 引数で「亡くなる側」を本人/配偶者スワップ可能に対称化。
//   既定 'self' = 従来の本人前提と<b>完全同一</b>（地図側3ペルソナハッシュ完全不変保証）。
//   'spouse' 指定時のみ「配偶者が大黒柱の世帯（ゆかり/美智子）」向けに配偶者万一を計算。
//   Q4=B 採用：配偶者の職業は本人 job を流用（spouseJob 未対応・P2バックログ）。
function calcCoverageNeed(d, lostPerson){
  const kids = Array.isArray(d.kidsAge) ? d.kidsAge.filter(a => typeof a === 'number' && a >= 0) : [];
  if (kids.length === 0) return null;                              // 子データ無し→概算しない
  // P1-5：「亡くなる側」「残る側」の属性を引数でスワップ。既定 'self' で従来と完全同一。
  const isSelfLost = lostPerson !== 'spouse';
  const lostJob        = isSelfLost ? d.job : (d.spouseJob || d.job);                       // Q4=B：本人 job 流用
  const lostIncome     = isSelfLost ? (d.income || 0) : (d.spouseIncome || 0);              // 遺族厚生年金の報酬比例ベース
  const lostInsBenefit = isSelfLost ? (d.insDeathBenefit || 0) : (d.spouseInsDeathBenefit || 0);  // Q3=A：spouseInsDeathBenefit 新規（任意・既定0）
  // 残る側（遺族の収入源として need 控除に使う）
  const survivorWorksFlag = isSelfLost
                          ? (d.spouseWorks === 'yes' ? 'yes' : 'no')   // 本人が亡くなる→配偶者が残る・配偶者が働いているか
                          : 'yes';                                       // 配偶者が亡くなる→本人が残る・本人は当然働いている前提
  const survivorAnnualIncome = isSelfLost ? (d.spouseIncome || 0) : (d.income || 0);
  const youngest = Math.min.apply(null, kids);
  const years = Math.max(0, 22 - youngest);                        // 末子が22歳になるまで
  const survivorMonthly = (d.expense || 0) * 0.70;                 // 遺族の生活費＝今の支出の70%（円/月）
  const survivorLivingGross = survivorMonthly * 12 * years;        // 円（団信控除前のグロス＝表の1行目に表示）
  // ③ 団信あり：遺族の生活費からローン分を控除（loanMonthly×0.70×12×years・生活費と同じ0.70係数で二重控除を防ぐ）
  //   P1-5：団信は契約者（多くは大黒柱）の万一を想定。本人主体時は従来通り・配偶者主体時も同じロジック流用（団信契約者が配偶者と仮定）。
  const danshin = d.danshin || 'unknown';
  const loanMonthly = d.loanMonthly || 0;
  const loanCut = (danshin === 'yes' && loanMonthly > 0)
    ? Math.min(loanMonthly * 0.70 * 12 * years, survivorLivingGross) : 0;
  const survivorLivingTotal = survivorLivingGross - loanCut;       // 円（団信控除後＝総額に使う）
  // 残りの教育費＝将来(year>=0)の教育イベント(🎓)のみ。生涯総額(calcLifeEvents)は使わない＝二重計上回避
  const tl = calcLifeTimeline(d);
  const remainingEdu = tl.filter(e => !e.marker && e.icon === '🎓' && e.year >= 0)
                         .reduce((s, e) => s + (e.value || 0), 0);  // 円
  // 子ありでも末子独立済み(years=0)かつ残り教育費0なら概算が不自然→null（案内へフォールバック）
  if (years === 0 && remainingEdu === 0) return null;
  // ④ 団信なし＋残高：遺族にローンが残る前提で総額に上乗せ。loanMonthly>0（＝現にローンがある）を条件に
  //    ＝健診を持ち家完済/賃貸に入れ直しても、別キーに残る古い danshin='no'+残高が必要額を水増ししない（入力UIは loan のみ表示のため修正不能になるのを防ぐ）
  const loanAddBack = (danshin === 'no' && loanMonthly > 0) ? (d.loanBalance || 0) : 0;
  const survivorTotal = survivorLivingTotal + remainingEdu + loanAddBack;  // 遺族の支出総額（円）
  // J-1（ひろこFB）：遺族年金を「子の数＋職業」で段階化（健診取得済みの kidsAge/job/income を使用・健診は触らない）。
  //   遺族基礎年金(2024目安)＝基本 約81.6万/年 ＋ 子の加算(第1・2子 各23.5万／第3子以降 各7.8万)。
  //   会社員・公務員はさらに遺族厚生年金(報酬比例の概算＝本人手取り年収×0.08・控えめ＝過小に振らない)。自営業は基礎のみ。
  //   いずれも"目安"（加入状況で変わる旨は表の注記で明示）。固定120万より実態に寄せ、必要保障額の過大を抑える。
  // P1-5：遺族厚生年金は「亡くなった人の職業＋年収」ベース（lostJob / lostIncome）。
  const kidsCount = kids.length;
  const izokuKiso = 816000 + 234800 * Math.min(kidsCount, 2) + 78300 * Math.max(0, kidsCount - 2);
  //   厚生は控えめに70万/年で頭打ち＝高所得世帯で年金を過大に見積もって必要保障額を過小（保険不足）に振らないための安全弁。
  const izokuKosei = (lostJob === 'employee' || lostJob === 'public') ? Math.min(Math.round(lostIncome * 12 * 0.08), 700000) : 0;
  const survivorPensionAnnual = izokuKiso + izokuKosei;            // 円/年（遺族基礎＋会社員は遺族厚生の目安）
  const survivorPensionTotal = survivorPensionAnnual * years;      // 円（末子22歳までの累計・従来モデルと同じ years 乗算）
  // 既存資産＝銀行貯金＋NISA残高＋投信残高。万一のとき遺族が即取り崩せる流動資産。
  // 暗号は変動が激しいため保守的に除外。iDeCo/DCは原則60歳前ロックのため除外（死亡一時金は出るが保険代替には強引なので保守側に）。
  const liquidAssets = (d.bank || 0) + (d.nisaBalance || 0) + (d.toushinShinBalance || 0);
  // ① 配偶者収入：万一後も働き続ける前提で年数×手取りを控除（生活費は削らず need 段で引く）
  //   P1-5：残る側の年収ベース（survivorAnnualIncome）。フィールド名は spouseAnnual のまま互換維持。
  const spouseAnnual = (survivorWorksFlag === 'yes') ? Math.max(0, survivorAnnualIncome * 12 * years) : 0;
  const needBeforeIns = Math.max(0, survivorTotal - (survivorPensionTotal + liquidAssets + spouseAnnual));
  // ② 死亡保障額：need から別建てで控除（最終的な必要保障額の目安）
  //   P1-5：亡くなった側の死亡保障額（lostInsBenefit）。本人主体=d.insDeathBenefit / 配偶者主体=d.spouseInsDeathBenefit。
  const insDeathBenefit = lostInsBenefit;
  const insApplied = Math.min(insDeathBenefit, needBeforeIns);     // 実際に効いた分（過大控除しない）
  const needYen = Math.max(0, needBeforeIns - insDeathBenefit);    // = 必要保障額（保険控除後・最終）
  // グラフ用：埋まる側を survivorTotal でクランプ（過大表示防止）。順＝年金→資産→配偶者収入→保険→不足
  const barPension = Math.min(survivorPensionTotal, survivorTotal);
  const barAsset   = Math.min(liquidAssets, Math.max(0, survivorTotal - barPension));
  const barSpouse  = Math.min(spouseAnnual, Math.max(0, survivorTotal - barPension - barAsset));
  const barIns     = Math.min(insApplied,   Math.max(0, survivorTotal - barPension - barAsset - barSpouse));
  const barNeed    = needYen;
  return { years, survivorMonthly, survivorLivingGross, survivorLivingTotal, loanCut, danshin, loanMonthly,
           remainingEdu, loanAddBack, loanBalance: d.loanBalance || 0, survivorTotal,
           survivorPensionTotal, survivorPensionAnnual, liquidAssets, spouseWorks: d.spouseWorks === 'yes' ? 'yes' : 'no', spouseIncome: d.spouseIncome || 0, spouseAnnual,
           needBeforeIns, insDeathBenefit, insApplied, needYen,
           barPension, barAsset, barSpouse, barIns, barNeed,
           // P1-5：呼び出し側（パネルUI）で主体表示に使う
           lostPerson: isSelfLost ? 'self' : 'spouse' };
}

// 保障 詳細パネル用データ（既存 diagnose / 入力値の再利用・新規金融計算は必要保障額の固定概算のみ）
function buildCoverageData(d, dx){
  const income = householdIncome(d);                              // 円/月（手取り・派生C＝世帯ベース。保険料比率を全画面で一致させる）
  // 保険料月額合計（build7Areas / buildCashflowData と同式）
  const insMonthly = (d.gakushi==='yes'?(d.gakushiMonthly||0):0)
                   + (d.hengaku==='yes'?(d.hengakuMonthly||0):0)
                   + (d.kojinNenkin==='yes'?(d.kojinNenkinMonthly||0):0)
                   + (d.gaikaHoken==='yes'?(d.gaikaHokenMonthly||0):0);
  const insRatio = income > 0 ? insMonthly / income : 0;           // 手取り比
  // 貯蓄型保険（保障と運用が混ざりがち）のカード化。代替案は「掛け捨て＋NISA分離」が基本
  const cards = [];
  if (d.hengaku === 'yes') cards.push({
    level:'red', title:'変額保険に入っている', monthlyYen:(d.hengakuMonthly||0), invest:true,
    finding:'保障と運用を1つの商品で混ぜている状態です。年率コストが1.5〜2%前後かかっていることが多く、長期では大きな差になります。',
    alt:'「掛け捨ての保険」＋「NISAでの運用」に<b>分ける</b>のが王道とされています。保障は保障、運用は運用で持つほうが、コストが見えやすく動かしやすい。' });
  if (d.gaikaHoken === 'yes') cards.push({
    level:'red', title:'外貨建て保険に入っている', monthlyYen:(d.gaikaHokenMonthly||0), invest:true,
    finding:'保障＋運用＋為替リスク＋手数料を1つの商品に混ぜています。実質の利回りは見劣りすることが多いタイプです。',
    alt:'こちらも「掛け捨て＋NISA」に<b>分ける</b>のが一般的な選択肢。為替の影響を保障と切り離せます。' });
  if (d.gakushi === 'yes') cards.push({
    level:'yellow', title:'学資保険に入っている', monthlyYen:(d.gakushiMonthly||0), invest:false,
    finding:'学資保険の返戻率は一般に105〜110%（実質の年利0.3〜0.5%ほど）。同じ期間にNISAのインデックス運用をした場合、年5%想定では1.5〜2倍前後になる試算もあります（あくまで一般的な目安で、運用には変動リスクがあります）。',
    alt:'教育資金も「掛け捨て＋NISA」で準備する選択肢があります。ただし<b>確実に貯めたい時期が近い</b>なら元本割れしない学資保険のままが安心、という考え方も。家庭の事情で分かれます。' });
  if (d.kojinNenkin === 'yes') cards.push({
    level:'yellow', title:'個人年金保険に入っている', monthlyYen:(d.kojinNenkinMonthly||0), invest:true,
    finding:'個人年金保険の返戻率は一般に105〜110%程度・実質の年利0.2〜0.3%ほど。同じ期間のNISAなら年5%想定で差がつくという試算もあります。',
    alt:'老後資金づくりなら、まずNISA・iDeCoなど税優遇のある制度を使う選択肢があります。' });

  const family = d.family || 'single';
  const hasKids = family === 'with_dependents';
  // P1-5（2026-06-18）：本人/配偶者どちらが「大黒柱の万一」のシミュ対象かを決定。
  //   Q2=B 採用：自動判定（spouseIncome > income & 共働き）＋ユーザー手動切替（asset_map_detail.coverageLostPerson）。
  //   切替UIが出るのは「子あり＋配偶者就労 yes＋single 以外」のみ。それ以外は本人主体固定。
  const canSwitch = hasKids && family !== 'single' && d.spouseWorks === 'yes';
  const autoDecided = (canSwitch && (d.spouseIncome || 0) > (d.income || 0)) ? 'spouse' : 'self';
  const userChoice = (d.coverageLostPerson === 'self' || d.coverageLostPerson === 'spouse') ? d.coverageLostPerson : null;
  const defaultLost = canSwitch ? (userChoice || autoDecided) : 'self';
  return {
    family, hasKids,
    // 既存：UIが参照しているフィールド。主体（defaultLost）の結果を入れる（後方互換）。
    //   3ペルソナ＋5体ペルソナで defaultLost='self' のとき従来と完全同一（YMYL不変）。
    need: hasKids ? calcCoverageNeed(d, defaultLost) : null,
    // P1-5：両方計算してUIで比較可能に（パネル側で必要に応じて表示）
    needSelf:   hasKids ? calcCoverageNeed(d, 'self')   : null,
    needSpouse: hasKids ? calcCoverageNeed(d, 'spouse') : null,
    canSwitch, autoDecided, defaultLost, userChoice,
    income, insMonthly, insRatio,
    insHeavy: insMonthly > 0 && insRatio > 0.10,                   // 目安5〜10%
    cards, savingsInsCount: cards.length, hasSavingsIns: cards.length > 0,
  };
}

/* 投資の型（allocation）詳細パネルのデータ。新規金融計算は最小（目安バーの内訳のみ）。
   思想：FP-UNIV「配分の最適化」を一般層へ／投資判断は出さない／"めやすの形"は2層
        ㋐現金土台＝健診結果の totalReserve（個別の数字）㋑株式比率＝年齢別の一般目安 refEquityPct */
function buildAllocationData(d, dx){
  const al = dx.allocation;                                          // total/cash/stocks/crypto/*Pct/refEquityPct/phaseLabel
  // 状態判定は build7Areas(allocation) と同式にそろえる＝エリアのタグとパネルが一致する
  const totalFin = (d.bank||0) + (d.crypto||0);                      // diagnose L700 と同じ母数
  const cryptoRatio = totalFin > 0 ? (d.crypto||0)/totalFin : 0;
  // code-review MEDIUM-2（2026-06-22）：個人国債のみ保有者を「未入力」誤判定しないよう kojinKokusaiBalance も判定に含める（健診 P1-10 と同形）
  const noInvest = d.nisa!=='active' && d.toushinShin==='none' && (d.crypto||0)===0 && (d.dcBalance||0)===0 && (d.dcMonthly||0)===0 && (d.kojinKokusaiBalance||0)===0;
  const att = ((d.crypto||0) > 0 && cryptoRatio > 0.1) || d.toushinShin === 'bank';
  const state = noInvest ? 'empty' : att ? 'attention' : 'filled';

  // めやすの形（2層）：㋐土台＝健診の備え目安 ㋑余りを年齢別の株式比率で（暗号・債券は目安0）
  const total      = al.total || 0;
  const reserve    = Math.min(dx.totalReserve || 0, total);          // 土台ぶん（健診結果・守りパネルと同数字）
  const investable = Math.max(0, total - reserve);                   // 余ったお金
  const tgtStock   = Math.round(investable * (al.refEquityPct/100)); // 余りの株式目安
  const tgtCash    = total - tgtStock;                               // 残り全部＝現金（土台＋待機）。暗号・債券は0
  // G1-a（2026-06-22）：bonds（個人国債）を now に追加。tgt.bonds=0 で「目安は2軸（現金/株式）」を維持＝Rule15で「個人国債を検討」を別カードで処方する設計。
  const now = { cash: al.cash, stocks: al.stocks, bonds: al.bonds || 0, crypto: al.crypto };
  const tgt = { cash: tgtCash, stocks: tgtStock, bonds: 0, crypto: 0 };
  // 目安とのズレ（方向だけ・額は出さない）：株式が目安比でどちらに寄っているか
  const thresh = total * 0.1;
  const stockDiff = now.stocks - tgt.stocks;
  const gap = total <= 0 ? 'ok' : stockDiff < -thresh ? 'low' : stockDiff > thresh ? 'high' : 'ok';

  // 見直しカード：NISA未稼働(hi・先頭)→暗号資産(red)→銀行窓販(red) の順（モック準拠）
  const cards = [];
  if (d.nisa !== 'active') cards.push({
    kind:'hi', lvl:'注目', title:'NISA（運用益が非課税の枠）をまだ使っていない', amtYen:0,
    find:'NISAは運用益が非課税になる制度です。通常は利益に約20%の税金がかかりますが、その枠内なら非課税。少額からの長期積立と相性が良いとされ、投資を始めるときの「最初の置き場所」として広く紹介されています。',

  // G5（2026-06-22）：健診 Rule 13 を地図に横展開。NISA月10万超→成長枠への振分提案（3層整合性監査 G5・P2）。

<script>/* ============================================================
   2) localStorage 読み取り（健診データ・読むだけ）
   ============================================================ */
const RAW_KEY = 'asset_planning_v1';
function loadRaw(){ try { return JSON.parse(localStorage.getItem(RAW_KEY) || 'null'); } catch(e){ return null; } }

/* 派生C：地図からの追記レイヤー（健診とは別キー）。
   ・健診 asset_planning_v1 には一切書かない＝健診を再入力しても追記は消えない（案3）。
   ・計算時は loadRaw() に detail を重ねた merged raw を作って diagnose/buildMapModel に渡す。
   ・detail のキー（spouseWorks/spouseIncome/insDeathBenefit/danshin/loanBalance）は raw と衝突しない新規キー。 */
const DETAIL_KEY = 'asset_map_detail';
function loadDetail(){ try { return JSON.parse(localStorage.getItem(DETAIL_KEY) || 'null') || {}; } catch(e){ return {}; } }
// P3：UI状態キー（_v/reviewed/visited）は計算に混ぜない。extraEvents は raw 合流させるため除外しない。
const DETAIL_UIONLY = ['_v','reviewed','visited'];
function mergeDetail(raw, detail){
  const calc = {};
  for (const k in (detail || {})) if (DETAIL_UIONLY.indexOf(k) < 0) calc[k] = detail[k];
  const merged = Object.assign({}, raw, calc);   // raw不変・detail（計算キーのみ）を上書きで重ねた新オブジェクト
  // 派生B：修繕積立金の「これから備える額（円/月）」は毎月の支出に上乗せ（家計CF・出口へ波及）。
  // ・既存の積立 shuzenMonthly は加算しない＝健診の expense に既に含まれる前提（二重計上回避）。
  // ・shuzenPlanMonthly は DETAIL_UIONLY に入れない（計算へ効かせるため）。
  // ・戸建てで既に積立あり（shuzenMonthly>0）なら expense に込み済み＝stale な追記が残っても加算しない
  //   （その時 housingPanel は追記欄を隠す＝UIの非表示と計算を一致させ、二重計上を防ぐ）。
  const isShuzenSaving = (raw.propertyType === 'detached') && ((raw.shuzenMonthly || 0) > 0);
  const shuzenPlan = (!isShuzenSaving && detail && detail.shuzenPlanMonthly) || 0;
  if (shuzenPlan > 0) merged.expense = (raw.expense || 0) + shuzenPlan;
  return merged;
}
// 健診データがある実世帯にだけ追記を保存（サンプル世帯には書かない）。patch を既存 detail にマージして保存。
function patchDetail(patch){
  if (!detailAllowed()) return;
  const next = Object.assign({}, loadDetail(), patch || {});
  try { localStorage.setItem(DETAIL_KEY, JSON.stringify(next)); } catch(e){}
}
// 追記レイヤーの可否＝実世帯（健診データあり）のときだけ。サンプル世帯では欄を出さない／書き込まない（V6ガード）。
// render() が CURRENT=model（isSample確定済み）を先に設定してから各パネルHTMLを生成するため、ここで参照できる。
function detailAllowed(){ return !!(CURRENT && !CURRENT.isSample); }

/* P3：HTML出力用エスケープ（自由文字列のXSS無害化）。全HTML出力点で通す。
   ※ Chart.js のツールチップ（canvas描画）には使わない＝&lt; などの文字実体参照がそのまま見えてしまうため。 */
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

/* P3：detailスキーマv2ヘルパー（⑥extraEvents / ⑦reviewed）。
   ・配列・入れ子は浅マージ（patchDetail）で壊れるため read-modify-write で該当キー全体を差し替える。
   ・全部 detailAllowed() ガード＝サンプル世帯には書き込まない。
   ・保存時に _v:2 を立てる（旧データ＝_vなしはそのまま動く＝移行不要）。 */
function nowStamp(){ const t = new Date(); const p = n => String(n).padStart(2,'0'); return `${t.getFullYear()}-${p(t.getMonth()+1)}-${p(t.getDate())}`; }
function addExtraEvent(name, amountMan, age){
  if (!detailAllowed()) return;
  const d = loadDetail();
  const arr = Array.isArray(d.extraEvents) ? d.extraEvents.slice() : [];
  arr.push({ name: String(name || '').slice(0, 40), amount: Math.max(0, Math.round((+amountMan || 0) * 10000)), age: Math.max(0, Math.round(+age || 0)) });
  patchDetail({ _v: 2, extraEvents: arr });
}
function removeExtraEvent(i){
  if (!detailAllowed()) return;
  const d = loadDetail();
  if (!Array.isArray(d.extraEvents)) return;
  const arr = d.extraEvents.slice(); arr.splice(i, 1);
  patchDetail({ _v: 2, extraEvents: arr });
}
function setReviewed(key, reason){
  if (!detailAllowed()) return;
  const d = loadDetail();
  const rv = Object.assign({}, d.reviewed || {});
  rv[key] = { done: true, reason: String(reason || '').slice(0, 60), at: nowStamp() };
  patchDetail({ _v: 2, reviewed: rv });
}
function clearReviewed(key){
  if (!detailAllowed()) return;
  const d = loadDetail();
  const rv = Object.assign({}, d.reviewed || {});
  delete rv[key];
  patchDetail({ _v: 2, reviewed: rv });
}
// ⑧P4：全駅ツアーの訪問記録（visitedはUI専用＝mergeDetailで計算除外）。
// 既に訪問済みなら何もせず false（＝冪等。toggle委譲リスナーの再描画ループ防止に必須）。新規記録時のみ true。
function markVisited(key){
  if (!detailAllowed()) return false;
  const d = loadDetail();
  const vs = d.visited || {};
  if (vs[key]) return false;
  const next = Object.assign({}, vs); next[key] = true;
  patchDetail({ _v: 2, visited: next });
  return true;
}

/* ============================================================
   3) 設定駆動ペイウォール（課金範囲を後から広げる/狭めるを設定だけで）
   ============================================================ */
const PAYWALL_CONFIG = {
  // ① エリア単位（MVPで唯一稼働）
  areas: { defense:'free', cashflow:'free', coverage:'free', allocation:'free', housing:'free', lifeevent:'free', exit:'free' },
  // ② 深さ単位（後フェーズで読む・枠だけ）
  depth: { default:{ overview:'free', detail:'paid' } },
  // ③ 機能単位（後フェーズで読む・枠だけ）
  features: { pdfExport:'paid', whatif:'paid', shareImage:'free' },
  lockBehavior: 'teaser',
};
const LICENSE_KEY = 'smartside_license_v1';
function readLicense(){ try { return !!(JSON.parse(localStorage.getItem(LICENSE_KEY) || 'null') || {}).active; } catch(e){ return false; } }
// status確定の最終段に必ず通す唯一のロック判定
function resolveLock(scope, key, baseStatus){
  const entitled = readLicense();
  let plan = 'free';
  if (scope === 'area') plan = PAYWALL_CONFIG.areas[key] || 'free';
  else if (scope === 'feature') plan = PAYWALL_CONFIG.features[key] || 'free';
  if (plan === 'paid' && !entitled) return 'locked';
  return baseStatus;
}
